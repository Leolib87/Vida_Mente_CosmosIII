        @keyframes pulse-glow {
            from { text-shadow: 0 0 10px var(--primary-glow), 0 0 20px var(--primary-glow); }

        // --- CÓDIGO DE ANIMACIÓN THREE.JS DE FONDO ---
        let scene, camera, renderer, points;
        
        function initThreeJS() {
            try {
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
                camera.position.z = 50;

                renderer = new THREE.WebGLRenderer({
                    canvas: document.getElementById("bg-canvas"),
                    alpha: true
                });
                renderer.setSize(window.innerWidth, window.innerHeight);

                const pointCount = 250;
                const positions = new Float32Array(pointCount * 3);
                const pointGeo = new THREE.BufferGeometry();
                for (let i = 0; i < pointCount; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * 300;
                    positions[i * 3 + 1] = (Math.random() - 0.5) * 300;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 300;
                }
                pointGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

                const pointMaterial = new THREE.PointsMaterial({ color: 0x818cf8, size: 1.2, transparent: true, opacity: 0.7 });
                points = new THREE.Points(pointGeo, pointMaterial);
                scene.add(points);

                window.addEventListener("resize", onWindowResize, false);
                document.addEventListener('mousemove', onMouseMove, false);
                animate();
            } catch (error) {
                console.error('Error initializing Three.js:', error);
            }
        }

        function onWindowResize() {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        let mouseX = 0, mouseY = 0;
        function onMouseMove(event) {
            mouseX = (event.clientX - window.innerWidth / 2) / 100;
            mouseY = (event.clientY - window.innerHeight / 2) / 100;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(scene && camera && renderer && points) {
                points.rotation.y += 0.0003;
                points.rotation.x += 0.0002;
                camera.position.x += (mouseX - camera.position.x) * 0.05;
                camera.position.y += (-mouseY - camera.position.y) * 0.05;
                camera.lookAt(scene.position);
                renderer.render(scene, camera);
            }
        }

        // --- CÓDIGO DE ANIMACIÓN POR SCROLL ---
        function setupScrollAnimations() {
            const animatedSections = document.querySelectorAll('[data-animate]');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15 });
            animatedSections.forEach(section => observer.observe(section));
        }

                { institucion: "CFT Teodoro Wickel Kluwen", matricula2024: 1016, matricula2025: 312 },
                { institucion: "Universidad Bolivariana", matricula2024: 416, matricula2025: 294 },
                { institucion: "CFT Escuela Culinary Francesa", matricula2024: 260, matricula2025: 211 },
                { institucion: "CFT Alpes", matricula2024: 188, matricula2025: 191 },
                { institucion: "CFT de La Región de Magallanes", matricula2024: 167, matricula2025: 182 },
                { institucion: "CFT Prodata", matricula2024: 134, matricula2025: 176 },
                { institucion: "CFT Escuela de Marina Mercante", matricula2024: 122, matricula2025: 143 },
                { institucion: "CFT Academia Chilena de Yoga", matricula2024: 40, matricula2025: 94 },
                { institucion: "CFT Escuela de Comercio", matricula2024: 745, matricula2025: 89 },
                { institucion: "IP Libertad de Los Andes", matricula2024: 213, matricula2025: 88 },
                { institucion: "CFT Inst. Alemán de Comercio Insalco", matricula2024: 68, matricula2025: 76 },
                { institucion: "CFT Iprosec", matricula2024: 96, matricula2025: 44 },
                { institucion: "IP Cicerón", matricula2024: 20, matricula2025: 38 },
                { institucion: "CFT Profasoc", matricula2024: 22, matricula2025: 14 }
            ];
            
            allData.forEach(d => {
                d.tendencia = d.matricula2025 - d.matricula2024;
            });
            
            let currentData = [...allData];
            let isSearchActive = false;

            const tooltip = d3.select("#tooltip");
            let currentSort = { key: 'matricula2025', asc: false };

            const sortData = () => {
                currentData.sort((a, b) => {
                    let valA = a[currentSort.key];
                    let valB = b[currentSort.key];
                    if (typeof valA === 'string') {
                        return currentSort.asc ? valA.localeCompare(valB) : valB.localeCompare(valA);
                    }
                    return currentSort.asc ? valA - valB : valB - valA;
                });
            };

            const renderTable = () => {
                const tableBody = d3.select("#table-body");
                tableBody.selectAll("tr").remove();

                const rows = tableBody.selectAll("tr")
                    .data(currentData)
                    .enter()
                    .append("tr")
                    .attr("class", "border-b border-gray-700 hover:bg-gray-800 transition-colors duration-200")
                    .attr("data-institucion", d => d.institucion);

                rows.append("td")
                    .attr("class", "px-4 py-2 font-medium text-white")
                    .text(d => d.institucion);
                
                rows.append("td")
                    .attr("class", "px-4 py-2 text-right")
                    .text(d => d.matricula2024.toLocaleString('es-CL'));

                rows.append("td")
                    .attr("class", "px-4 py-2 text-right")
                    .text(d => d.matricula2025.toLocaleString('es-CL'));
                
                rows.append("td")
                    .attr("class", "px-2 py-2 text-center")
                    .html(d => {
                        if (d.tendencia > 0) {
                            return `<svg class="w-4 h-4 inline-block text-green-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 17a.75.75 0 01-.75-.75V5.612L5.03 9.77a.75.75 0 01-1.06-1.06l5.25-5.25a.75.75 0 011.06 0l5.25 5.25a.75.75 0 11-1.06 1.06L10.75 5.612V16.25A.75.75 0 0110 17z" clip-rule="evenodd"></path></svg>`;
                        } else if (d.tendencia < 0) {
                            return `<svg class="w-4 h-4 inline-block text-red-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 3a.75.75 0 01.75.75v10.638l4.22-4.22a.75.75 0 111.06 1.06l-5.25 5.25a.75.75 0 01-1.06 0l-5.25-5.25a.75.75 0 111.06-1.06l4.22 4.22V3.75A.75.75 0 0110 3z" clip-rule="evenodd"></path></svg>`;
                        } else {
                            return `<span class="text-gray-400">-</span>`;
                        }
                    });
            };

            const renderChart = () => {
                const chartContainer = d3.select("#chart-container");
                chartContainer.select("svg").remove();

                const chartData = currentData.slice(0, 15).map((d, i) => ({...d, index: i}));

                const margin = { top: 30, right: 30, bottom: 150, left: 70 };
                const width = chartContainer.node().getBoundingClientRect().width - margin.left - margin.right;
                const height = chartContainer.node().getBoundingClientRect().height - margin.top - margin.bottom;

                const svg = chartContainer.append("svg")
                    .attr("width", "100%")
                    .attr("height", "100%")
                    .attr("viewBox", `0 0 ${width + margin.left + margin.right} ${height + margin.top + margin.bottom}`)
                    .append("g")
                    .attr("transform", `translate(${margin.left},${margin.top})`);
                
                const x0 = d3.scaleBand()
                    .domain(chartData.map(d => d.institucion))
                    .range([0, width])
                    .padding(0.2);

                const x1 = d3.scaleBand()
                    .domain(['2024', '2025'])
                    .range([0, x0.bandwidth()])
                    .padding(0.05);

                const y = d3.scaleLinear()
                    .domain([0, d3.max(chartData, d => Math.max(d.matricula2024, d.matricula2025)) * 1.05 || 10])
                    .range([height, 0]);

                const color = d3.scaleOrdinal().range(["#34d399", "#60a5fa"]); // Verde y Azul

                const xAxis = g => g.attr("transform", `translate(0,${height})`).call(d3.axisBottom(x0)).selectAll("text").attr("transform", "translate(-10,0)rotate(-45)").style("text-anchor", "end");
                const yAxis = g => g.call(d3.axisLeft(y).ticks(5).tickFormat(d => (d/1000) + "k"));

                svg.append("g").call(xAxis).attr("class", "axis");
                svg.append("g").call(yAxis).attr("class", "axis");
                
                svg.append('g').attr('class', 'grid').call(d3.axisLeft(y).ticks(5).tickSize(-width).tickFormat('')).selectAll("line").attr("class", "grid-line");

                const group = svg.selectAll(".group").data(chartData).enter().append("g").attr("class", "group").attr("transform", d => `translate(${x0(d.institucion)},0)`);

                group.selectAll("rect")
                    .data(d => [{year: '2024', value: d.matricula2024}, {year: '2025', value: d.matricula2025}])
                    .enter().append("rect")
                    .attr("x", d => x1(d.year))
                    .attr("y", height)
                    .attr("width", x1.bandwidth())
                    .attr("height", 0)
                    .attr("fill", d => color(d.year))
                    .on("mouseover", function(event, d) {
                        const institucionData = d3.select(this.parentNode).datum();
                        d3.select(`tr[data-institucion="${institucionData.institucion}"]`).style("background-color", "rgba(129, 140, 248, 0.2)");
                        tooltip.style("opacity", 1).html(`<strong>${institucionData.institucion}</strong><br>Año: ${d.year}<br>Matrícula: ${d.value.toLocaleString('es-CL')}`);
                    })
                    .on("mousemove", function(event) {
                        tooltip.style("left", (event.pageX + 15) + "px").style("top", (event.pageY - 28) + "px");
                    })
                    .on("mouseout", function() {
                        const institucionData = d3.select(this.parentNode).datum();
                        d3.select(`tr[data-institucion="${institucionData.institucion}"]`).style("background-color", "transparent");
                        tooltip.style("opacity", 0);
                    })
                    .transition().duration(800)
                    .delay(function(d, i) {
                        const parentIndex = d3.select(this.parentNode).datum().index;
                        return i * 50 + parentIndex * 100;
                    })
                    .attr("y", d => y(d.value))
                    .attr("height", d => height - y(d.value));

                if (isSearchActive) {
                    group.selectAll(".bar-label")
                        .data(d => [{year: '2024', value: d.matricula2024}, {year: '2025', value: d.matricula2025}])
                        .enter().append("text")
                        .attr("class", "bar-label")
                        .attr("x", d => x1(d.year) + x1.bandwidth() / 2)
                        .attr("y", height)
                        .style("opacity", 0)
                        .text(d => d.value.toLocaleString('es-CL'))
                        .transition().duration(800)
                        .delay(function(d, i) {
                            const parentIndex = d3.select(this.parentNode).datum().index;
                            return i * 50 + parentIndex * 100;
                        })
                        .attr("y", d => y(d.value) - 5)
                        .style("opacity", 1);
                }
            };

            d3.select("#search-input").on("input", function() {
                const searchTerm = this.value.toLowerCase().trim();
                isSearchActive = searchTerm.length > 0;
                currentData = allData.filter(d => 
                    d.institucion.toLowerCase().includes(searchTerm)
                );
                sortData(); 
                renderTable();
                renderChart();
            });

            d3.selectAll("th").on("click", function() {
                const key = d3.select(this).attr("data-sort");
                if (!key) return;
                if (currentSort.key === key) {
                    currentSort.asc = !currentSort.asc;
                } else {
                    currentSort.key = key;
                    currentSort.asc = true;
                }
                sortData();
                renderTable();
                renderChart();
            });

            // Renderizado inicial
            sortData();
            renderTable();
            renderChart();

            window.addEventListener('resize', () => {
                onWindowResize(); // Actualiza el canvas de Three.js
                renderChart(); // Vuelve a dibujar el gráfico D3
            });
        };
        
        // --- INICIALIZACIÓN ---
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof THREE !== 'undefined') {
                initThreeJS();
            }
            setupScrollAnimations();
            setupD3();
        });

    </script>
</body>
</html>
