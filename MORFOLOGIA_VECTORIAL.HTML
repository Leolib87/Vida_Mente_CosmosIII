<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morfología Vectorial - Tratado Algorítmico</title>

    <!-- 1. TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#0f172a',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        cyan: {
                            400: '#22d3ee',
                            500: '#06b6d4',
                            900: '#164e63',
                        },
                        amber: {
                            500: '#f59e0b',
                        }
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <!-- 2. FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">

    <!-- 3. KATEX (Math Rendering) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <!-- 4. P5.JS (Simulation Engine) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

    <!-- 5. IMPORT MAP (React Ecosystem - FIXED DEPENDENCIES) -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?deps=react@18.2.0,react-dom@18.2.0",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>

    <!-- 6. BABEL (JSX Compiler) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #06b6d4; }
        
        /* Hyphenation & Justification logic for academic text */
        .academic-text {
            text-align: justify;
            hyphens: auto;
            -webkit-hyphens: auto;
            text-justify: inter-word;
        }

        /* Math adjustment */
        .katex-display { margin: 2em 0; overflow-x: auto; overflow-y: hidden; }
        .katex { font-size: 1.15em; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 antialiased overflow-x-hidden">

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useScroll, useSpring, AnimatePresence } from 'framer-motion';
        import { 
            BookOpen, ChevronRight, Info, Menu, X, Cpu, 
            Activity, Target, Compass, Sigma, FunctionSquare, 
            Binary, Layers, Eye
        } from 'lucide-react';

        // --- COMPONENTS ---

        // 1. Math Renderer (KaTeX)
        const MathTex = ({ formula, displayMode = false, className = "" }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (window.katex && containerRef.current) {
                    try {
                        window.katex.render(formula, containerRef.current, {
                            throwOnError: false,
                            displayMode: displayMode,
                            strict: false,
                            trust: true
                        });
                    } catch (err) {
                        console.error("KaTeX Error:", err);
                    }
                }
            }, [formula, displayMode]);

            return <span ref={containerRef} className={`${displayMode ? "block my-8 text-center" : "inline-block font-mono text-cyan-400 mx-1"} ${className}`} />;
        };

        // 2. Academic Footnote (Centered Floating Modal)
        const Footnote = ({ id, title, content }) => {
            const [active, setActive] = useState(false);

            return (
                <span 
                    className="relative inline-block cursor-help group mx-0.5 align-baseline"
                    onMouseEnter={() => setActive(true)}
                    onMouseLeave={() => setActive(false)}
                >
                    <sup className="text-cyan-400 font-bold text-[10px] top-[-0.5em] px-1 group-hover:text-cyan-300 transition-colors">
                        [{id}]
                    </sup>
                    <AnimatePresence>
                        {active && (
                            <motion.div 
                                initial={{ opacity: 0, y: 20, scale: 0.95 }}
                                animate={{ opacity: 1, y: 0, scale: 1 }}
                                exit={{ opacity: 0, y: 20, scale: 0.95 }}
                                transition={{ duration: 0.2 }}
                                className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] w-[90vw] max-w-2xl origin-bottom"
                            >
                                <div className="bg-slate-900/95 backdrop-blur-xl border border-slate-700/50 p-6 rounded-xl shadow-2xl shadow-cyan-900/20 ring-1 ring-cyan-500/20">
                                    <div className="flex gap-5 items-start">
                                        <div className="bg-cyan-950/50 p-2.5 rounded-lg border border-cyan-900/50 shrink-0 mt-1">
                                            <Info size={18} className="text-cyan-400" />
                                        </div>
                                        <div>
                                            <h4 className="text-xs uppercase tracking-[0.2em] text-cyan-400 font-bold mb-2">Nota {id}: {title}</h4>
                                            <p className="text-slate-200 text-sm leading-relaxed text-justify">{content}</p>
                                        </div>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </span>
            );
        };

        // 3. Figure Component (Editorial Standard)
        const Figure = ({ caption, heightClass = "h-96" }) => {
            return (
                <figure className="w-full my-12 group">
                    <div className={`w-full ${heightClass} bg-slate-900/50 border-2 border-dashed border-slate-800 rounded-xl flex flex-col items-center justify-center relative overflow-hidden transition-colors group-hover:border-slate-700`}>
                        <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-5"></div>
                        <Layers className="text-slate-600 mb-4 group-hover:text-cyan-500 transition-colors" size={32} />
                        <p className="font-mono text-sm text-slate-500 mb-2">Insert Link Here</p>
                        <p className="font-mono text-xs text-slate-600 uppercase tracking-wider">[{caption}]</p>
                    </div>
                    <figcaption className="mt-4 text-center text-xs text-slate-500 font-serif italic tracking-wide">
                        Fig. {Math.floor(Math.random() * 10) + 1} — {caption}
                    </figcaption>
                </figure>
            );
        };

        // 4. P5.js Simulation Component
        const P5Simulation = () => {
            const containerRef = useRef();
            const [isReady, setIsReady] = useState(false);

            useEffect(() => {
                let p5Instance;
                
                const initSketch = () => {
                    if (!window.p5 || !containerRef.current) return;

                    const sketch = (p) => {
                        let t = 0;
                        const count = 20000;

                        p.setup = () => {
                            const canvas = p.createCanvas(containerRef.current.offsetWidth, 500, p.WEBGL);
                            canvas.parent(containerRef.current);
                            p.background(2, 6, 23); // slate-950 match
                            p.setAttributes('antialias', true);
                        };

                        p.windowResized = () => {
                             if(containerRef.current) {
                                 p.resizeCanvas(containerRef.current.offsetWidth, 500);
                             }
                        }

                        p.draw = () => {
                            p.background(2, 6, 23, 200); // Trail effect
                            p.stroke(34, 211, 238, 180); // Cyan-400
                            p.strokeWeight(1.5);
                            
                            t += p.PI / 120; // Slower animation
                            p.rotateY(t * 0.1);

                            p.beginShape(p.POINTS);
                            
                            const cos = Math.cos;
                            const sin = Math.sin;
                            const hypot = Math.hypot;

                            for (let i = count; i--; ) {
                                // Mathematical implementation from prompt
                                let y = i / 500;
                                let k = cos(y * 5) * (y < 11 ? 21 : 11);
                                let e = y / 8 - 13;
                                let o = hypot(k, e) / 6;
                                let q = k * 2 + 49 + cos(19 / k) + k * cos(y / 2) * (1 + sin(o * 4 - e * 2 - t));
                                let c = o / 1.5 - e / 5 - t / 8 + (i % 3) * 8; // Triple helix logic
                                
                                p.vertex(
                                    q * sin(c), 
                                    q * cos(c) - 79 * sin(c / 3),
                                    e * 10 // Added Z depth
                                );
                            }
                            p.endShape();
                        };
                    };

                    p5Instance = new window.p5(sketch);
                    setIsReady(true);
                };

                // Wait for container layout
                const timeout = setTimeout(initSketch, 500);

                return () => {
                    clearTimeout(timeout);
                    if (p5Instance) p5Instance.remove();
                };
            }, []);

            return (
                <div className="relative group overflow-hidden rounded-3xl border border-slate-800 bg-slate-900/30 backdrop-blur-2xl h-[500px] w-full flex items-center justify-center shadow-2xl my-16">
                    <div ref={containerRef} className="w-full h-full" />
                    
                    {/* HUD Overlay */}
                    <div className="absolute top-6 left-6 flex flex-col gap-1 opacity-60 pointer-events-none">
                        <div className="flex items-center gap-2 text-cyan-400">
                            <Binary size={12} />
                            <span className="text-[9px] font-mono uppercase">System: Online</span>
                        </div>
                        <div className="flex items-center gap-2 text-slate-400">
                            <Activity size={12} />
                            <span className="text-[9px] font-mono uppercase">FPS: 60.0 Locked</span>
                        </div>
                    </div>
                    
                    <div className="absolute bottom-6 right-6 text-right space-y-1 pointer-events-none opacity-60">
                         <p className="text-[9px] text-slate-500 font-mono uppercase tracking-widest">Render Engine</p>
                         <p className="text-xs text-slate-300 font-bold font-mono">WEBGL 2.0 / GLSL</p>
                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [activeSection, setActiveSection] = useState("Intro");
            const { scrollYProgress } = useScroll();
            const scaleX = useSpring(scrollYProgress, { stiffness: 100, damping: 30 });

            // Detect active section for sticky header
            useEffect(() => {
                const handleScroll = () => {
                    const sections = document.querySelectorAll('section[id]');
                    let current = '';
                    sections.forEach(section => {
                        const sectionTop = section.offsetTop;
                        if (window.scrollY >= sectionTop - 200) {
                            current = section.getAttribute('id');
                        }
                    });
                    if (current) setActiveSection(current);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const sections = [
                { id: 'definition', title: 'I. Definición de Dominio' },
                { id: 'amplitude', title: 'II. Modulación de Amplitud' },
                { id: 'master', title: 'III. Ecuación Maestra Radial' },
                { id: 'angular', title: 'IV. Proyección Angular' }
            ];

            return (
                <div className="min-h-screen bg-[#020617] text-slate-300 font-sans selection:bg-cyan-500/30 selection:text-cyan-100">
                    
                    {/* Progress Bar */}
                    <motion.div 
                        className="fixed top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-cyan-600 to-cyan-400 z-[100] origin-left shadow-[0_0_15px_rgba(6,182,212,0.5)]" 
                        style={{ scaleX }} 
                    />

                    {/* Sticky Header */}
                    <header className="fixed top-0 w-full z-[80] px-6 py-6 flex justify-between items-start pointer-events-none transition-all duration-300">
                        <motion.div 
                            initial={{ y: -100 }} animate={{ y: 0 }}
                            className="pointer-events-auto bg-slate-950/70 backdrop-blur-xl px-6 py-3 border border-slate-800/50 rounded-xl shadow-2xl flex items-center gap-5"
                        >
                            <div className="text-cyan-500 font-serif font-black text-xl italic leading-none pt-1">f(x)</div>
                            <div className="h-8 w-px bg-slate-800"></div>
                            <div className="flex flex-col">
                                <span className="text-[9px] uppercase tracking-[0.2em] font-bold text-slate-500">Sección Actual</span>
                                <span className="text-xs uppercase tracking-[0.1em] font-bold text-white max-w-[150px] truncate">
                                    {activeSection === "Intro" ? "PREFACIO" : sections.find(s => s.id === activeSection)?.title || activeSection}
                                </span>
                            </div>
                        </motion.div>

                        <button 
                            onClick={() => setIsMenuOpen(!isMenuOpen)}
                            className="pointer-events-auto p-4 bg-slate-950/70 backdrop-blur-xl border border-slate-800/50 rounded-xl hover:bg-cyan-900/20 hover:border-cyan-500/30 transition-all group shadow-xl"
                        >
                            {isMenuOpen ? <X size={20} className="text-white" /> : <Menu size={20} className="text-white group-hover:text-cyan-400 transition-colors" />}
                        </button>
                    </header>

                    {/* Navigation Drawer */}
                    <AnimatePresence>
                        {isMenuOpen && (
                            <>
                                <motion.div 
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                    onClick={() => setIsMenuOpen(false)}
                                    className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[85]"
                                />
                                <motion.div 
                                    initial={{ x: '100%' }} animate={{ x: 0 }} exit={{ x: '100%' }}
                                    transition={{ type: 'spring', damping: 30, stiffness: 300 }}
                                    className="fixed inset-y-0 right-0 w-full max-w-sm bg-[#0f172a] z-[90] border-l border-slate-800 p-10 pt-32 shadow-2xl flex flex-col gap-8"
                                >
                                    <div className="space-y-2 border-b border-slate-800 pb-6">
                                        <h2 className="text-3xl font-serif text-white italic">Índice</h2>
                                        <p className="text-xs text-slate-500 uppercase tracking-widest">Estructura del Tratado</p>
                                    </div>
                                    <nav className="flex flex-col gap-2">
                                        {sections.map(section => (
                                            <a 
                                                key={section.id} 
                                                href={`#${section.id}`} 
                                                onClick={() => setIsMenuOpen(false)}
                                                className="group flex items-center justify-between p-4 rounded-lg hover:bg-slate-900 transition-all border border-transparent hover:border-slate-800"
                                            >
                                                <span className="text-xs uppercase tracking-[0.1em] font-medium text-slate-400 group-hover:text-cyan-400 transition-colors">{section.title}</span>
                                                <ChevronRight size={14} className="text-slate-600 group-hover:text-cyan-400 transition-transform group-hover:translate-x-1" />
                                            </a>
                                        ))}
                                    </nav>
                                </motion.div>
                            </>
                        )}
                    </AnimatePresence>

                    {/* Hero Section */}
                    <section className="relative min-h-screen flex items-center justify-center px-6 overflow-hidden w-screen">
                        {/* Background Ambient */}
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-cyan-900/10 via-slate-950 to-slate-950"></div>
                        <div className="absolute inset-0 flex items-center justify-center opacity-[0.03] pointer-events-none select-none">
                             <div className="text-[30vw] font-serif italic text-white leading-none">∫</div>
                        </div>
                        
                        <div className="max-w-5xl relative z-10 text-center space-y-12">
                            <motion.div initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 1, ease: "easeOut" }}>
                                <div className="inline-flex items-center gap-3 mb-10 px-5 py-2 rounded-full bg-cyan-950/30 border border-cyan-500/20 backdrop-blur-md">
                                    <span className="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
                                    <span className="text-[10px] uppercase tracking-[0.3em] font-bold text-cyan-400">Pure Mathematics Series</span>
                                </div>
                                
                                <h1 className="text-7xl md:text-9xl font-serif text-white italic leading-[0.9] mb-10 tracking-tight drop-shadow-2xl">
                                    Morfología <br/> 
                                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 via-cyan-500 to-blue-600">Vectorial</span>
                                </h1>
                                
                                <p className="text-lg md:text-2xl text-slate-400 font-light max-w-3xl mx-auto leading-relaxed academic-text">
                                    Una deconstrucción formal del algoritmo generativo mediante el análisis de funciones trigonométricas compuestas y espacios de Hilbert discretos.
                                </p>
                            </motion.div>
                        </div>
                        
                        <div className="absolute bottom-10 animate-bounce text-slate-600">
                             <span className="text-[10px] uppercase tracking-widest">Scroll to Explore</span>
                        </div>
                    </section>

                    <main className="max-w-7xl mx-auto px-6 pb-40 grid grid-cols-1 lg:grid-cols-12 gap-20">
                        
                        {/* Main Content Column */}
                        <article className="lg:col-span-8 space-y-32">
                            
                            {/* Intro Text */}
                            <div className="prose prose-invert max-w-none">
                                <p className="text-xl text-slate-300 leading-loose academic-text first-letter:text-7xl first-letter:font-serif first-letter:text-white first-letter:mr-3 first-letter:float-left">
                                    El sistema se modela como un conjunto discreto de partículas <MathTex formula="P = \{p_0, p_1, \dots, p_n\}" /> donde <MathTex formula="n=20,000" />. Cada partícula <MathTex formula="p_i" /> es transformada desde un índice escalar <MathTex formula="i \in \mathbb{N}" /> a un vector de posición <MathTex formula="\vec{v} \in \mathbb{R}^3" /> mediante una serie de funciones de mapeo continuo. Este enfoque permite la emergencia de topologías complejas a partir de reglas locales simples.
                                </p>
                            </div>

                            {/* SECTION I: DOMAIN */}
                            <section id="definition" className="space-y-12 scroll-mt-40 border-t border-slate-900 pt-16">
                                <div className="flex items-center gap-4">
                                    <div className="bg-cyan-500/10 p-3 rounded-xl text-cyan-400 border border-cyan-500/20"><Target size={28} /></div>
                                    <h2 className="text-4xl font-serif text-white italic">I. Definición de Dominio Normalizado</h2>
                                </div>
                                
                                <div className="bg-slate-900/30 border border-slate-800/60 p-10 rounded-3xl relative overflow-hidden backdrop-blur-sm hover:border-slate-700 transition-colors">
                                    <div className="absolute top-0 right-0 p-6 opacity-10"><Sigma size={80} /></div>
                                    <p className="text-xs text-amber-500 mb-8 font-mono tracking-widest uppercase">Implementation Logic</p>
                                    
                                    <MathTex 
                                        displayMode={true} 
                                        formula="y(i) = \frac{i}{S}, \quad \text{donde } S = 500, \; i \in [0, 20000]" 
                                        className="scale-110"
                                    />

                                    <p className="text-slate-300 text-lg academic-text leading-relaxed mt-8">
                                        Transformamos el espacio discreto de índices <MathTex formula="i" /> en un dominio continuo <MathTex formula="y \in \mathbb{R}^+" />. Esta variable <MathTex formula="y" /> actúa como la variable independiente principal para todas las funciones trigonométricas subsiguientes. Es fundamental notar que el escalado <MathTex formula="S" /> determina la densidad del muestreo sobre la variedad generada.
                                    </p>
                                </div>
                                
                                <Figure caption="Visualización lineal del dominio mapeado" heightClass="h-64" />
                            </section>

                            {/* SECTION II: AMPLITUDE */}
                            <section id="amplitude" className="space-y-12 scroll-mt-40 border-t border-slate-900 pt-16">
                                <div className="flex items-center gap-4">
                                    <div className="bg-cyan-500/10 p-3 rounded-xl text-cyan-400 border border-cyan-500/20"><FunctionSquare size={28} /></div>
                                    <h2 className="text-4xl font-serif text-white italic">II. Modulación de Amplitud</h2>
                                </div>

                                <p className="text-lg text-slate-300 academic-text leading-loose">
                                    La función <MathTex formula="k(y)" /> define el <span className="text-amber-500 font-semibold font-serif italic">esqueleto oscilatorio</span> de la estructura. Utilizamos una definición condicional (Piecewise Function) para alterar la magnitud de la onda.
                                </p>

                                <div className="bg-slate-900/30 border border-slate-800/60 p-10 rounded-3xl">
                                     <MathTex 
                                        displayMode={true} 
                                        formula="k(y) = \cos(5y) \cdot \begin{cases} 21 & \text{si } y < 11 \\ 11 & \text{si } y \geq 11 \end{cases}" 
                                        className="scale-125"
                                     />
                                     <div className="mt-8 pt-6 border-t border-slate-800/50">
                                         <p className="text-slate-400 text-sm italic font-serif text-center">
                                            "La discontinuidad en <MathTex formula="y=11" /> no es un error, sino una decisión estética que introduce tensión visual."
                                         </p>
                                     </div>
                                </div>

                                <p className="text-lg text-slate-300 academic-text leading-loose">
                                    Esto rompe la homogeneidad visual, creando una estructura que se estrecha abruptamente.
                                    <Footnote 
                                        id="1" 
                                        title="Discontinuidad Controlada" 
                                        content="El cambio de multiplicador de 21 a 11 crea una discontinuidad en la derivada primera de la envolvente, lo que visualmente se traduce en un cambio de densidad o 'cintura' en la figura, similar a los nodos en una onda estacionaria." 
                                    />
                                </p>
                            </section>

                            {/* SECTION III: MASTER EQUATION */}
                            <section id="master" className="space-y-12 scroll-mt-40 border-t border-slate-900 pt-16">
                                <div className="flex items-center gap-4">
                                    <div className="bg-cyan-500/10 p-3 rounded-xl text-cyan-400 border border-cyan-500/20"><Cpu size={28} /></div>
                                    <h2 className="text-4xl font-serif text-white italic">III. Ecuación Maestra Radial</h2>
                                </div>

                                <div className="bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 p-12 rounded-3xl shadow-2xl relative overflow-hidden">
                                    {/* Decorative bg elements */}
                                    <div className="absolute -top-20 -left-20 w-64 h-64 bg-cyan-500/5 rounded-full blur-3xl"></div>
                                    
                                    <div className="mb-12 text-center relative z-10">
                                        <span className="text-[10px] uppercase tracking-[0.4em] text-cyan-500 font-bold mb-6 block">Nucleus Formula</span>
                                        <MathTex 
                                            displayMode={true} 
                                            formula="\rho(y,t) = \underbrace{2k + 49}_{\text{Estructura}} + \underbrace{\cos\left(\frac{19}{k}\right)}_{\text{Ruido}} + \underbrace{k \cos\left(\frac{y}{2}\right) [1 + \sin(\phi)]}_{\text{Dinámica}}" 
                                            className="text-2xl md:text-4xl"
                                        />
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 pt-10 border-t border-slate-800 relative z-10">
                                        <div className="space-y-3 group">
                                            <h4 className="text-white text-xs font-bold uppercase tracking-widest border-l-2 border-cyan-500 pl-3 group-hover:border-cyan-400 transition-colors">Estructura</h4>
                                            <p className="text-xs text-slate-400 leading-relaxed academic-text">
                                                <MathTex formula="2k + 49" /> establece el radio base. El término constante 49 actúa como un offset DC para prevenir el colapso gravitacional hacia el origen <MathTex formula="(0,0,0)" />.
                                            </p>
                                        </div>
                                        <div className="space-y-3 group">
                                            <h4 className="text-white text-xs font-bold uppercase tracking-widest border-l-2 border-amber-500 pl-3 group-hover:border-amber-400 transition-colors">Ruido H.F.</h4>
                                            <p className="text-xs text-slate-400 leading-relaxed academic-text">
                                                <MathTex formula="\cos(19/k)" /> introduce una oscilación de alta frecuencia inversamente proporcional a la amplitud, inyectando entropía controlada en la superficie.
                                            </p>
                                        </div>
                                        <div className="space-y-3 group">
                                            <h4 className="text-white text-xs font-bold uppercase tracking-widest border-l-2 border-purple-500 pl-3 group-hover:border-purple-400 transition-colors">Fase <MathTex formula="\phi" /></h4>
                                            <p className="text-xs text-slate-400 leading-relaxed academic-text">
                                                Donde <MathTex formula="\phi = 4o - 2e - t" /> conecta el tiempo <MathTex formula="t" /> con la métrica espacial, generando el movimiento ondulatorio coherente.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* SECTION IV: ANGULAR PROJECTION */}
                            <section id="angular" className="space-y-12 scroll-mt-40 border-t border-slate-900 pt-16">
                                <div className="flex items-center gap-4">
                                    <div className="bg-cyan-500/10 p-3 rounded-xl text-cyan-400 border border-cyan-500/20"><Compass size={28} /></div>
                                    <h2 className="text-4xl font-serif text-white italic">IV. Proyección Angular</h2>
                                </div>

                                <div className="bg-slate-900/30 border border-slate-800/60 p-10 rounded-3xl">
                                   <div className="my-8 flex justify-center">
                                     <MathTex 
                                       displayMode={true} 
                                       formula="\theta(i, t) = \frac{o}{1.5} - \frac{e}{5} - \frac{t}{8} + \mathbf{8(i \pmod 3)}" 
                                       className="scale-110"
                                     />
                                   </div>

                                   <p className="text-slate-300 text-lg academic-text leading-loose">
                                     El ángulo polar <MathTex formula="\theta" /> determina la rotación. El término crítico aquí es <MathTex formula="\mathbf{8(i \pmod 3)}" />.
                                     El operador módulo <MathTex formula="\pmod 3" /> divide el conjunto de 20,000 partículas en tres subconjuntos disjuntos <MathTex formula="\{S_0, S_1, S_2\}" />, rotando cada uno por <MathTex formula="0" />, <MathTex formula="8" /> o <MathTex formula="16" /> radianes respectivamente. Esto genera la <span className="text-cyan-400 font-bold">triple simetría helicoidal</span>.
                                   </p>
                                </div>
                            </section>

                            {/* SIMULATION RENDER */}
                            <section className="pt-24 pb-12">
                                <div className="flex flex-col items-center mb-12">
                                    <div className="w-px h-16 bg-gradient-to-b from-transparent via-cyan-500 to-transparent mb-6"></div>
                                    <h3 className="text-center text-xs font-bold uppercase tracking-[0.4em] text-white">Integración Final</h3>
                                </div>
                                
                                <P5Simulation />
                                
                                <div className="mt-10 flex justify-center gap-12 text-[10px] uppercase tracking-widest text-slate-500 font-mono border-t border-slate-900 pt-8">
                                    <span className="flex items-center gap-2"><div className="w-1.5 h-1.5 bg-amber-500 rounded-full"></div>Variables: 6</span>
                                    <span className="flex items-center gap-2"><div className="w-1.5 h-1.5 bg-cyan-500 rounded-full"></div>Complejidad: O(n)</span>
                                    <span className="flex items-center gap-2"><div className="w-1.5 h-1.5 bg-green-500 rounded-full"></div>Render: WebGL 2</span>
                                </div>
                            </section>

                        </article>

                        {/* Sidebar Info (Sticky) */}
                        <aside className="lg:col-span-4 space-y-8 hidden lg:block">
                            <div className="sticky top-40 space-y-8">
                                <div className="p-8 bg-slate-900/60 backdrop-blur-md border border-slate-800 rounded-2xl shadow-xl">
                                    <div className="flex items-center gap-3 mb-8 border-b border-slate-800 pb-4">
                                        <BookOpen size={18} className="text-cyan-500" />
                                        <h3 className="text-xs font-bold uppercase tracking-widest text-white">Glosario de Variables</h3>
                                    </div>
                                    
                                    <ul className="space-y-5">
                                        {[
                                            { sym: 'y', desc: 'Dominio normalizado' },
                                            { sym: 'k', desc: 'Amplitud base' },
                                            { sym: 'e', desc: 'Vector desplazamiento' },
                                            { sym: 'o', desc: 'Métrica radial' },
                                            { sym: 'ρ', desc: 'Radio polar final' },
                                            { sym: 'θ', desc: 'Ángulo polar final' },
                                            { sym: 't', desc: 'Tiempo (delta)' }
                                        ].map((item, idx) => (
                                            <li key={idx} className="flex justify-between items-center group cursor-help">
                                                <span className="font-mono text-cyan-400 font-bold group-hover:translate-x-1 transition-transform">{item.sym}</span>
                                                <span className="text-xs text-slate-400 text-right">{item.desc}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                <div className="p-8 border border-slate-800/50 rounded-2xl text-center bg-gradient-to-b from-slate-900/20 to-transparent">
                                    <Eye className="mx-auto text-slate-600 mb-4" size={24} />
                                    <p className="text-xs text-slate-500 italic font-serif leading-relaxed">
                                        "La belleza de la matemática generativa reside en que una función determinista puede producir formas que nuestra percepción interpreta como orgánicas e impredecibles."
                                    </p>
                                    <div className="mt-4 text-[10px] uppercase tracking-widest text-cyan-600 font-bold">— OCVM Editorial</div>
                                </div>
                            </div>
                        </aside>

                    </main>

                    {/* Footer */}
                    <footer className="border-t border-slate-900 bg-[#00020a] py-32 text-center relative overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-px bg-gradient-to-r from-transparent via-cyan-900 to-transparent"></div>
                        <h2 className="text-4xl font-serif text-slate-700 italic mb-6">Q.E.D.</h2>
                        <p className="text-[10px] uppercase tracking-[0.4em] text-slate-600 font-bold">Quod Erat Demonstrandum</p>
                        <p className="mt-8 text-xs text-slate-800 font-mono">OCVM ARCHITECT v6.1 • 2024</p>
                    </footer>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
