<body class="bg-slate-950 text-slate-300 antialiased selection:bg-cyan-500/30 selection:text-cyan-100 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, useScroll, useSpring, useTransform, AnimatePresence } = window.Motion;
        
        // --- INLINE ICONS ---
        const Menu = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/>
            </svg>
        );

        const X = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
            </svg>
        );

        const ImageIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
            </svg>
        );

        const ChevronRight = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="m9 18 6-6-6-6"/>
            </svg>
        );

        const Info = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
            </svg>
        );

        // --- COMPONENTS ---

        // 1. Math Component (Wrapper for KaTeX styling) - UPDATED: Text Amber
        const MathJax = ({ tex, inline = true }) => {
            return (
                <span className={`font-serif italic text-amber-500 ${inline ? 'px-1' : 'block text-center my-4 text-xl'}`} dangerouslySetInnerHTML={{__html: tex}}></span>
            );
        };

        // 2. Figure Component
        const Figure = ({ caption, description, aspectRatio = "video" }) => {
            return (
                <figure className="my-12 w-full group">
                    <div className={`w-full relative overflow-hidden rounded-sm border border-dashed border-slate-700 bg-slate-900/50 flex flex-col items-center justify-center transition-colors hover:bg-slate-900/80 ${aspectRatio === 'square' ? 'aspect-square' : 'aspect-video'}`}>
                        <ImageIcon className="w-12 h-12 text-slate-600 mb-4 opacity-50" />
                        <p className="text-cyan-500/80 font-mono text-sm uppercase tracking-widest text-center px-4">
                            // INSERTAR LINK: {description}
                        </p>
                        <div className="absolute inset-0 bg-gradient-to-t from-slate-950/60 to-transparent pointer-events-none" />
                    </div>
                    <figcaption className="mt-4 text-sm text-slate-500 leading-relaxed text-justify hyphens-auto font-sans border-l-2 border-slate-800 pl-4">
                        <span className="font-bold text-slate-400">Figura.</span> {caption}
                    </figcaption>
                </figure>
            );
        };

        // 3. Concept Highlighter - UPDATED: Text Amber
        const Concept = ({ children }) => (
            <span className="text-amber-500 font-medium font-serif italic">{children}</span>
        );

        // 4. Scientist Name Highlighter - UPDATED: Text Cyan (Celeste)
        const Scientist = ({ children }) => (
            <span className="text-cyan-400 font-semibold tracking-wide border-b border-cyan-900/30 hover:border-cyan-400 transition-colors cursor-default">{children}</span>
        );

        // 5. Footnote Reference
        const FootnoteRef = ({ id, onClick }) => (
            <button 
                onClick={() => onClick(id)}
                className="align-super text-xs text-cyan-500 font-bold hover:text-white transition-colors ml-0.5 px-1 py-0.5 bg-slate-900 rounded hover:bg-cyan-900"
            >
                [{id}]
            </button>
        );

        // --- MAIN APP ---

        const App = () => {
            const { scrollYProgress } = useScroll();
            const scaleX = useSpring(scrollYProgress, {
                stiffness: 100,
                damping: 30,
                restDelta: 0.001
            });
            
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [activeNote, setActiveNote] = useState(null);

            // Footnotes data
            const footnotes = {
                1: "Esta conjetura es uno de los problemas abiertos más antiguos en teoría de números.",
                2: "John Horton Conway (1937–2020) fue un prolífico matemático inglés activo en la teoría de grupos finitos, teoría de nudos, teoría de números, teoría de juegos combinatoria y teoría de códigos.",
                3: "Georg Cantor (1845–1918), matemático alemán, inventor de la teoría de conjuntos.",
                4: "Los mosaicos de Wang fueron propuestos por Hao Wang en 1961.",
                5: "Kurt Gödel (1906–1978), lógico, matemático y filósofo austriaco-estadounidense.",
                6: "Alan Turing (1912–1954), matemático, lógico, informático teórico, criptógrafo, filósofo y biólogo teórico británico."
            };

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                    setIsMenuOpen(false);
                }
            };

            return (
                <div className="min-h-screen relative">
                    
                    {/* READING PROGRESS BAR */}
                    <motion.div
                        className="fixed top-0 left-0 right-0 h-1 bg-cyan-500 origin-left z-50 shadow-[0_0_15px_rgba(6,182,212,0.5)]"
                        style={{ scaleX }}
                    />

                    {/* STICKY HEADER */}
                    <motion.header 
                        initial={{ y: -100 }}
                        animate={{ y: 0 }}
                        className="fixed top-0 w-full z-40 bg-slate-950/80 backdrop-blur-md border-b border-white/5 px-6 py-4 flex justify-between items-center"
                    >
                        <h1 className="text-sm font-bold tracking-widest uppercase text-slate-400 font-sans">
                            Nature of Math <span className="text-slate-600 px-2">|</span> Interactive
                        </h1>
                        <button 
                            onClick={() => setIsMenuOpen(true)}
                            className="flex items-center space-x-2 text-xs uppercase tracking-widest text-cyan-400 hover:text-white transition-colors group"
                        >
                            <span>Índice</span>
                            <Menu size={16} className="group-hover:rotate-180 transition-transform duration-500" />
                        </button>
                    </motion.header>

                    {/* DRAWER MENU */}
                    <AnimatePresence>
                        {isMenuOpen && (
                            <>
                                <motion.div 
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: 1 }}
                                    exit={{ opacity: 0 }}
                                    onClick={() => setIsMenuOpen(false)}
                                    className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-50"
                                />
                                <motion.div 
                                    initial={{ x: '100%' }}
                                    animate={{ x: 0 }}
                                    exit={{ x: '100%' }}
                                    transition={{ type: "spring", stiffness: 300, damping: 30 }}
                                    className="fixed right-0 top-0 h-full w-full max-w-sm bg-slate-900 border-l border-slate-800 z-50 p-8 shadow-2xl"
                                >
                                    <div className="flex justify-between items-center mb-12">
                                        <span className="font-serif text-2xl italic text-slate-200">Tabla de Contenidos</span>
                                        <button onClick={() => setIsMenuOpen(false)} className="text-slate-500 hover:text-white">
                                            <X size={24} />
                                        </button>
                                    </div>
                                    <nav className="space-y-6">
                                        {[
                                            { id: 'intro', title: 'I. La Conjetura de los Primos' },
                                            { id: 'conway', title: 'II. El Juego de la Vida' },
                                            { id: 'cantor', title: 'III. Teoría de Conjuntos' },
                                            { id: 'russell', title: 'IV. La Paradoja' },
                                            { id: 'hilbert', title: 'V. El Sueño Formalista' },
                                            { id: 'godel', title: 'VI. Incompletitud' },
                                            { id: 'turing', title: 'VII. La Máquina de Turing' },
                                            { id: 'legacy', title: 'VIII. El Legado' },
                                        ].map((item) => (
                                            <button 
                                                key={item.id}
                                                onClick={() => scrollToSection(item.id)}
                                                className="flex items-center justify-between w-full text-left text-slate-400 hover:text-cyan-400 transition-all group border-b border-slate-800 pb-4"
                                            >
                                                <span className="font-sans text-sm tracking-wide">{item.title}</span>
                                                <ChevronRight size={14} className="opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all" />
                                            </button>
                                        ))}
                                    </nav>
                                </motion.div>
                            </>
                        )}
                    </AnimatePresence>

                    {/* FOOTNOTE MODAL */}
                    <AnimatePresence>
                        {activeNote && (
                            <motion.div 
                                initial={{ y: 50, opacity: 0, x: '-50%' }}
                                animate={{ y: 0, opacity: 1, x: '-50%' }}
                                exit={{ y: 50, opacity: 0, x: '-50%' }}
                                className="fixed bottom-10 left-1/2 w-[90vw] max-w-2xl bg-slate-900/95 backdrop-blur-xl border border-slate-800 p-6 rounded-lg shadow-2xl z-50 text-center md:text-left"
                            >
                                <div className="flex items-start gap-4">
                                    <div className="text-cyan-500 mt-1"><Info size={20} /></div>
                                    <div className="flex-1">
                                        <h4 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Nota {activeNote}</h4>
                                        <p className="text-slate-300 font-serif leading-relaxed text-justify">{footnotes[activeNote]}</p>
                                    </div>
                                    <button onClick={() => setActiveNote(null)} className="text-slate-500 hover:text-white">
                                        <X size={18} />
                                    </button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* HERO SECTION */}
                    <section className="h-screen w-screen flex flex-col justify-center items-center text-center px-6 relative overflow-hidden bg-slate-950">
                        {/* Abstract Background Element */}
                        <div className="absolute inset-0 opacity-20 pointer-events-none">
                             <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-cyan-900/20 blur-[100px] rounded-full animate-pulse" />
                        </div>

                        <motion.h1 
                            initial={{ opacity: 0, y: 30 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 1, ease: "easeOut" }}
                            className="font-serif text-5xl md:text-7xl lg:text-8xl text-slate-100 leading-tight mb-8 z-10"
                        >
                            La Falla en el Fondo <br/> 
                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-slate-500">de las Matemáticas</span>
                        </motion.h1>

                        <motion.p 
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ delay: 0.5, duration: 1 }}
                            className="max-w-xl text-slate-400 font-sans text-lg md:text-xl font-light leading-relaxed mb-12 z-10"
                        >
                            Una exploración sobre la certeza, el infinito y los límites del conocimiento humano.
                        </motion.p>
                        
                        <motion.div 
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ delay: 1, duration: 1 }}
                            className="absolute bottom-12 animate-bounce text-slate-600"
                        >
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                        </motion.div>
                    </section>

                    {/* ARTICLE CONTENT */}
                    <main className="w-full relative z-10 bg-slate-950">
                        <div className="w-full px-6 md:px-12 py-24 space-y-12">

                            {/* Section 1: Introduction */}
                            <section id="intro" className="space-y-6">
                                <p className="text-xl md:text-2xl leading-relaxed font-serif text-slate-200 first-letter:text-7xl first-letter:font-bold first-letter:text-cyan-500 first-letter:float-left first-letter:mr-3 first-letter:mt-[-10px] text-justify hyphens-auto">
                                    Existe una falla en el fondo de las matemáticas, una falla que significa que nunca sabremos todo con certeza. Siempre habrá afirmaciones que no podremos probar. Nadie sabe cuáles son exactamente esas afirmaciones, pero podrían ser algo como la conjetura de los <Concept>números primos gemelos</Concept><FootnoteRef id={1} onClick={setActiveNote}/>.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Los <Concept>primos gemelos</Concept> son números primos separados por solo un número, como el 11 y el 13, o el 17 y el 19. A medida que los números ascienden, los primos ocurren menos seguido, por lo que los primos gemelos son menos comunes aún. Pero esta conjetura dice que hay un <Concept>número infinito de primos gemelos</Concept>, que nunca se acaban.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Hasta este momento nadie ha probado que esta conjetura sea verdadera o falsa. Pero lo curioso es esto: quizás nunca lo sepamos. Porque lo que sí ha sido probado es que en cualquier sistema matemático en el que puedas hacer aritmética básica, siempre habrá afirmaciones verdaderas que son imposibles de probar.
                                </p>
                                <div className="border-l-4 border-cyan-500 pl-6 py-2 my-10">
                                    <p className="text-2xl font-serif italic text-amber-500">Eso es la vida.</p>
                                </div>
                            </section>

                            {/* Section 2: Game of Life */}
                            <section id="conway" className="space-y-6">
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Específicamente, este es el <Concept>Juego de la Vida</Concept>, creado en 1970 por el matemático <Scientist>John Conway</Scientist><FootnoteRef id={2} onClick={setActiveNote}/>, quien tristemente falleció de COVID-19 en 2020. El <Concept>Juego de la Vida de Conway</Concept> se juega en una grilla infinita de celdas cuadradas. Cada una de ellas está viva o muerta y solo existen dos reglas:
                                </p>
                                <ul className="list-none space-y-4 pl-8 border-l border-slate-800 ml-4 text-justify">
                                    <li className="text-slate-300"><span className="text-cyan-500 font-bold mr-2">1.</span> Toda celda muerta con tres vecinas vivas vuelve a la vida.</li>
                                    <li className="text-slate-300"><span className="text-cyan-500 font-bold mr-2">2.</span> Cada celda viva con menos de dos o más de tres vecinas vivas muere.</li>
                                </ul>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Una vez que has montado el orden inicial de las celdas, las dos reglas se aplican para crear la próxima generación de celdas, y luego la siguiente, y la siguiente, y así sucesivamente. Es automático.
                                </p>

                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    <Scientist>Conway</Scientist> lo llamó <Concept>"un juego para hacer jugadores"</Concept>. Pero aunque las reglas son simples, el juego puede generar una gran variedad de comportamientos. Algunos patrones se vuelven estables; una vez que surgen, no se modifican. Otros oscilan hacia adelante y atrás repetidamente. Algunos viajan a través de la grilla eternamente, como esta forma de aquí.
                                </p>

                                <Figure 
                                    caption="Un 'glider' (planeador) en el Juego de la Vida de Conway, un patrón que se desplaza diagonalmente a través de la grilla."
                                    description="GIF animado o diagrama de un Glider moviéndose en la grilla."
                                    aspectRatio="video"
                                />

                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Y muchos patrones simplemente se esfuman. Pero algunos de ellos continúan creciendo eternamente, continúan generando nuevas celdas. Quizás creas que con estas sencillas reglas del juego podrías tan solo observar cada patrón y determinar qué sucederá con él. ¿Alcanzará eventualmente la estabilidad y seguirá creciendo sin límite?
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Pero lo que sucede es que estas preguntas son imposibles de responder. El destino último de un patrón en el <Concept>Juego de la Vida de Conway</Concept> es <Concept>indecidible</Concept>. Quiere decir que no existe un algoritmo posible que garantice responder estas preguntas en una cantidad de tiempo finita. Claro que podría dejar desarrollarse a ese patrón y ver qué sucede, ya que las reglas del juego son una clase de algoritmo después de todo. Pero eso tampoco te garantiza una respuesta. Y aunque lo dejes desarrollarse por un millón de generaciones, no serás capaz de determinar si durará eternamente o tan solo dos millones de generaciones, o un millón de millones, o un gúgolplex.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    ¿Hay algo especial acerca del <Concept>Juego de la Vida</Concept> que hace que sea indecidible? No. De hecho, existe una enorme cantidad de sistemas que son <Concept>indecidibles</Concept>: los <Concept>mosaicos de Wang</Concept>, la <Concept>física cuántica</Concept>, los sistemas de tickets de las aerolíneas e incluso el juego <Concept>Magic: The Gathering</Concept>.
                                </p>
                            </section>

                            {/* Section 3: Cantor */}
                            <section id="cantor" className="space-y-6 pt-12">
                                <h2 className="text-3xl font-serif text-slate-100 mb-8 mt-12">Infinitos Incontables</h2>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Para comprender cómo es que la indecidibilidad aparece en todos estos sitios, debemos viajar 150 años al pasado, a un momento revolucionario para las matemáticas. En 1874, el matemático alemán <Scientist>Georg Cantor</Scientist> (Gerd Kánter)<FootnoteRef id={3} onClick={setActiveNote}/> publicó un artículo que impulsó una nueva rama de las matemáticas: la <Concept>Teoría de Conjuntos</Concept>.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Un conjunto es simplemente una colección bien definida de objetos. Los dos zapatos en tus pies son un conjunto, como también todos los planetarios del mundo son un conjunto. Hay un conjunto vacío y un conjunto con todo en él. <Scientist>Cantor</Scientist> estaba estudiando los conjuntos de números, como los números naturales positivos enteros como 1, 2, 3, 4, etcétera, y el de los números reales, que incluyen fracciones como un tercio o cinco medios, e incluso números irracionales como Pi y la raíz cuadrada de dos. Básicamente, cualquier número que pueda ser representado con un decimal infinito.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Se preguntaba: ¿Hay más números naturales o más números reales entre 0 y 1? La respuesta puede parecer obvia: hay una cantidad infinita de ambos, por lo que ambos conjuntos deberían tener el mismo tamaño. Pero para comprobar esta lógica, <Scientist>Cantor</Scientist> imaginó escribir una lista infinita uniendo cada número natural a un lado con un número real entre cero y uno del otro lado. Como cada número real tiene decimales infinitos, no hay uno que vaya primero que otro, por lo que podemos anotarlos en orden aleatorio. Lo fundamental es asegurarse de que no se repitan y alinearlos uno a uno con un número entero.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Si podemos hacer eso sin que nos sobre ninguno, entonces sabremos que el conjunto de números naturales y el de números reales entre 0 y 1 son del mismo tamaño. Asumamos que hemos hecho esto. Tenemos una lista completa e infinita de cada entero actuando como número índice, un identificador único de cada número real de la lista.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Ahora, dice <Scientist>Cantor</Scientist>, comienza a escribir un nuevo número real. Para hacerlo, tomamos el primer dígito del primer número y le sumamos 1. Luego tomamos el segundo dígito del segundo número y nuevamente sumamos 1. Luego el tercer dígito del tercer número y sumamos 1, y seguimos así con toda la lista. Si el número es un 9, conviértelo en un 8. Para el fin de este proceso, tendrás un número real entre 0 y 1.
                                </p>

                                <Figure 
                                    caption="La diagonalización de Cantor. Se construye un nuevo número modificando los dígitos de la diagonal de la lista infinita."
                                    description="Animación o diagrama de la Diagonal de Cantor mostrando cómo se alteran los dígitos."
                                    aspectRatio="square"
                                />

                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Pero aquí está el asunto: este número no aparecerá en ningún lugar de la lista. Es diferente del primer número en el primer dígito decimal; del segundo en el segundo dígito decimal; y así consecutivamente. Tiene que ser diferente de cada uno de los números de la lista en al menos un decimal, el número en esta diagonal. Por esto es llamada la <Concept>prueba de diagonalización de Cantor</Concept>. Demuestra que debe haber más números reales entre 0 y 1 que números naturales, extendiéndose al infinito. Por lo que no todos los infinitos son del mismo tamaño.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    <Scientist>Cantor</Scientist> los llamó <Concept>infinitos contables</Concept> e <Concept>incontables</Concept> respectivamente. Y de hecho hay muchos más infinitos incontables que son aún más grandes.
                                </p>
                            </section>

                            {/* Section 4: The Crisis */}
                            <section className="space-y-6 pt-12">
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    El trabajo de <Scientist>Cantor</Scientist> fue considerado un gran golpe a las matemáticas. Por dos mil años, los <Concept>Elementos de Euclides</Concept> (<Scientist>Euclides</Scientist>) se consideraron los cimientos de la disciplina. Pero a comienzos del siglo diecinueve, <Scientist>Lobachevski</Scientist> (Lobatchewski) y <Scientist>Gauss</Scientist> descubrieron las <Concept>geometrías no euclidianas</Concept>, lo que lanzó a los matemáticos a examinar más atentamente los cimientos de sus disciplinas. Y no les gustó lo que encontraron. La idea de un <Concept>"límite"</Concept> en el centro del cálculo resultó estar pobremente definida. Y ahora <Scientist>Cantor</Scientist> estaba probando que el infinito mismo era mucho más complejo de lo que imaginaron.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Entre toda esta conmoción, la matemática se fracturó y se desató un enorme debate entre los matemáticos a fines del siglo XIX. De un lado se hallaban los <Concept>intuicionistas</Concept>, quienes creían que el trabajo de <Scientist>Cantor</Scientist> no tenía sentido. Estaban convencidos de que la matemática era una creación pura de la mente humana y que los infinitos como los de <Scientist>Cantor</Scientist> no eran reales.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    <Scientist>Henri Poincaré</Scientist> (Enrico and care) dijo que las futuras generaciones determinarían que la teoría de los conjuntos era <Concept>"una enfermedad de la que se habrían recuperado"</Concept>. <Scientist>Leopold Kronecker</Scientist> (Leopold Crónicas) llamó a <Scientist>Cantor</Scientist> un <Concept>"científico charlatán"</Concept> y un <Concept>"corruptor de la juventud"</Concept>, y trabajó para que <Scientist>Cantor</Scientist> no consiguiera un empleo que quería.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    En el bando opuesto estaban los <Concept>formalistas</Concept>. Ellos creían que las matemáticas podían ser colocadas sobre cimientos lógicos y seguros a través de la teoría de los conjuntos. El líder informal de los formalistas era el matemático alemán <Scientist>David Hilbert</Scientist>.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    <Scientist>Hilbert</Scientist> era una leyenda viva, un matemático muy influyente que había trabajado en casi todas las áreas de la matemática. Casi publica antes que <Scientist>Einstein</Scientist> acerca de la relatividad general, desarrolló conceptos nuevos en las matemáticas que fueron cruciales para la mecánica cuántica, y sabía que el trabajo de <Scientist>Cantor</Scientist> era brillante. <Scientist>Hilbert</Scientist> estaba convencido de que un <Concept>sistema más formal y riguroso de pruebas</Concept> basadas en la teoría de los conjuntos podría resolver todos los problemas que habían surgido en matemática en aquel siglo, y la mayoría de los matemáticos acordaba con él.
                                </p>
                                <blockquote className="p-6 bg-slate-900 border-l-4 border-cyan-500 rounded-r-lg shadow-lg my-8">
                                    <p className="text-xl font-serif italic text-amber-500">
                                        "Nadie nos expulsará del paraíso que Cantor ha creado."
                                    </p>
                                    <footer className="mt-4 text-sm text-cyan-400 uppercase tracking-widest">— David Hilbert</footer>
                                </blockquote>
                            </section>

                            {/* Section 5: Russell's Paradox */}
                            <section id="russell" className="space-y-6 pt-12">
                                <h2 className="text-3xl font-serif text-slate-100 mb-8">La Paradoja del Barbero</h2>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Pero en 1901, <Scientist>Bertrand Russell</Scientist> señaló un serio problema en la teoría de los conjuntos. Él sabía que si los conjuntos podían contener cualquier cosa, también podrían contener otros conjuntos, o incluso a sí mismos. Por ejemplo, el conjunto de todos los conjuntos debe contenerse a sí mismo, así como el conjunto de conjuntos con más de cinco elementos. Podríamos incluso hablar del conjunto de conjuntos que se contienen a sí mismos.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Pero esto nos lleva directamente a un problema. ¿Qué sucede con <MathJax tex="R" />, el conjunto de todos los conjuntos que <Concept>no</Concept> se contienen a sí mismos? Si <MathJax tex="R" /> no se contiene a sí mismo, entonces deberá contenerse a sí mismo. Pero si <MathJax tex="R" /> sí se contiene a sí mismo, entonces por definición no deberá contenerse a sí mismo. Entonces <MathJax tex="R" /> se contiene a sí mismo si y solo si no se contiene a sí mismo.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    <Scientist>Russell</Scientist> había encontrado otra <Concept>paradoja de autorreferencia</Concept>, que luego le explicaría utilizando una analogía un tanto peluda: imaginemos un pueblo enteramente poblado por hombres adultos con una extraña ley en contra de las barbas. La ley dice que el barbero del pueblo deberá afeitar a todos y cada uno de los hombres que no se afeitan a sí mismos.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Pero el barbero mismo también vive en el pueblo y es un hombre. Entonces, ¿quién lo afeita a él? Si él no se afeita a sí mismo, entonces el barbero debe afeitarlo; pero el barbero no puede afeitarse a sí mismo, porque el barbero no afeita a nadie que se afeite a sí mismo. Así que el barbero debe afeitarse si y solo si él no se afeita a sí mismo. Es una contradicción.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Los <Concept>intuicionistas</Concept> celebraron la <Concept>paradoja de Russell</Concept>, creyendo que probaba que la teoría de los conjuntos tenía fallas irresolubles. Pero <Scientist>Zermelo</Scientist> (Ser melo) y otros matemáticos de la escuela de <Scientist>Hilbert</Scientist> lo solucionaron restringiendo el concepto de conjunto. Por eso la colección de todos los conjuntos, por ejemplo, ya no es un conjunto; tampoco lo es la colección de todos los conjuntos que no se contienen a sí mismos. Esto eliminó las paradojas de autorreferencia. <Scientist>Hilbert</Scientist> y los <Concept>formalistas</Concept> sobrevivieron a esta ronda. Pero la autorreferencia se negaba a desaparecer tan fácilmente.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Viajemos a la década de 1960, cuando el matemático <Scientist>Hao Wang</Scientist> se hallaba estudiando mosaicos cuadrados con diferentes colores en cada lado<FootnoteRef id={4} onClick={setActiveNote}/>. Las reglas eran que los bordes en contacto deben ser del mismo color y no puedes rotar o invertir las piezas, solo deslizarlas. La pregunta era: si te dan un conjunto arbitrario de estos mosaicos, ¿puedes determinar si cubrirán un plano? Es decir, ¿pueden conectarse sin huecos y cubrir un plano infinito?
                                </p>
                                <Figure 
                                    caption="Mosaicos de Wang. Las piezas deben coincidir en color en sus bordes adyacentes sin rotación."
                                    description="Diagrama de Mosaicos de Wang ensamblándose."
                                    aspectRatio="square"
                                />
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    La respuesta es que no puedes determinar, a partir de un conjunto arbitrario de mosaicos, si cubrirán el plano o no. El problema es <Concept>indecidible</Concept>. Justo como el destino de un patrón en el <Concept>Juego de la Vida de Conway</Concept>. De hecho, es exactamente el mismo problema. Y ese problema, en última instancia, proviene de la autorreferencia, como <Scientist>Hilbert</Scientist> y los <Concept>formalistas</Concept> estaban a punto de descubrir.
                                </p>
                            </section>

                            {/* Section 6: Hilbert's Program */}
                            <section id="hilbert" className="space-y-6 pt-12">
                                <h2 className="text-3xl font-serif text-slate-100 mb-8">El Programa de Hilbert</h2>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    <Scientist>Hilbert</Scientist> quería asegurar los cimientos de las matemáticas desarrollando un nuevo sistema para las pruebas. Los sistemas de pruebas eran una idea anticuada originaria de la antigua Grecia. Un sistema de prueba comienza con un <Concept>axioma</Concept>, una afirmación básica que es asumida como cierta (como que una línea recta puede ser dibujada entre dos puntos). Las pruebas se construyen desde esos axiomas usando reglas de inferencia, métodos para usar afirmaciones existentes y derivar en nuevas afirmaciones que se utilizan para preservar la verdad. Las afirmaciones existentes son verdaderas, por eso también lo son las nuevas.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    <Scientist>Hilbert</Scientist> quería un <Concept>sistema formal de pruebas</Concept>, un idioma simbólico lógico con un conjunto rígido de reglas para manipular esos símbolos. Así, las afirmaciones lógicas y matemáticas podrían ser traducidas a este sistema. Si dejas caer un libro y este cae, sería <MathJax tex="A \implies B" />, y "ningún humano es inmortal" sería expresado así:
                                </p>
                                <div className="py-4 text-center">
                                    <span className="font-mono text-amber-500 text-lg">∀x (Humano(x) → ¬Inmortal(x))</span>
                                </div>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    <Scientist>Hilbert</Scientist> y los formalistas querían expresar los axiomas de las matemáticas como afirmaciones simbólicas en un sistema formal y establecer las reglas de inferencia como las reglas del sistema para manipular los símbolos. Así, <Scientist>Russell</Scientist> junto a <Scientist>Alfred North Whitehead</Scientist> (Alfred Nord Whitehead) desarrolló un sistema formal como este en los tres volúmenes de <span className="italic text-amber-500">Principia Mathematica</span>, publicados en 1913.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    <span className="italic text-amber-500">Principia Mathematica</span> es extenso. Son unas 2.000 páginas de densos apuntes matemáticos. Le toma 762 páginas solo arribar a una prueba completa de que uno más uno es igual a dos; momento en el cual <Scientist>Russell</Scientist> y <Scientist>Whitehead</Scientist> irónicamente señalan que esta proposición es "ocasionalmente útil". Los autores habían planeado un cuarto volumen, pero como era de esperar, estaban demasiado agotados como para terminarlo. Los apuntes sí son densos y extenuantes, pero también son exactos. A diferencia de los lenguajes ordinarios, no deja espacio para que errores o lógicas confusas se entremezclen. Y fundamentalmente, te permite probar propiedades del sistema formal en sí mismo.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Existían tres grandes preguntas que <Scientist>Hilbert</Scientist> quería responder sobre las matemáticas:
                                </p>
                                <ol className="list-decimal list-inside space-y-4 text-slate-300 font-serif italic text-lg pl-4 border-l border-slate-700 text-justify">
                                    <li>¿Es la matemática <span className="text-amber-500 not-italic font-sans font-bold">completa</span>? Es decir, ¿hay alguna forma de probar toda afirmación verdadera? ¿Todas las afirmaciones verdaderas tienen sus pruebas?</li>
                                    <li>¿Son las matemáticas <span className="text-amber-500 not-italic font-sans font-bold">consistentes</span>? Es decir, ¿es libre de contradicciones? Si puedes simultáneamente probar <MathJax tex="A" /> y probar que <MathJax tex="\neg A" /> (no A), entonces eso es un problema, porque puedes probar cualquier cosa.</li>
                                    <li>¿Es la matemática <span className="text-amber-500 not-italic font-sans font-bold">decidible</span>? Es decir, ¿existe un algoritmo que pueda siempre determinar si una afirmación se desprende de axiomas?</li>
                                </ol>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto mt-6">
                                    <Scientist>Hilbert</Scientist> estaba convencido de que la respuesta a las tres preguntas era SÍ. En una gran conferencia en 1930, <Scientist>Hilbert</Scientist> dio un encendido discurso acerca de estas preguntas. Lo finalizó con una frase que resumía su sueño formalista, en oposición al iluso <span className="italic text-amber-500">ignorabimus</span> (que quiere decir "no sabremos"):
                                </p>
                                <div className="text-center my-8">
                                    <p className="text-2xl font-serif text-amber-500">"Wir müssen wissen. Wir werden wissen."</p>
                                    <p className="text-sm text-slate-500 uppercase tracking-widest mt-2">(Debemos saber. Sabremos.)</p>
                                </div>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Estas palabras están literalmente en su tumba.
                                </p>
                            </section>

                            {/* Section 7: Gödel */}
                            <section id="godel" className="space-y-6 pt-12">
                                <h2 className="text-3xl font-serif text-slate-100 mb-8">La Incompletitud</h2>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Pero para cuando <Scientist>Hilbert</Scientist> dio este discurso, su sueño ya estaba derrumbándose. Justo el día anterior, en una reunión en la misma conferencia, un lógico de 24 años llamado <Scientist>Kurt Gödel</Scientist> (Cord Code)<FootnoteRef id={5} onClick={setActiveNote}/> explicaba que había encontrado la respuesta a la primera de las preguntas referida a la completitud, y la respuesta era NO. Un sistema formal completo de la matemática era imposible. El único que le prestó atención fue <Scientist>John von Neumann</Scientist>, previamente estudiante de <Scientist>Hilbert</Scientist>, quien lo apartó a <Scientist>Gödel</Scientist> para hacerle preguntas. Pero al año siguiente, <Scientist>Gödel</Scientist> publicó una prueba de su <Concept>teorema de incompletitud</Concept> y esta vez todos, incluyendo a <Scientist>Hilbert</Scientist>, le prestaron atención.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Así es como funciona la prueba de <Scientist>Gödel</Scientist>. <Scientist>Gödel</Scientist> quería usar la lógica y la matemática para responder preguntas sobre justamente el sistema de la lógica y la matemática. Por eso tomó todos estos símbolos básicos del sistema matemático y le asignó a cada uno un número. Esto se conoce como el <Concept>número de Gödel</Concept> de los símbolos. Entonces el símbolo para "no" obtiene el número 1, "o" tiene el número de Gödel 2, "si... entonces" obtiene el número 3.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Bien, si expresas estos símbolos mediante números, ¿qué es lo que haces con los números en sí mismos? Bueno, 0 obtiene su propio número Gödel (6), y si quieres escribir el número 1, le agregas este símbolo "sucesor" al lado. El sucesor inmediato de 0 es 1. Y si quieres escribir el 2, entonces debes escribir <MathJax tex="s s 0" /> y eso representa el 2. Y así podrías representar cualquier número entero positivo de esta forma. Es cierto que es engorroso, pero funciona, y ese es el punto de este sistema.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Ahora que tenemos números Gödel para todos los símbolos básicos y para todos los números que podríamos usar, podemos comenzar a escribir ecuaciones. Por ejemplo, "0 es igual a 0". Estos símbolos tienen los números de Gödel 6, 5, 6. Así podemos crear una nueva carta que represente esta ecuación <MathJax tex="0 = 0" />. Y la forma de hacerlo es tomando los números primos, comenzando desde el 2, y elevamos cada uno a la potencia del número del símbolo en nuestra ecuación.
                                </p>
                                <div className="bg-slate-900 p-6 rounded border border-slate-800 text-center my-6">
                                    <MathJax tex="2^6 \cdot 3^5 \cdot 5^6 = 243.000.000" inline={false} />
                                </div>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Obtenemos así 243 millones. Entonces, 243 millones es el número de Gödel que equivale a la ecuación "0 es igual a 0". Podemos anotar números de Gödel para cada conjunto de símbolos que puedan imaginar. Esto realmente es un mazo de cartas infinito en el cual cualquier conjunto de símbolos que quieras anotar en una secuencia se puede representar con un número de Gödel único. Y la belleza del número Gödel es que puedes hacer una factorización con números primos y averiguar exactamente qué símbolos componen esta carta.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    En todo este mazo de cartas habrá afirmaciones verdaderas y afirmaciones falsas. ¿Cómo haces para probar que algo es verdadero? Bien, necesitas apelar a los axiomas. Los axiomas también tienen sus propios números Gödel, que se forman de la misma manera. Aquí tenemos un axioma que dice: "no el sucesor de cualquier número x es igual a 0". Lo cual tiene sentido, porque en este sistema no hay números negativos y por ende el sucesor de cualquier número no puede ser 0. Entonces colocamos este axioma y luego podemos sustituir x por 0, diciendo que 1 no es igual a 0. Y hemos creado una prueba, que es la más simple que se me ocurre, que muestra que 1 no es igual a 0.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Esta carta es la prueba de que 1 no es igual a 0 y obtiene su propio número Gödel. Y la forma de calcularlo es como lo hicimos antes: tomamos los números primos y elevamos 2 a la potencia del axioma, por 3 elevado a la potencia "1 no es igual a 0", y obtenemos un número tremendamente largo. Tendría 73 millones de dígitos si lo calculáramos, así que lo dejé aquí en su notación exponencial. Como puedes ver, estos números se hacen bastante largos y por eso quizás quieras comenzar a llamarlos por letras. Podríamos decir que este es el número Gödel "A" y este es el número del número del "C", etcétera.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    <Scientist>Gödel</Scientist> se toma todo este trabajo para hallar esta carta que dice: <Concept>"No hay prueba para la afirmación con el número Gödel G"</Concept>.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    El truco es que el número Gödel de esta carta <span className="font-bold text-amber-500">ES</span> <MathJax tex="G" />. Entonces, esta afirmación en realidad está diciendo: <Concept>"Esta carta es indemostrable"</Concept>. No hay prueba alguna en nuestro mazo infinito para esta carta. Piénsalo: si es falso y hay una prueba, lo que acabas de probar es que no hay pruebas. Estás estancado en una contradicción. Eso significaría que el sistema matemático es inconsistente.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    La otra alternativa es que esta carta es verdadera: no hay pruebas para la afirmación con el número Gödel <MathJax tex="G" />. Pero eso querría decir que este sistema matemático tiene afirmaciones verdaderas que no tienen pruebas, por lo que tu sistema matemático está incompleto. Y ese es el <Concept>teorema de incompletitud de Gödel</Concept>. Así es como él demuestra que cualquier sistema matemático que cuente con aritmética básica siempre tendrá afirmaciones dentro de él que son verdaderas pero que no tienen pruebas.
                                </p>
                                <div className="bg-slate-900/50 p-6 rounded-lg my-8">
                                    <p className="text-sm font-sans text-slate-500 uppercase tracking-widest mb-4">Analogía: The Office</p>
                                    <p className="text-lg text-slate-300 italic font-serif leading-relaxed text-justify text-amber-500">
                                        "Jim es mi enemigo. Pero resulta que Jim es su propio peor enemigo. Y el enemigo de mi enemigo es mi amigo. Por lo que Jim es en verdad mi amigo. Pero como es su propio peor enemigo, el enemigo de mi amigo es mi enemigo. Por lo que realmente Jim es mi enemigo."
                                    </p>
                                </div>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Pero el teorema de la incompletitud de <Scientist>Gödel</Scientist> significa que la verdad y la demostrabilidad no son lo mismo en absoluto. <Scientist>Hilbert</Scientist> estaba equivocado. Siempre habrá afirmaciones verdaderas sobre la matemática que no pueden ser probadas. <Scientist>Hilbert</Scientist> podría conformarse con la esperanza de que al menos aún podemos probar que la matemática es consistente (o sea, libre de contradicciones). Pero luego <Scientist>Gödel</Scientist> publicó su segundo teorema de incompletitud, donde demostró que cualquier sistema formal consistente de la matemática es incapaz de probar su propia consistencia.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Así que tomando ambos teoremas de incompletitud de <Scientist>Gödel</Scientist>, estos dicen que lo mejor a lo que puedes aspirar es a un sistema consistente pero incompleto de la matemática. Pero un sistema como ese no puede probar su propia consistencia, por lo que algunas contradicciones pueden aparecer en el futuro, revelando que el sistema con el que trabajas ha sido inconsistente todo el tiempo.
                                </p>
                            </section>

                            {/* Section 8: Turing */}
                            <section id="turing" className="space-y-6 pt-12">
                                <h2 className="text-3xl font-serif text-slate-100 mb-8">La Máquina</h2>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Y eso nos deja la tercera y última gran pregunta de <Scientist>Hilbert</Scientist>: ¿Es la matemática decidible? ¿Hay algún algoritmo que pueda siempre determinar si una afirmación surge de los axiomas? Y en 1936, <Scientist>Alan Turing</Scientist><FootnoteRef id={6} onClick={setActiveNote}/> encontró una manera de responder a esta. Pero para lograrlo tuvo que inventar la computadora moderna.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    En su época, las "computadoras" no eran máquinas; eran personas (comúnmente mujeres) que desarrollaban largos y tediosos cálculos. <Scientist>Turing</Scientist> imaginó una computadora enteramente mecánica. Quería que fuera tan poderosa como para llevar a cabo cualquier cómputo imaginable, pero lo suficientemente sencilla como para que puedas seguir el razonamiento de la operación.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Por lo tanto, imaginó una máquina que recibe como información una cinta infinitamente larga de celdas cuadradas que contienen un 0 o un 1. La máquina poseía un cabezal de lectura y escritura que podía leer un dígito a la vez. Luego podría realizar una de las siguientes tareas: reescribir un nuevo valor, moverse a la izquierda, a la derecha, o simplemente detenerse. Detenerse implicaría que el programa ha finalizado. El programa consiste en un conjunto de instrucciones internas. Puedes pensarlo como un diagrama de flujo que le indica a la máquina qué hacer en base al dígito que lee y su estado interno.
                                </p>
                                
                                <Figure 
                                    caption="Diagrama conceptual de una Máquina de Turing con cinta infinita y cabezal de lectura/escritura."
                                    description="Esquema técnico de la máquina de Turing."
                                    aspectRatio="video"
                                />

                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Podemos imaginarla exportando estas instrucciones a cualquier otra máquina de <Scientist>Turing</Scientist>, que luego se comportaría de la misma forma que la primera. A pesar de que esto suene simple, la memoria grande y arbitraria de una máquina <Scientist>Turing</Scientist> significa que puede ejecutar cualquier algoritmo computable si se le brinda el tiempo suficiente. De la suma a la resta, hasta el algoritmo completo de YouTube. Puede hacer lo mismo que cualquier computadora moderna. Por eso la máquina de <Scientist>Turing</Scientist> fue tan útil para responder la pregunta de <Scientist>Hilbert</Scientist> acerca de la decidibilidad.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Cuando una máquina <Scientist>Turing</Scientist> se detiene, el programa ha terminado de correr y la cinta es el resultado. Pero a veces una máquina <Scientist>Turing</Scientist> nunca se detiene; quizás se trabe en un bucle infinito. ¿Es posible predecir antes de que suceda si se detendrá o no a partir de una información determinada? <Scientist>Turing</Scientist> notó que el problema sobre la detención era similar al problema de lo indecible. Si encontrase una manera de averiguar si una máquina <Scientist>Turing</Scientist> se detendría, también podría decidir si una afirmación se deduce de los axiomas.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Por ejemplo, podrías resolver la conjetura de los primos gemelos escribiendo un programa que comience con el axioma y construya todos los teoremas que se producirían en un solo paso usando las reglas de inferencia. Luego construiría todos los teoremas que se podrían producir en un solo paso y así sucesivamente. Cada vez que genere un nuevo teorema, verifica si es la conjetura de los primos gemelos. Y si lo es, se detendría; y si no lo es, nunca se detendría. Así que si se pudiese resolver el problema de la detención, podrías resolver la conjetura de los primos gemelos y toda pregunta sin responder.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Entonces <Scientist>Turing</Scientist> propuso asumir que podemos hacer una máquina <MathJax tex="H" /> que puede determinar si cualquier máquina <Scientist>Turing</Scientist> se detendría o no a partir de cierta información. Insertas el programa, introduce la información y <MathJax tex="H" /> simula lo que sucederá. Imprimirá ya sea "se detiene" o "nunca se detiene". Por ahora no nos preocupamos acerca de cómo funciona <MathJax tex="H" />, solo sabemos que siempre funciona y siempre da la respuesta correcta.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Podemos modificar la máquina <MathJax tex="H" /> al sumarle componentes adicionales: uno es que si recibe el resultado "se detiene", inmediatamente ingresa en un bucle infinito; otro, que si recibe "nunca se detiene", inmediatamente se detiene. Llamaré a esta nueva máquina <MathJax tex="H+" /> y podemos exportar el programa para toda esa máquina.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Ahora bien, ¿qué sucede si le damos a esta máquina su propio código, tanto como un programa y como una entrada de información? Bueno, ahora está simulando lo que <MathJax tex="H+" /> haría a partir de su propia entrada. Esencialmente <MathJax tex="H" /> debe determinar el comportamiento de una máquina de la cual ella misma es parte en exactamente estas circunstancias.
                                </p>
                                <ul className="list-none space-y-4 pl-8 border-l border-slate-800 ml-4 text-justify">
                                    <li className="text-slate-300">Si concluye que <MathJax tex="H+" /> jamás se detendrá, esto hace inmediatamente que <MathJax tex="H+" /> se detenga.</li>
                                    <li className="text-slate-300">Si concluye que <MathJax tex="H+" /> se detendrá, entonces eso necesariamente fuerza a <MathJax tex="H+" /> a entrar en un bucle infinito.</li>
                                </ul>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto mt-6">
                                    Cualquiera sea el resultado que la máquina de detención <MathJax tex="H" /> nos dé, resulta ser el erróneo. Hay una contradicción. La única explicación es que una máquina como <MathJax tex="H" /> no puede existir. No hay forma de determinar en general si una máquina <Scientist>Turing</Scientist> se detendrá o no a partir de una entrada determinada. Y esto significa que la matemática es <Concept>indecidible</Concept>. No existe algoritmo que pueda siempre determinar si una afirmación se desprende de los axiomas. Así que algo como la conjetura de los primos gemelos podría ser irresoluble. Quizás nunca sepamos si existen infinitos números primos o no.
                                </p>
                            </section>

                            {/* Section 9: Physics & Reality */}
                            <section className="space-y-6 pt-12">
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    El problema de la indecidibilidad incluso aparece en los sistemas físicos. En la mecánica cuántica, una de las más importantes propiedades de un sistema de muchos cuerpos es la diferencia en energía entre su estado fundamental y su primer estado excitado. Esto se conoce como la <Concept>brecha espectral</Concept>. Algunos sistemas tienen una brecha espectral significativa, mientras que otros carecen de brecha; hay un continuo de niveles de energía hasta el estado fundamental. Esto es importante porque a bajas temperaturas los sistemas cuánticos sin brecha pueden atravesar transiciones de fase, mientras que los que tienen brecha no, no poseen la energía necesaria para superar la brecha espectral.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Pero averiguar si un sistema posee una brecha o no es algo hace tiempos ávidamente dificultoso. Recién en el último tiempo, en 2015, los matemáticos probaron que en general la cuestión de la brecha espectral es indecidible. Para citar a los autores: <Concept>"Incluso una descripción completa y perfecta de las interacciones microscópicas entre las partículas de un material no es siempre suficiente para deducir sus propiedades macroscópicas"</Concept>.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Recuerda que <Scientist>Turing</Scientist> construyó sus máquinas para hacer computadoras tan poderosas como sean posible de hacer. Hoy en día los mejores sistemas computacionales son aquellos que pueden hacer todo lo que podían hacer las máquinas <Scientist>Turing</Scientist>; esto es llamado la <Concept>completitud de Turing</Concept>. Y de hecho hay varios de estos sistemas completos.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    A pesar de ser poderosos, todo sistema completo de <Scientist>Turing</Scientist> viene con un truco: su propia analogía del problema de la detención, alguna propiedad indecidible del sistema.
                                </p>
                                <ul className="list-disc pl-8 space-y-2 text-slate-400 text-justify">
                                    <li>Los <Concept>mosaicos de Wang</Concept> son completos según Turing; su problema de detención es si completarán el plano o no.</li>
                                    <li>Los <Concept>sistemas cuánticos complejos</Concept> son completos según Turing y su problema de detención es la cuestión de la brecha espectral.</li>
                                    <li>El <Concept>Juego de la Vida</Concept> es completo según Turing y su problema de detención es literal: si se detiene o no.</li>
                                </ul>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Existen muchos ejemplos, como los sistemas de tickets de las aerolíneas, el juego <Concept>Magic: The Gathering</Concept>, las diapositivas de PowerPoint o los documentos de Excel. Casi todos los lenguajes de programación están diseñados para ser completos según Turing. Pero en teoría solo necesitamos un lenguaje de programación, porque puedes programar cualquier cosa utilizando cualquier sistema completo de Turing. Aquí tenemos una máquina de Turing dentro del Juego de la Vida. Y como el Juego de la Vida es en sí mismo completo en términos de Turing, debería ser capaz de simularse a sí mismo, y de hecho lo es.
                                </p>
                                <Figure 
                                    caption="El Juego de la Vida de Conway simulando una Máquina de Turing, que a su vez simula el Juego de la Vida."
                                    description="GIF de la meta-simulación del Juego de la Vida."
                                    aspectRatio="video"
                                />
                            </section>

                            {/* Section 10: Legacy & Conclusion */}
                            <section id="legacy" className="space-y-6 pt-12 pb-24">
                                <h2 className="text-3xl font-serif text-slate-100 mb-8">El Verdadero Legado</h2>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    El verdadero legado del sueño de <Scientist>David Hilbert</Scientist> son todos nuestros dispositivos computacionales. <Scientist>Gödel</Scientist> sufrió episodios de inestabilidad mental durante el resto de su vida; convencido de que había gente intentando envenenarlo, se negó a alimentarse hasta finalmente morir de hambre. <Scientist>Hilbert</Scientist> falleció en 1943. Su epitafio fue su frase de 1930: <Concept>"Debemos saber, sabremos"</Concept>. La verdad es que no sabemos. A veces no podemos saber. Pero en el intento de averiguarlo, podemos descubrir cosas nuevas, cosas que cambian el mundo.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    <Scientist>Alan Turing</Scientist> empleó sus ideas sobre computación en la Segunda Guerra Mundial, liderando al equipo que construyó verdaderas máquinas de calcular para descifrar códigos nazis. Según una estimación, la inteligencia que <Scientist>Turing</Scientist> y sus colegas obtuvieron de mensajes descifrados acortó la guerra de dos a cuatro años. Después de la guerra, <Scientist>Turing</Scientist> y <Scientist>von Neumann</Scientist> diseñaron la primera computadora electrónica programable real (EDVAC), que se basó en los diseños de <Scientist>Turing</Scientist>.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    Pero <Scientist>Turing</Scientist> no vivió para ver sus ideas desarrollarse mucho más. En 1952 el gobierno británico lo condenó por "conducta indecente" al enterarse que era gay. Se le quitó su autorización de seguridad y se lo forzó a inyectarse hormonas. En 1954 decidió suicidarse.
                                </p>
                                <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                    <Scientist>Turing</Scientist> cambió el mundo. Es considerado como la figura fundadora más importante de la ciencia computacional. Todas las computadoras modernas descienden de sus diseños. Pero sus ideas sobre la computabilidad aparecieron gracias a su concepto de la máquina Turing, que a su vez vino al considerar la pregunta de <Scientist>Hilbert</Scientist> acerca de la indecidibilidad de la matemática. Por lo que las máquinas para descifrar códigos de <Scientist>Turing</Scientist>, y en efecto todas las computadoras modernas, provienen de las extrañas paradojas que surgen de la autorreferencia.
                                </p>
                                <div className="mt-16 p-8 bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 rounded-lg shadow-2xl">
                                    <p className="text-2xl font-serif italic text-amber-500 mb-6">
                                        Hay una falla en el fondo de las matemáticas, una falla que significa que nunca sabremos todo con certeza.
                                    </p>
                                    <p className="text-lg text-slate-400 leading-8 text-justify hyphens-auto">
                                        Siempre habrá afirmaciones verdaderas que no pueden ser probadas. Y quizás creas que la comprensión de esto conduciría a los matemáticos a la locura y a la desintegración de la iniciativa matemática. Pero sin embargo, considerar este problema transformó el concepto del infinito, cambió el rumbo de una guerra mundial y nos guió directamente a la invención del dispositivo en el que estás viendo esto.
                                    </p>
                                </div>
                            </section>
