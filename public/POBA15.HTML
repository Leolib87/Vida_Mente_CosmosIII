                                    <div className="space-y-4 border-l-2 border-cyan-500/40 pl-10">
                                        <span className="font-mono text-cyan-500 text-xs tracking-[0.4em] uppercase font-black">Sección 15.1</span>
                                        <h3 className="font-serif text-5xl md:text-6xl text-slate-50 tracking-tighter italic">El Sistema de los Tejidos Nerviosos</h3>
                                    </div>
                                    
                                    <div className="space-y-12 text-xl md:text-2xl leading-[1.9] text-justify-custom text-slate-300 font-light">
                                        <SectionMarker>15.1.1</SectionMarker>
                                        <p>
                                            En ninguna parte, parece, predomina tanto la <Concept>filosofía del control</Concept> como en el estudio del sistema nervioso. De hecho, casi todos los investigadores en neurociencia aceptarán como dogma que (1) el sistema nervioso actúa <Concept>“captando información”</Concept> del entorno y <Concept>“procesándola”</Concept>, y que (2) este “procesamiento” es adecuado porque existe una <Concept>“representación del mundo exterior en la mente”</Concept> del animal (o del ser humano).<NoteRef id={1} onHover={handleNoteHover} onLeave={handleNoteLeave} /> El cerebro es una máquina para producir una imagen precisa del mundo. En ninguna parte las nociones desarrolladas en el dominio del diseño han echado raíces más profundas que en este campo; <Concept>el cerebro como computadora</Concept> es, a estas alturas, una noción de sentido común.
                                        </p>
                                        <p>
                                            Vis-à-vis esta opinión predominante, podría parecer arrogante proponer un punto de vista que es casi el opuesto, a saber, que el sistema nervioso opera como una <Concept>red cerrada sin entradas ni salidas</Concept>, que su operación cognitiva refleja únicamente su organización, y que la información es impuesta al entorno y no captada de él. El argumento, en este caso, sigue de cerca al presentado para el sistema inmune. La diferencia es, sin embargo, que el sistema nervioso goza de una historia considerablemente más larga como campo de pensamiento, y que cualquier conclusión que se considere válida para él tendrá un impacto más amplio en nuestra comprensión de lo que es el conocimiento. A pesar de esta dificultad, sostendré que debemos considerar al sistema nervioso como un <Concept>sistema autónomo</Concept>, y que al hacerlo hay consecuencias significativas para lo que la representación y la comunicación pueden significar posiblemente. Desde este punto de vista, el enfoque desde la <Concept>Gestalt computacional del procesamiento de información</Concept> se convierte en una aproximación restringida. Como en el caso del sistema inmune, la evidencia antigua se reinterpreta, los problemas desaparecen y surgen otros nuevos.
                                        </p>
                                        <p>
                                            He aprendido a ver el sistema nervioso como un sistema cerrado de <Author>Humberto Maturana</Author>, quien lo propuso explícitamente por primera vez en 1969 (ver también <Author>Maturana</Author>, 1975, 1977). Considero que la intuición de <Author>Maturana</Author> es un paso fundamental. Él ha proporcionado un vínculo básico entre los procesos materiales y sistémicos en el sistema nervioso, con una visión epistemológica profunda del conocimiento en el hombre y la naturaleza. Lo que emerge no es todavía un programa de investigación bien definido, sino una posibilidad abierta, que interpretaré y desarrollaré más adelante en el contexto de este libro.
                                        </p>

                                        <SectionMarker>15.1.2</SectionMarker>
                                        <p>
                                            El <Concept>comportamiento</Concept> puede definirse sucintamente como los cambios estructurales por los que puede pasar un organismo mientras mantiene su <Concept>autopoiesis</Concept>. El sistema nervioso permite al organismo una gama variada y rica de comportamientos posibles.
                                        </p>
                                        <p>
                                            Al estudiar el comportamiento de un animal, uno se sorprende por el hecho de que lo que podemos describir como interacciones pasadas determinan la conducta en el presente como si, encarnadas en modificaciones del sistema nervioso, actuaran como <Concept>componentes causales que generan el comportamiento</Concept>. Parece que esta observación básica es la fuente fundamental de la visión de que el sistema nervioso debe tener <Concept>representaciones almacenadas adecuadas</Concept>, ya sean genéticas u ontogenéticas (es decir, ya sean innatas o aprendidas). De ahí las analogías con las nociones informáticas de almacenamiento y procesamiento. Desde el punto de vista aquí discutido, esta interpretación es innecesaria, pues confunde dos dominios fenomenales: lo que pertenece al sistema como unidad, y lo que pertenece a la historia del <Concept>acoplamiento estructural</Concept>. Estos dos dominios requieren explicaciones diferentes: una operativa y otra simbólica. Al mantener esta distinción en mente, la función del sistema nervioso puede analizarse sin contradicción en términos de (1) su operación, que está siempre en el presente, como en todo sistema determinista (y como todo neurofisiólogo sabe), y (2) su desempeño, que nosotros, como comunidad de observadores, necesitamos resumir en términos de trayectorias de acoplamiento estructural, p. ej., recuerdo, aprendizaje y representación. Re-formulemos ahora la organización del sistema nervioso en estos términos.
                                        </p>
                                        <p>
                                            El sistema nervioso es una red de neuronas interactuantes acopladas de tres maneras al organismo del cual es un componente:
                                        </p>
                                        <div className="pl-12 border-l-2 border-slate-800 space-y-12 my-24 py-6 text-slate-400 italic bg-slate-900/20 rounded-r-3xl">
                                            <p>1. El organismo, incluyendo el sistema nervioso, proporciona el <Concept>entorno físico y bioquímico para la autopoiesis de las neuronas</Concept> así como para todas las demás células, y por lo tanto es una fuente posible de perturbaciones físicas y bioquímicas que pueden alterar las propiedades de las neuronas y así conducir al acoplamiento 2 o 3.</p>
                                            <p>2. Existen estados del organismo (físicos y bioquímicos) que <Concept>cambian el estado de actividad del sistema nervioso como un todo</Concept> al actuar sobre las superficies receptoras de algunas de sus neuronas componentes, y así conducen al acoplamiento 3.</p>
                                            <p>3. Existen estados del sistema nervioso que cambian el estado del organismo (físico o bioquímico) y conducen recursivamente a los acoplamientos 1 y 2.</p>
                                        </div>
                                        <p>
                                            A través de este acoplamiento, el sistema nervioso participa en la generación de las relaciones autopoiéticas que definen al organismo que integran y, en consecuencia, su estructura está subordinada a esta participación.
                                        </p>

                                        <SectionMarker>15.1.3</SectionMarker>
                                        <p>
                                            Las <Concept>neuronas</Concept> determinan sus propios límites a través de su autopoiesis, y son las unidades anatómicas del sistema nervioso. Hay muchas clases de neuronas que se distinguen por sus formas, pero todas ellas, independientemente de la clase morfológica a la que pertenezcan, tienen ramas que las ponen en relaciones operativas directas o indirectas con otras neuronas de otro modo separadas.
                                        </p>
                                        <p>
                                            Funcionalmente (es decir, visto como un componente alopoiético del sistema nervioso), una neurona tiene una <Concept>superficie colectora</Concept>, un elemento conductor y una <Concept>superficie efectora</Concept>, cuyas posiciones relativas, formas y extensiones son diferentes en diferentes clases de neuronas. La superficie colectora es la parte donde recibe influencias aferentes (sinápticas o no) de las superficies efectoras de otras neuronas o de la suya propia. La superficie efectora es la parte que afecta a la superficie colectora de otras neuronas o a la suya propia. Dependiendo de su tipo, una neurona puede tener sus superficies colectora y efectora total o parcialmente separadas por un elemento conductor (ausencia o presencia de inhibición presináptica), o puede tener ambas superficies completamente interconectadas, sin elemento conductor entre ellas (como con las células amacrinas en la retina).
                                        </p>
                                        <p>
                                            Las interacciones entre las superficies colectora y efectora pueden ser <Concept>excitatorias o inhibitorias</Concept> según el tipo de neurona involucrada. Las influencias excitatorias causan un cambio en el estado de actividad de la superficie colectora, que puede conducir a un cambio en la superficie efectora, mientras que las inhibitorias <Concept>“derivan” (shunt)</Concept> el efecto para que no alcance la superficie efectora o lo haga con eficacia reducida.
                                        </p>
                                        <p>
                                            Operativamente, el estado de actividad de una neurona está determinado tanto por su <Concept>estructura interna</Concept> (propiedades de membrana, grosor de ramas, etc.) como por las influencias aferentes. Inversamente, la efectividad de una neurona para cambiar el estado de otras neuronas depende de la estructura interna de estas últimas. Esto es así porque las influencias no se suman linealmente, sino que dependen de la posición relativa de sus puntos de acción. Además, la estructura interna de una neurona cambia a lo largo de su vida, tanto por determinaciones genéticas como por su historia de interacciones.
                                        </p>
                                        <p>
                                            Esto tiene tres consecuencias generales:
                                        </p>
                                        <ol className="list-decimal pl-16 space-y-8 text-slate-400 font-mono text-base md:text-lg tracking-tight leading-relaxed">
                                            <li>Muchas configuraciones de influencias de entrada producen la misma configuración de salida.</li>
                                            <li>Los cambios en la estructura interna cambian la <Concept>función de transferencia</Concept> de la neurona.</li>
                                            <li>Ninguna célula o clase de células por sí sola puede determinar las propiedades de la red neural que integra.</li>
                                        </ol>

                                        <SectionMarker>15.1.4</SectionMarker>
                                        <p>
                                            La descripción anterior replantea el conocimiento estándar sobre el sistema nervioso (ver <Author>Kuffler y Nichols</Author>, 1977). La pregunta es: ¿Qué significa esto operativamente? Diremos que, operativamente, el sistema nervioso es una <Concept>red cerrada de neuronas interactuantes</Concept> tal que un cambio de actividad en una neurona siempre conduce a un cambio de actividad en otras neuronas (Maturana, 1969). Por lo tanto, la organización del sistema nervioso se define por <Concept>relaciones de clausura</Concept> en las interacciones generadas en la red.
                                        </p>
                                        <p>
                                            Las neuronas sensoriales y efectoras no son una excepción, porque toda actividad sensorial conduce a actividad en las superficies efectoras, y toda actividad efectora conduce a cambios en las superficies sensoriales. Como sistema cerrado, el sistema nervioso <Concept>no tiene entradas ni salidas</Concept>. Para el sistema nervioso no hay adentro ni afuera. La distinción entre causas internas y externas solo puede hacerla un observador que especifica los límites.
                                        </p>
                                    </div>
                                </section>

                                {/* 15.2 */}
                                <section id="sec-15-2" className="space-y-16">
                                    <div className="space-y-4 border-l-2 border-cyan-500/40 pl-10">
                                        <span className="font-mono text-cyan-500 text-xs tracking-[0.4em] uppercase font-black">Sección 15.2</span>
                                        <h3 className="font-serif text-5xl md:text-6xl text-slate-50 tracking-tighter italic">Cambio y Acoplamiento Estructural</h3>
                                    </div>
                                    <div className="space-y-12 text-xl md:text-2xl leading-[1.9] text-justify-custom text-slate-300 font-light">
                                        <SectionMarker>15.2.1</SectionMarker>
                                        <p>
                                            Cualquier cambio en la estructura del sistema nervioso surge de un cambio en las propiedades de sus neuronas. El punto significativo es que estos cambios surgen en el <Concept>acoplamiento del sistema nervioso y el organismo</Concept> a través de su operación subordinada a la autopoiesis de este último. El sistema nervioso está acoplado al organismo tanto en su dominio de interacciones como en su dominio de transformaciones internas.
                                        </p>
                                        <SectionMarker>15.2.2</SectionMarker>
                                        <p>
                                            La conectividad del sistema nervioso está determinada por las formas de sus neuronas. Debido a su constitución como una red de interacciones laterales, paralelas, secuenciales y recursivas, el sistema nervioso <Concept>se cierra sobre sí mismo en todos los niveles</Concept>. En consecuencia, la organización es esencialmente <Concept>invariante ante mutilaciones</Concept>; lo que queda tras una ablación opera como un todo diferente con propiedades distintas, no como un sistema al que se le han restado propiedades selectivamente.
                                        </p>
                                        <p>
                                            Intrínsecamente, <Concept>no hay posibilidad de localización operativa</Concept> en el sistema nervioso. Sin embargo, cada lesión localizada produce una <Concept>desconexión específica</Concept> entre sus partes, y por ende un cambio específico en su dominio de estados posibles.
                                        </p>
                                        <SectionMarker>15.2.3</SectionMarker>
                                        <p>
                                            El sistema nervioso opera como un sistema autónomo que mantiene invariantes las relaciones que definen su participación en la autopoiesis del organismo. El resultado es el <Concept>acoplamiento estructural</Concept> de dos fenomenologías constitutivamente diferentes: la fenomenología del sistema nervioso como sistema cerrado, y la fenomenología del entorno. Ambas están trenzadas de tal manera que el dominio de estados posibles del sistema nervioso se ve continuamente como <Concept>conmensurable</Concept> con el dominio de estados del entorno.
                                        </p>
                                        <SectionMarker>15.2.4</SectionMarker>
                                        <p>
                                            El cambio en el dominio de estados posibles que tiene lugar a través de la ontogenia del organismo como resultado de sus interacciones constituye el <Concept>aprendizaje</Concept>. Las nociones de adquisición de representaciones del entorno o de adquisición de información no representan ningún aspecto de la operación del sistema nervioso. Lo mismo se aplica a la memoria y el recuerdo: son descripciones simbólicas del observador.
                                        </p>
                                    </div>
                                </section>

                                {/* 15.3 */}
                                <section id="sec-15-3" className="space-y-16">
                                    <div className="space-y-4 border-l-2 border-cyan-500/40 pl-10">
                                        <span className="font-mono text-cyan-500 text-xs tracking-[0.4em] uppercase font-black">Sección 15.3</span>
                                        <h3 className="font-serif text-5xl md:text-6xl text-slate-50 tracking-tighter italic">Percepción e Invariancias</h3>
                                    </div>
                                    <div className="space-y-12 text-xl md:text-2xl leading-[1.9] text-justify-custom text-slate-300 font-light">
                                        <p>
                                            La percepción sensorial no puede entenderse como un proceso de entrada. <Concept>La percepción y la acción no pueden separarse</Concept>, ya que la percepción es una expresión de la clausura del sistema nervioso.<NoteRef id={2} onHover={handleNoteHover} onLeave={handleNoteLeave} /> En términos positivos, la percepción es equivalente a la <Concept>construcción de invariancias</Concept> a través de un acoplamiento sensorial-motor por medio del cual el organismo se vuelve viable. El ruido ambiental se convierte en objetos a través de la clausura.
                                        </p>
                                        <p>
                                            <Author>von Holst</Author> y <Author>Mittelstaedt</Author> (1950) introdujeron el <Concept>“Principio de Re-aferencia”</Concept>.
                                        </p>
                                        <QuoteBlock 
                                            text="En lugar de preguntar sobre la relación entre una aferiencia dada y la eferencia evocada, partimos en la dirección opuesta preguntando: ¿Qué sucede en el SNC con la aferiencia (re-aferencia) que es evocada a través de los efectores y receptores por la eferencia?" 
                                            author="von Holst & Mittelstaedt"
                                            source="1950"
                                        />
                                        
                                        <Figure 
                                            label="Figura 15-Diagrama de Locomoción" 
                                            description="El comportamiento global (locomoción) surge de la coordinación de bucles sensorial-motores recursivos. El oscilador central despliega acciones en los músculos, que activan propioceptores, los cuales re-informan al oscilador manteniendo el eigenbehavior del paso." 
                                        />

                                        <p>
                                            El comportamiento (locomoción) es claramente distinto de la operación del sistema nervioso. Para este último, solo hay invariancias que mantener. Para el observador, hay invariancias en el acoplamiento estructural que describe como <Concept>objetos</Concept>: rocas, paredes. Suponer que tales objetos son un <Concept>a priori</Concept> para el animal es un error. Son abreviaturas simbólicas del comportamiento.
                                        </p>
                                        <p>
                                            La analogía de <Author>Maturana</Author> del <Concept>vuelo instrumental</Concept> es clave: el piloto solo manipula relaciones internas de instrumentos para obtener lecturas. Para el observador externo es un “vuelo” y un “aterrizaje”, para el sistema interno es solo mantenimiento de correlaciones.
                                        </p>
                                    </div>
                                </section>

                                {/* 15.4 */}
                                <section id="sec-15-4" className="space-y-16">
                                    <div className="space-y-4 border-l-2 border-cyan-500/40 pl-10">
                                        <span className="font-mono text-cyan-500 text-xs tracking-[0.4em] uppercase font-black">Sección 15.4</span>
                                        <h3 className="font-serif text-5xl md:text-6xl text-slate-50 tracking-tighter italic">El Caso de la Constancia de Tamaño</h3>
                                    </div>
                                    <div className="space-y-12 text-xl md:text-2xl leading-[1.9] text-justify-custom text-slate-300 font-light">
                                        <SectionMarker>15.4.1</SectionMarker>
                                        <p>
                                            La <Concept>“constancia de tamaño”</Concept> se entiende como una desconexión causal entre la percepción del tamaño de un objeto y el tamaño de su imagen retiniana. Tradicionalmente, este análisis se basa en la suposición de que nociones como distancia y tamaño reflejan una captación directa de características del entorno.
                                        </p>
                                        <p>
                                            <Author>Gregory</Author> afirma que las ilusiones como la de <Concept>Ponzo</Concept> son producidas por un <Concept>“escalado de constancia”</Concept> mal aplicado debido a pistas de profundidad. Sin embargo, si transformamos el contexto de perspectiva, la ilusión se mantiene aunque el efecto de profundidad desaparezca.
                                        </p>

                                        <Figure label="Figura 15-1" description="Ilusión de Ponzo clásica. Las líneas convergentes sugieren profundidad, lo que activa erróneamente la compensación de tamaño según la teoría de Gregory." />
                                        <Figure label="Figura 15-2 y 15-3" description="Variaciones de la ilusión donde el efecto de profundidad desaparece pero la distorsión de tamaño persiste, demostrando la independencia entre la perspectiva simbólica y la constancia operativa." />

                                        <p>
                                            ¿Qué es la constancia de tamaño como proceso nervioso? La evidencia sugiere que está relacionada con la <Concept>acomodación</Concept>. Si uno hace un esfuerzo por mirar la punta de su nariz con los ojos cerrados, el <Concept>efecto Emmert</Concept> aparece y la post-imagen se encoge. Se concluye que la constancia de tamaño depende de la actividad de la clase de neuronas centrales que controlan la contracción del músculo ciliar. <Concept>Los componentes neurales de un evento motor especifican una percepción</Concept>.
                                        </p>

                                        <SectionMarker>15.4.2</SectionMarker>
                                        <p>
                                            <Concept>No vemos la distancia</Concept>. Un organismo no extrae la distancia percibida como una característica del entorno, sino que la genera como un modo de comportamiento compatible a través de un proceso de compensación invariante de perturbaciones. Ver el sistema nervioso como un sistema autónomo que especifica una realidad es equivalente a decir que el sistema funciona <Concept>inductivamente</Concept>: “Lo que sucederá una vez, sucederá de nuevo”.
                                        </p>

                                        <SectionMarker>15.4.3</SectionMarker>
                                        <p>
                                            <Author>William Powers</Author> usa terminología cibernética: el comportamiento es el <Concept>control de la percepción</Concept>. Los organismos controlan sus datos sensoriales mediante el ajuste de señales de referencia para sistemas de primer orden.<NoteRef id={3} onHover={handleNoteHover} onLeave={handleNoteLeave} />
                                        </p>
                                    </div>
                                </section>

                                {/* 15.5 */}
                                <section id="sec-15-5" className="space-y-16">
                                    <div className="space-y-4 border-l-2 border-cyan-500/40 pl-10">
                                        <span className="font-mono text-cyan-500 text-xs tracking-[0.4em] uppercase font-black">Sección 15.5</span>
                                        <h3 className="font-serif text-5xl md:text-6xl text-slate-50 tracking-tighter italic">Piaget y el Conocimiento</h3>
                                    </div>
                                    <div className="space-y-12 text-xl md:text-2xl leading-[1.9] text-justify-custom text-slate-300 font-light">
                                        <p>
                                            El marco piagetiano puede reformularse como la emergencia de invariancias (objetos) como <Concept>“fichas para el eigenbehavior [comportamiento propio] cognitivo”</Concept>. La perspectiva de la <Concept>asimilación biológica</Concept> de <Author>Piaget</Author> se basa en tres conceptos: estructura, asimilación y acomodación.
                                        </p>
                                        <QuoteBlock 
                                            text="La organización es inseparable de la adaptación: son dos procesos complementarios de un único mecanismo, siendo el primero el aspecto interno del ciclo del cual la adaptación constituye el aspecto externo" 
                                            author="Jean Piaget"
                                            source="1963"
                                        />
                                        <p>
                                            Los mecanismos para especificar operacionalmente un entorno parecen conducir sin discontinuidad al reino humano.
                                        </p>
                                    </div>
                                </section>

                                {/* 15.6 */}
                                <section id="sec-15-6" className="space-y-16 pb-40">
                                    <div className="space-y-4 border-l-2 border-cyan-500/40 pl-10">
                                        <span className="font-mono text-cyan-500 text-xs tracking-[0.4em] uppercase font-black">Sección 15.6</span>
                                        <h3 className="font-serif text-5xl md:text-6xl text-slate-50 tracking-tighter italic">Interdependencia en Redes Neurales</h3>
                                    </div>
                                    <div className="space-y-12 text-xl md:text-2xl leading-[1.9] text-justify-custom text-slate-300 font-light">
                                        <SectionMarker>15.6.1</SectionMarker>
                                        <p>
                                            Pasar del estudio de la captación de información al estudio del comportamiento como algo que emerge de invariancias permite plantear nuevas preguntas sobre los macro-estados cerebrales. <Author>Kilmer, McCulloch y Blum</Author> (1969) propusieron ver la formación reticular como un mecanismo para cambiar <Concept>estados referenciales</Concept> (sueño, vigilia) mediante módulos en interacción.
                                        </p>
                                        <p>
                                            Debemos reconsiderar el concepto de <Concept>representación neural</Concept>. Los estados neurales pueden interpretarse mejor como <Concept>eigenbehaviors</Concept> que surgen del acoplamiento estructural. El sistema nervioso talla invariancias y percepciones fuera de su estructura. Desde este punto de vista, las representaciones podrían llamarse mejor <Concept>presentaciones</Concept>.
                                        </p>

                                        <SectionMarker>15.6.2</SectionMarker>
                                        <p>
                                            <Concept>Analogía final</Concept>: si un coche choca contra un árbol y su guardabarros se dobla, no decimos que el coche “recuerda” el accidente ni que “aprendió” vía una representación de árboles. <Concept>La memoria no requiere registro ni almacenamiento, pues representa una historia de acoplamiento estructural; el aprendizaje no requiere representación, pues representa plasticidad estructural</Concept>.
                                        </p>
                                        <p>
                                            Me parece asombroso que la idea de correspondencia entre actividad cerebral y características ambientales haya sido tomada en serio alguna vez. Ver a una neurona como responsable de un percepto es <Concept>vitalismo o animismo directo</Concept>. Lo que nos pertenece es cómo vemos el desempeño de un sistema nervioso; buscar un mapeo entre estos dos dominios es buscar un modelo de una realidad que es un <Concept>espejismo que siempre retrocede</Concept>.
                                        </p>

                                        <div className="mt-40 pt-24 border-t border-slate-900 grid md:grid-cols-2 gap-16 text-slate-500">
                                            <div className="space-y-6">
                                                <h4 className="font-mono text-xs uppercase tracking-widest text-slate-400 font-bold">Bibliografía Seleccionada</h4>
                                                <ul className="space-y-4 text-sm italic leading-relaxed">
                                                    <li><Author>Maturana, H.</Author> (1969), The neurophysiology of cognition.</li>
                                                    <li><Author>Maturana, H. & Varela, F.</Author> (1975), Autopoietic Systems: A Characterization of the Living Organization.</li>
                                                    <li><Author>Maturana, H., Varela, F. & Frenk, S.</Author> (1972), Size constancy and the problem of perceptual spaces.</li>
                                                </ul>
                                            </div>
                                            <div className="space-y-6 md:pt-10">
                                                <ul className="space-y-4 text-sm italic leading-relaxed">
                                                    <li><Author>Varela, F.</Author> (1977), The nervous system as a closed network.</li>
                                                    <li><Author>Powers, W.</Author> (1973), Behavior: The Control of Perception.</li>
                                                    <li><Author>Piaget, J.</Author> (1969), Biology and Knowledge.</li>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };
