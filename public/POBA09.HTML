                    <main className="pt-40 px-6 md:px-12 lg:px-20 w-full animate-fade-in">
                        
                        <section id="chapter9" className="mb-80 scroll-mt-40">
                            <div className="mb-48 text-center">
                                <span className="text-cyan-400 text-xs font-black tracking-[0.6em] uppercase mb-12 block">Capítulo 9</span>
                                <h2 className="text-6xl md:text-8xl lg:text-[10rem] font-serif text-slate-100 mb-12 uppercase leading-none tracking-tighter">
                                    Explicaciones Simbólicas
                                </h2>
                            </div>

                            <SectionHeader>9.1 Complementariedad Descriptiva</SectionHeader>
                            
                            <SubSectionHeader>9.1.1</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                En el capítulo anterior argumentamos que las nociones de información y propósito son, desde el punto de vista de una explicación operacional, prescindibles. Esto se debe a que la organización viva podría definirse sin recurrir a tales nociones y, por tanto, la explicación subyacente a los fenómenos vivos no necesita incluirlas como componentes constitutivos. Además, argumentamos que tales nociones no pueden entrar en la definición de la organización de un sistema, porque pertenecen al dominio del discurso entre observadores. La información y el propósito pueden entrar para fines pedagógicos. No entran en una explicación operacional, para la cual la autopoiesis es completa.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Sin embargo, esta cuestión necesita un mayor desarrollo. Sigo sosteniendo como válida la crítica contra el uso ingenuo de la información y el propósito como nociones que pueden entrar en la definición operacional de un sistema, sobre la misma base que las interacciones materiales [ej., en la definición de Miller (1966) de los sistemas vivos]. Pero hay limitaciones en nuestra presentación unilateral del último capítulo, derivadas del hecho de que no llevamos nuestra crítica lo suficientemente lejos como para recuperar un papel no ingenuo y útil de las nociones informacionales en las descripciones de los fenómenos vivos. Criticó sin una correspondiente Aufhebung.
                            </Paragraph>

                            <SubSectionHeader>9.1.2</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                El análisis del Capítulo 8 se basó en el supuesto de que las explicaciones operacionales son, en cierto sentido, intrínsecamente preferibles y suficientes. Esto me parece erróneo en dos sentidos que intentaré aclarar en lo que sigue: (1) otorga a la explicación operacional un estatus epistemológico no compatible con la intención misma de la crítica dirigida contra el "uso ingenuo de la información"; (2) descuida el hecho de que los términos informacionales, aunque pertenecen a una categoría de explicación diferente a la de los términos operacionales utilizados en la autopoiesis, podrían seguir utilizándose como términos explicativos válidos y que, además, diferentes modos de explicación podrían coexistir.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Existe, evidentemente, la necesidad de sobreenfatizar un lado descuidado de una polaridad. Del mismo modo, la autonomía no puede concebirse de hecho sin una consideración complementaria de cómo el sistema también es controlado en un contexto dual; en particular, la autopoiesis y la alonomía son caracterizaciones complementarias más que exclusivas para un sistema. Lo que argumentaré ahora es que una explicación operacional para la fenomenología viva necesita un modo complementario de explicación para ser completa, un modo de explicación al que me he referido como simbólico [cf. Sección 8.2.3; véase también, Pattee (1977)]. Una discusión más profunda de esta visión tiene que comenzar con una consideración muy breve de lo que está en la base de la tendencia a preferir explicaciones puramente operacionales y a relegar los términos informacionales a la categoría de "meramente pedagógicos".
                            </Paragraph>

                            <SectionHeader>9.2 Modos de Explicación</SectionHeader>
                            <SubSectionHeader>9.2.1</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                La preferencia por la explicación (puramente) operacional sigue siendo nada más que una preferencia. Tales preferencias provienen de una comunidad de individuos que investigan —una comunidad científica— que, a través de la herencia de una tradición, llegan a acordar ciertos criterios de validez relativos a ciertos valores o intenciones (Törnebohm, 1976; Radnitzky, 1973). La preferencia por la causalidad en el sentido común de la ciencia contemporánea proviene de una orientación predominantemente manipulativa, operacional y tecnológica presente en la ciencia durante los últimos 150 años. Dada tal preferencia, las explicaciones operacionales pasaron a ser las explicaciones: las explicaciones no operacionales no poseen poder de manipulación y predicción. La predicción, de hecho, es el signo de una explicación exitosa en este tipo de filosofía, de modo que la causalidad y la predicción son un dúo triunfante que caracteriza a la ciencia moderna, particularmente en el mundo anglosajón.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Este dúo triunfante, sin embargo, tiene que ser analizado en una perspectiva histórica. Junto a las explicaciones operacionales, ha existido otra tradición igualmente destacada que afirma la validez de las explicaciones finalistas o teleológicas, donde los términos de la explicación no son "porqués" sino "para qués". Estos dos modos tradicionales de explicación se caracterizan mejor con las palabras alemanas Erklärung y Verstehung, usualmente traducidas como explicar y comprender (compenetrarse) (von Wright, 1971).
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Ahora bien, la intención detrás de una explicación de tipo Verstehung no es la manipulación, sino la comprensión, la comunicación de una perspectiva inteligible con respecto a un dominio fenomenológico. Ejemplos típicos son la explicación teleológica en Aristóteles y las explicaciones vitalistas del siglo XVIII. En la medida en que su orientación principal es comprender y comunicar esta comprensión, tales explicaciones son fundamentalmente diferentes en su orientación de la explicación operacional. Es un hecho histórico que la ciencia occidental ha tomado una posición muy fuerte al preferir la explicación causal desde la época de Galileo y, de hecho, convirtió las explicaciones de tipo Verstehung en un enemigo que debía ser proscrito de la ciencia.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Desde nuestra perspectiva, al final de este siglo XX, teniendo suficiente distancia de la era de la Ilustración, las cosas se ven bastante diferentes. A mi modo de ver, hay cuatro desarrollos principales que han contribuido a alterar la preferencia por la explicación puramente operacional. Primero, la gran renovación dentro de la física, el modelo para el empirismo lógico, tras la constitución de la mecánica cuántica y sus variados problemas epistemológicos, hace que tanto la causalidad ingenua como la objetividad ingenua sean completamente inadecuadas. En segundo lugar, el auge de la ciencia biológica ha introducido en la ciencia la necesidad de considerar fenómenos de una complejidad sin límites en relación con las ciencias físicas. El epítome de este desarrollo es la historia de la genética a través del modelo de Watson-Crick, entrelazando componentes estructurales con la aparente necesidad de una descripción de "codificación". En tercer lugar, tenemos el desarrollo extensivo, vinculado al uso de conceptos biológicos, de la cibernética y la teoría de sistemas en el área del diseño y la prescripción de sistemas, donde las nociones de comunicación y propósito están en el núcleo de lo que no es solo el tema principal, sino de muchas de sus consecuencias prácticas, como las computadoras y los complejos sistemas de regulación en los servicios humanos. Finalmente, y de forma mucho más tenue para el mundo de la ciencia, tenemos el despertar, en las escuelas de pensamiento europeas, de la importancia de la explicación de tipo Verstehung en los asuntos humanos.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Todos estos desarrollos desde finales del siglo XIX nos obligan, queramos o no, a una reevaluación de lo que queremos decir con nuestra preferencia por las explicaciones operacionales y, de hecho, de lo que queremos decir cuando entrelazamos tales modos explicativos, ya sea hablando de un programa de computadora o de una danza animal.
                            </Paragraph>

                            <SubSectionHeader>9.2.2</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Lo que, sostengo, es esencial entender en esta relación es que ambas formas de explicación se refieren a modos de descripción relativos a alguna perspectiva del observador o, mejor dicho, deberíamos decir, de una comunidad de investigación. En la descripción operacional el supuesto fundamental es que los fenómenos ocurren a través de una red de relaciones nómicas (ajustadas a leyes) que se siguen unas a otras. En la explicación simbólica y comunicativa, el supuesto fundamental es que los fenómenos ocurren a través de un cierto orden o patrón, pero el foco fundamental de atención se centra en ciertos momentos de tal orden, relativos a la comunidad de investigación. Así, estos modos de explicación son exclusivos y contradictorios solo en la medida en que se asume que las leyes de la naturaleza son comprensibles independientemente de una comunidad de investigación, o que no hay patrones nómicos discernibles en el mundo.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Ambas demandas son, por supuesto, inesenciales y estas visiones alternativas de un fenómeno registrado no tienen por qué ser contradictorias. Si podemos proporcionar una base nómica a un fenómeno, una descripción operacional, entonces una explicación teleológica consiste solo en poner entre paréntesis o abreviar conceptualmente los pasos intermedios de una cadena de eventos causales, y concentrarse en aquellos patrones que son particularmente interesantes para la comunidad de investigación. En consecuencia, Pittendrich introdujo el término teleonómico para designar aquellas explicaciones teleológicas que asumen una estructura nómica en los fenómenos, pero eligen ignorar pasos intermedios para concentrarse en ciertos eventos (Ayala, 1970). Tales explicaciones teleológicas introducen términos finalistas en una explicación mientras asumen su dependencia en alguna red nómica; de ahí el nombre teleo-nómico.
                            </Paragraph>

                            <SectionHeader>9.3 Explicaciones Simbólicas</SectionHeader>
                            <SubSectionHeader>9.3.1</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Como discutimos antes, la conexión entre una descripción operacional (como la autopoiesis) y una descripción finalista reside en el observador que establece el nexo. Así, concluimos, el propósito no desempeña ningún papel causal en la autopoiesis y, por tanto, ningún papel en la descripción de la organización del sistema. La misma conclusión fue válida para las nociones de mensaje, información y código. Lo que es significativo en ambas clases de nociones, el propósito y la información, es que el observador elige ignorar la conexión operativa entre clases de eventos y concentrarse en las relaciones resultantes. Esta es una idea importante, y es insuficiente discutirla como una mera maniobra pedagógica.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Esta posibilidad de elegir ignorar los vínculos nómicos intervinientes está en la base de todas las descripciones simbólicas. Lo que es característico de un símbolo es que hay una distancia, una relación algo arbitraria, entre significante y significado. Esto es, por supuesto, muy inmediato en el discurso humano: las palabras y su significado contextual tienen un modo de acoplamiento histórico y estructural tan remoto y complejo que cualquier esfuerzo por seguir tal conexión nómica es inútil. Por lo tanto, para entender el lenguaje, no rastreamos la secuencia de causas desde la forma de onda en el aire hasta la historia de las operaciones cerebrales, sino que simplemente tomamos como un hecho que podemos entender. (Y precisamente porque no podemos reducirlo todo a una explicación causal, ya que vivimos y crecemos dentro del lenguaje, la vida humana tiene la apertura que tiene).
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Así llegamos a la conclusión de que el propósito y la comprensión simbólica están interrelacionados como un dúo, que es simétrico al dúo de explicación operacional y predicción. Bajo símbolo subsumimos aquí las variedades de sus formas, como código, mensaje, información, etc.
                            </Paragraph>

                            <SubSectionHeader>9.3.2</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Hasta ahora hemos argumentado que las descripciones operacionales y simbólicas no se contradicen entre sí, ya que pertenecen a diferentes niveles de descripción entre una comunidad de observadores. A menos que mantengamos claro en nuestra mente que al cambiar los modos de explicación también estamos cambiando el tipo de marco de referencia en el que operamos, todo el asunto se vuelve confuso. Los términos teleonómico-simbólicos se reducen a componentes operativos, como, por ejemplo, al atribuir la especificación de los componentes a un solo componente (ADN), lo cual es una forma (típicamente) inútil de reduccionismo. Estos dos modos de explicación son distintos, pero pueden relacionarse sin reducir uno al otro.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                La pregunta que queremos hacer ahora es: ¿Necesitamos ambas formas de explicación? ¿No podemos simplemente proporcionar explicaciones operacionales de un fenómeno y estar satisfechos con ellas? En el caso que nos ocupa, estas preguntas equivaldrían a si la caracterización autopoiética es suficiente para satisfacer nuestra necesidad de explicar el conjunto de la fenomenología de los sistemas vivos. En cierto sentido, ya hemos demostrado que, efectivamente, la autopoiesis de cada individuo basta para generar toda la fenomenología de la autonomía de los sistemas vivos y que, a través de su acoplamiento y complejización, podemos ver en ellas el fundamento de los fenómenos evolutivos e históricos. Por tanto, en principio, todos los fenómenos biológicos pueden reducirse a mecanismos autopoiéticos.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Esto, sin embargo, recuerda a la afirmación de que toda la historia del universo podría predecirse si solo conociéramos todas las posiciones y momentos de todas las partículas del universo para poder calcular sus trayectorias futuras. Este tipo de afirmaciones son, sobre todo, epistemológicas. Lo que estamos diciendo en el caso de la autopoiesis es que, si pudiéramos seguir todas las contingencias apropiadas, la fenomenología biológica se desplegaría a partir del mecanismo autopoiético. Lo que es obvio, sin embargo, es que esta afirmación, aunque señala la suficiencia de la autopoiesis como explicación operacional, no dice nada sobre si es cognitivamente posible o satisfactoria. Examinemos esto con más detalle. Por lo poco que sabemos de los estudios sobre el origen de los sistemas vivos y los sistemas protocelulares, la mera producción de un límite a través de una dinámica química es claramente una condición necesaria pero tal vez no suficiente para un precursor de los sistemas celulares. Una cuestión fundamental aquí, como señaló Pattee (1972), es la fiabilidad de la especificación de los componentes frente a la variabilidad disponible para la selección. La selección y la evolución no pueden existir sin la reproducción. Los sistemas autopoiéticos pueden convertirse en sistemas reproductivos, como discutimos en el Capítulo 5. Sin embargo, su reproducción puede volverse evolutivamente interesante solo si (1) el proceso de especificación de componentes es confiable, de modo que haya continuidad de estructuras a través del tiempo, y (2) son lo suficientemente flexibles como para generar una variedad de componentes para que la selección opere.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Los sistemas vivos en realidad evolucionaron a través de una combinación apropiada de procesos de especificación y constitución, paradigmáticamente vista en el acoplamiento entre ácidos nucleicos y proteínas. Los ácidos nucleicos cumplen un papel esencial en la especificación de los componentes proteicos de las células, que son en su mayoría responsables de los procesos de constitución y orden. Esto se ve claramente en el trabajo de Eigen (1971) sobre la evolución temprana de los sistemas vivos (cf. Figura 4-1), donde la estructura mínima capaz de generar una secuencia de unidades similares a células toma la forma de un "hiperciclo" (es decir, clausura organizacional) en el que hay componentes "informacionales" (ácido nucleico) y componentes "estructurales" (proteínas). Por supuesto, la molécula "informacional" no es en absoluto diferente de cualquier otra molécula en su proceso de interacción entre especies químicas. La razón por la que surge el nombre "informacional" es que podemos cambiar la escala de tiempo de nuestra observación, considerar la realización de estas unidades a través de varias generaciones, y observar la continuidad y confiabilidad de su proceso de especificación de componentes en un proceso evolutivo. En otras palabras, abstraemos o ponemos entre paréntesis en nuestras descripciones una serie de pasos causales o nómicos en el proceso real de especificación, y así reducimos nuestra descripción a un esqueleto que asocia una cierta parte de un ácido nucleico con un cierto segmento de proteína. A continuación observamos que este tipo de descripción simplificada de un proceso dinámico real es útil para seguir las secuencias de pasos reproductivos de una generación a otra, en la medida en que el proceso dinámico se mantiene estable (es decir, los tipos de dinámica responsables del enlace, plegamiento, etc.). Este parece ser el origen de la idea del material genético como el elemento central de estudio para la evolución y los procesos históricos en biología. Una explicación simbólica, como la descripción de algunos componentes celulares como genes, revela la emergencia de ciertos patrones coherentes de comportamiento a los que elegimos prestar atención.
                            </Paragraph>

                            <SubSectionHeader>9.3.3</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Al señalar que la coherencia del comportamiento en una dinámica química es la base de la descripción simbólica, no estamos diciendo nada sobre cómo surge realmente tal comportamiento coherente. Esta no es una cuestión sencilla, y es una que no consideraremos con gran detalle aquí. Parece que el análisis de Pattee en términos de las restricciones no holónomas en los sistemas dinámicos es la descripción más adecuada (cf. Pattee, 1972, 1977). Por ejemplo, la estructura tridimensional de una enzima es un proceso dinámico restringido por la secuencia de aminoácidos especificada por la célula. Estas restricciones determinan una forma que es peculiar a la enzima, y están en la base de su capacidad enzimática. La abreviatura en una descripción simbólica funciona así: Un gen codifica un evento de reconocimiento enzimático. La base física de esta descripción se encuentra en las restricciones no holónomas (no integrables) introducidas en la dinámica físico-química del plegamiento por la secuencia de aminoácidos.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Como señala Pattee, al describir una dinámica a través de restricciones, el observador está de hecho cambiando la perspectiva hacia un contexto más envolvente. Pragmáticamente esto se expresa etiquetando diferentes niveles en una jerarquía de controles, desde un nivel superior al siguiente inferior, ej., genoma a catálisis enzimática. En otras palabras, dado un cierto comportamiento, podemos determinar inmediatamente una descripción simbólica, las restricciones en las que se basa, y el nivel jerárquico responsable de introducir estas restricciones.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                La evolución natural de tales restricciones a partir de un fondo homogéneo de dinámica química es, por supuesto, el resultado de este tipo de análisis. Remitimos al lector a las discusiones en Pattee (1972, 1977) y Eigen (1971).
                            </Paragraph>

                            <SubSectionHeader>9.3.4</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Obsérvese que, al cambiar de un modo de descripción (los procesos que determinan la autopoiesis de un individuo) a una descripción simbólica (que trata con las secuencias evolutivas de estructuras autopoiéticas), realizamos un salto en el tiempo que revela un cambio radical de perspectiva. Lo que redescubrimos es la dualidad clásica entre tiempo fisiológico y tiempo evolutivo. Ambos parecen necesarios si queremos tener una explicación satisfactoria de la fenomenología de los sistemas vivos. Si no aceptamos el cambio de una descripción causal, entonces el manejo real de los fenómenos evolutivos, que depende de cuestiones de fiabilidad y reproducción, se vuelve literalmente imposible de comprender. ¿Cómo vamos a concebir y pensar siquiera sobre secuencias de unidades autopoiéticas en términos puramente operacionales, donde todos los componentes participan en la especificación de la unidad, si apenas podemos hacerlo para un solo individuo? Debemos reducir nuestra explicación a una explicación tipo símbolo encarnada en la idea de genoma, y proceder desde esa forma de descripción simbólica no causal para cubrir los fenómenos evolutivos añadiendo quizás nuevas nociones causales como la selección natural en este dominio simbólico. En otras palabras, es cierto que todos los fenómenos históricos y evolutivos son, en última instancia, reducibles al acoplamiento de unidades autopoiéticas a sus entornos. Sin embargo, esto es así por razones puramente lógicas. Para las capacidades cognitivas de la comunidad de observadores, las explicaciones puramente operacionales no están en condiciones de satisfacer el grado de detalle que necesitamos para las explicaciones ontogenéticas y filogenéticas, y un cambio en el modo explicativo es obligatorio (véase también Locker y Coulter, 1977). Así, la autopoiesis es, por razones lógicas, necesaria y suficiente para caracterizar a los sistemas vivos, como se afirmó anteriormente. Lo que es incompleto aquí es que la autopoiesis, aunque necesaria, no es suficiente para dar una explicación satisfactoria de los fenómenos vivos por razones tanto lógicas como cognitivas.
                            </Paragraph>

                            <SectionHeader>9.4 Explicaciones Complementarias</SectionHeader>
                            <SubSectionHeader>9.4.1</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Decir que las explicaciones teleonómico-simbólicas no son realmente necesarias es sucumbir a un prejuicio de nuestra tradición histórica que es hora de revisar, porque en la práctica real no podemos prescindir de las explicaciones operacionales y simbólicas. Una preferencia por las explicaciones operacionales parece estar arraigada en el entendimiento de que las causas están "allá afuera" y reflejan un estado de cosas independiente del descriptor. Esto es, por el mismo argumento utilizado aquí, insostenible. Las causas y las "leyes de la naturaleza" son modos de descripciones adoptados por comunidades de investigación para algún propósito intencional (como la manipulación y la predicción), y especifican modos de acuerdo y, por tanto, de acoplamiento con el entorno. Sin embargo, en última instancia, una descripción operacional no es más ni menos que un modo de acuerdo dentro de una comunidad de investigación, y de ninguna manera tiene un estatus intrínsecamente superior a una explicación simbólica. Simplemente tienen consecuencias diferentes: una explicación simbólica genera una forma de acuerdo en la comunidad de investigación y, por tanto, un acoplamiento con el entorno, que no es tan dramáticamente visible en la manipulación, pero es más visible en modos de relación más difusos. Un buen ejemplo es la forma en que el pensamiento darwiniano ha modificado nuestra visión completa de los asuntos humanos: no a través de la manipulación, sino a través de la forma de acuerdo sobre cuestiones que son centrales para la imagen del hombre, como el origen y la descendencia. Es muy lamentable que las explicaciones operacionales se identifiquen normalmente con explicaciones simpliciter. Ambos modos de explicación están, en última instancia, en el dominio del discurso de la comunidad de observadores, y su única diferencia radica en el modo en que generan acuerdo. Me parece que hay enormes ventajas en mantener esta dualidad de explicaciones a la vista. Al quedarnos con las descripciones puramente operacionales, nos vemos obligados a utilizar otros modos descriptivos de una manera bastante descuidada y poco cuidadosa, como es típico en la biología molecular. Este tipo de actitud es un remanente de la época del positivismo lógico con su insistencia en el monismo metodológico.
                            </Paragraph>

                            <SubSectionHeader>9.4.2</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                En el otro extremo, la actitud vitalista y, lo que es más importante, la actitud de la gestalt del computador, que toman la información como "materia", están igualmente equivocadas. Esta última actitud es interesante, pues ha tomado el mismo tipo de sabor metodológico implícito en las descripciones operacionales, y lo ha aplicado a un dominio donde simplemente no funciona. Esto es típico en la ciencia de la computación y la ingeniería de sistemas, donde la información y el procesamiento de la información están en la misma categoría que la materia y la energía. Esta actitud tiene sus raíces en el hecho de que las ideas de sistemas y la cibernética crecieron en una atmósfera tecnológica que reconocía la insuficiencia del paradigma puramente causalista (¿quién pensaría en manejar una computadora a través de las ecuaciones de campo de miles de circuitos integrados?), pero no tenía conciencia de la necesidad de hacer explícito el cambio de perspectiva adoptado por la comunidad de investigación. En la medida en que el campo de la ingeniería es prescriptivo (por diseño), este tipo de error epistemológico sigue siendo viable. Sin embargo, se vuelve insoportable e inútil cuando se exporta del dominio de la prescripción al de la descripción de sistemas naturales, en sistemas vivos y asuntos humanos. Asumir en estos campos que la información es algo que se transmite, y que los símbolos son cosas que pueden tomarse al pie de la letra, o que el propósito y los objetivos son transparentes desde el sistema mismo como un programa, es todo, me parece, un sinsentido. El hecho es que la información no existe independientemente de un contexto de organización que genera un dominio cognitivo, desde el cual una comunidad de observadores puede describir ciertos elementos como informacionales y simbólicos. La información, sensu strictu, no existe. (Ni, por supuesto, las "leyes" de la naturaleza).
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Así, al poner estos dos modos de explicaciones, históricamente antagónicos, en una perspectiva dualista, ganamos poder de explicación. Y también ambos modos de explicación se modifican significativamente. Por un lado, las explicaciones télico-simbólicas no pueden aducirse sin incrustarlas en un sustrato causal nómico que pueda, en principio, dar cuenta de ellas, es decir, una red de procesos que se abstrae en el proceso de definir un símbolo. Esto se ve claramente en la transición del nombre teleológico al nombre teleonómico: no hay meta o propósito sin un marco de cadenas de eventos abstraídas de las que estamos abstrayendo. Por otro lado, la explicación causal también se modifica, pues ya no mantiene su posición como rey metodológico, y debe dejar paso a explicaciones no causales como igualmente válidas. Esto equivale ni más ni menos que a un cambio en las imágenes de autoridad de nuestra comunidad de investigación; no tiene nada que ver con los estándares de la ciencia o revoluciones románticas. Descuidar este cambio en la autoridad implica, por decir lo menos, un uso descuidado de las explicaciones simbólicas en las ciencias naturales, y una división entre las ciencias naturales y las ciencias humanas, donde el papel de la comunicación y la comprensión gana una importancia central en preferencia a los mecanismos causales que no podemos esperar tener. En resumen, entonces, la interacción dual entre estos dos modos de explicación es productiva cuando y solo cuando los dos se relacionan entre sí de una manera generativa haciendo explícito dónde ocurre el cambio de marco de referencia.
                            </Paragraph>

                            <SubSectionHeader>9.4.3</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Un caso elemental de tal operación dualista es evidente en la comprensión del origen de la vida y el uso del material genético como un dispositivo explicativo en la evolución y el desarrollo. A modo de otro ejemplo, consideremos la interacción de las moléculas hormonales con la superficie receptora de una célula. Este tipo de interacción se describe mejor abstrayendo el proceso real de interacción y la descripción detallada de la dinámica autopoiética, y expresándolo en términos de un símbolo (o señal) con un efecto regulador, una descripción que emerge a través de un relato contraído de la dinámica autopoiética de la célula individual. A riesgo de ser molesto, permítanme señalar que no hay nada en la molécula de la hormona que sea informacional; su contenido simbólico viene dado por, primero, el tipo de dinámica determinado por la unidad autopoiética y su dominio de interacciones y, segundo, el observador que desea seguir una cierta coherencia en la dinámica individual y, por tanto, elige contraer una secuencia larga y compleja de cadenas nómicas.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Considerar esta interacción célula-hormona en cualquier sentido como "intrínsecamente" informacional, o que el organismo está "captando información" del entorno, sería fundamentalmente erróneo. Pero parece igualmente erróneo no ver en estos tipos de eventos el comienzo de interacciones simbólicas tan prevalentes en organismos superiores y en el hombre, y la importancia de su continuidad con las explicaciones operacionales.
                            </Paragraph>

                            <SectionHeader>9.5 Descripciones Simbólicas Admisibles</SectionHeader>
                            <SubSectionHeader>9.5.1</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Pasamos ahora a una pregunta persistente en la discusión anterior: ¿Qué ha de contar como un símbolo, y cuándo tenemos derecho a una explicación simbólica? Caracterizar lo que se entiende por ambos términos es importante, y sin embargo es tan difícil como caracterizar una causa o una explicación operacional. Claramente, los criterios para ambos dependen de las preferencias de la comunidad de observadores. Pero dado que desde el punto de vista de los sistemas naturales hemos concluido que tales explicaciones simbólicas no son prescindibles, intentaré ser más preciso sobre cómo uso estos términos aquí. Es decir, preguntamos: ¿Qué es una descripción simbólica admisible?
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Dos características principales caracterizan a los símbolos en los sistemas naturales: (1) determinación interna, y (2) composición.
                            </Paragraph>

                            <div className="space-y-12 my-20 pl-8 md:pl-20 border-l border-slate-800">
                                <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                    1. Determinación Interna. Un objeto o evento es un símbolo solo si es una ficha para una cadena nómica abreviada que ocurre dentro de los límites de la clausura organizacional del sistema. En otras palabras, siempre que la clausura del sistema determina ciertas regularidades ante interacciones y perturbaciones internas o externas, tales regularidades pueden abreviarse como un símbolo, usualmente el elemento inicial o terminal de la cadena nómica. Un ejemplo típico es el "código" genético. Un triplete de bases nitrogenadas representa o "codifica" un aminoácido en una secuencia de proteínas en la medida en que hay un patrón regular en la dinámica química, que podemos ver repetido una y otra vez. Pero tal patrón dinámico ocurre enteramente dentro de los límites de la clausura de la célula; la propia célula contiene la "interpretación" para el símbolo. Elegimos entonces el triplete como el símbolo para los aminoácidos abreviando la larga secuencia de pasos químicos en el ciclo autopoiético y abstrayendo estos pasos de la recursión interna donde tales reacciones químicas operan normalmente.
                                </Paragraph>
                                <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                    Como resultado, en nuestra descripción vemos una relación aparentemente arbitraria entre significante y significado (ej., triplete y aminoácido) producida al ignorar los pasos causales. En la medida en que este ignorar se basa en las regularidades de la dinámica de un sistema autónomo, esta descripción simbólica es admisible, y juega un papel útil en el estudio del sistema autopoiético en una escala de tiempo mayor. Un análisis similar es, por supuesto, posible para las interacciones hormona-célula. Aunque en este caso el elemento inicial en la cadena nómica abstraída es una perturbación externa, se relaciona con eventos causales que ocurren enteramente dentro de la célula y están determinados por ella.
                                </Paragraph>
                                <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                    En los ejemplos moleculares de símbolos admisibles, sus cadenas causales subyacentes son todavía aparentes y accesibles, y podemos cambiar de un tipo de descripción al otro con cierta facilidad. Sin embargo, en el caso de los sistemas inmune o nervioso, y ciertamente en el caso del lenguaje humano, solo tenemos disponibles para nosotros las regularidades simbólicas brutas; tratar de hacer explícitas las cadenas nómicas subyacentes es, en general, infructuoso. Aun así, el proceso simbólico ocurre dentro de, y está determinado por, la clausura del sistema correspondiente (cf. Capítulos 14, 15).
                                </Paragraph>
                                <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                    Si usamos una descripción simbólica para un sistema que no puede interpretarse como cadenas nómicas abreviadas, o bien donde las regularidades en la conducta no están dentro y determinadas por la clausura del sistema, entonces diremos que es una descripción simbólica inadmisible. Así, por ejemplo, las colisiones accidentales entre bacterias en un cultivo no generan ningún patrón regular o recurrente en la dinámica celular, aunque podrían hacerlo en el cultivo en general. Describir tales encuentros corporales como simbólicos sería inadmisible.
                                </Paragraph>
                                <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                    En resumen, entonces, podemos decir que la determinación interna de un símbolo le da las cualidades de arbitrariedad e interpretabilidad, que están relacionadas y ambas se basan en la clausura del sistema.
                                </Paragraph>
                                <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                    2. Composición. Un proceso que admite una descripción simbólica podría o no ser de interés y potencial ontogénico y filogénico. En otras palabras, de todas las posibles regularidades que pueden surgir de la clausura de un sistema, solo algunas de ellas podrían conducir (a través del acoplamiento estructural o la evolución) a un cambio adaptativo significativo en el dominio cognitivo del sistema.
                                </Paragraph>
                                <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                    Sobre bases empíricas, las regularidades que han sido fértiles y se han conservado en la evolución son aquellas tales que los símbolos que las representan pueden verse como componibles como un lenguaje; en otras palabras, tales que los símbolos individuales, como fichas discretas, pueden interactuar entre sí en una sintaxis capaz de generar nuevos patrones en combinación. De nuevo, el ejemplo típico son los símbolos genéticos, que en una disposición lineal son eminentemente componibles. Esto es todavía algo posible, pero no tan claramente, en el caso de señales externas y receptores de superficie. Es claramente imposible en el caso de la quimiotaxis y las señales de gradiente. Los grandes sistemas simbólicos de los seres vivos —los sistemas genético y nervioso y el lenguaje humano— están todos basados en regularidades cuyos símbolos son componibles a través de reglas que generan una vasta clase de nuevos fenómenos a partir de un conjunto de elementos discretos.
                                </Paragraph>
                                <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                    Así, la componibilidad es una dimensión de los eventos simbólicos que es independiente de la determinación interna, y que aborda la cuestión del valor de selección en el desarrollo y la evolución [1].
                                </Paragraph>
                            </div>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                La identidad y autonomía de un sistema, en cualquier dominio, depende de su clausura organizacional. Sin embargo, para comprender plenamente cómo el dominio cognitivo de tal sistema puede operar y modificarse, debemos mirar las regularidades dinámicas que surgen dentro del sistema y que pueden tratarse como eventos simbólicos. Estos son esenciales porque el comportamiento del sistema puede entonces tratarse como si operara sobre la base del número discreto de regularidades a la manera de reglas operando sobre los símbolos de un alfabeto. El dominio cognitivo de tal sistema puede operar como si fuera sobre un conjunto de símbolos discretos que representan una dinámica compleja pero regular. Evolutivamente, ha habido una fuerte presión para desarrollar sistemas autónomos tales que las regularidades componibles surjan profusamente. El sistema nervioso es el caso paradigmático, y es precisamente por eso que amplía el dominio cognitivo de un organismo de una manera tan dramática (cf. Capítulo 15).
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Así, junto a la clausura organizacional, las descripciones simbólicas admisibles son realmente lo que se necesita para dar cuenta tanto de la existencia como del cambio progresivo de los sistemas autónomos en la naturaleza y la cultura. Son visiones complementarias.
                            </Paragraph>

                            <SubSectionHeader>Fuentes</SubSectionHeader>

                                <div className="flex flex-col md:flex-row items-start gap-8 lg:gap-12">
                                    <span className="text-cyan-400 font-serif text-5xl lg:text-8xl font-bold leading-none select-none shrink-0">
                                        [{activeFootnote}]
                                    </span>
                                    <p className="text-base md:text-lg lg:text-2xl leading-relaxed text-justify font-light tracking-wide italic">
                                        {FOOTNOTES[activeFootnote]}
                                    </p>
                                </div>
                                <div className="absolute top-8 right-12 text-slate-600 text-xs uppercase tracking-widest font-bold">Nota al pie</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
