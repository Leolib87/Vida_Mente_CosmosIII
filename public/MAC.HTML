<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecanismo de Aseguramiento de la Calidad</title>
    
    <!-- 1. Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 3. Babel para entender JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Ajuste para asegurar el fondo oscuro en toda la página */
        body { background-color: #020617; margin: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <!-- Aquí se montará nuestra aplicación React -->
    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIGURACIÓN INICIAL ---
        const { useState, useEffect } = React;
        
        // --- DEFINICIÓN DE ICONOS (SVG Inline para evitar errores de librería externa) ---
        const IconBase = ({ children, className }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width="24" 
                height="24" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const ShieldCheck = (props) => <IconBase {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" /><path d="m9 12 2 2 4-4" /></IconBase>;
        const Users = (props) => <IconBase {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></IconBase>;
        const ArrowRight = (props) => <IconBase {...props}><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></IconBase>;
        const Scale = (props) => <IconBase {...props}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z" /><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z" /><path d="M7 21h10" /><path d="M12 3v18" /><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2" /></IconBase>;
        const GraduationCap = (props) => <IconBase {...props}><path d="M22 10v6M2 10l10-5 10 5-10 5z" /><path d="M6 12v5c3 3 9 3 12 0v-5" /></IconBase>;
        const AlertTriangle = (props) => <IconBase {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><path d="M12 9v4" /><path d="M12 17h.01" /></IconBase>;
        const FileText = (props) => <IconBase {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" x2="8" y1="13" y2="13" /><line x1="16" x2="8" y1="17" y2="17" /><line x1="10" x2="8" y1="9" y2="9" /></IconBase>;
        const BarChart3 = (props) => <IconBase {...props}><path d="M3 3v18h18" /><path d="M18 17V9" /><path d="M13 17V5" /><path d="M8 17v-3" /></IconBase>;
        const Play = (props) => <IconBase {...props}><polygon points="5 3 19 12 5 21 5 3" /></IconBase>;
        const Pause = (props) => <IconBase {...props}><rect width="4" height="16" x="6" y="4" /><rect width="4" height="16" x="14" y="4" /></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" /><path d="M8 16H3v5" /></IconBase>;
        const HeartHandshake = (props) => <IconBase {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" /><path d="M12 5 9.04 7.96a2.17 2.17 0 0 0 0 3.08v0c.82.82 2.13.85 3 .07l2.07-1.9a2.82 2.82 0 0 1 3.15-.26c2.8 1.45 2.6 3.96 2 4.61" /></IconBase>;
        const Search = (props) => <IconBase {...props}><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></IconBase>;
        const Zap = (props) => <IconBase {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></IconBase>;
        const ClipboardCheck = (props) => <IconBase {...props}><rect width="8" height="4" x="8" y="2" rx="1" ry="1" /><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" /><path d="m9 14 2 2 4-4" /></IconBase>;
        const BookOpen = (props) => <IconBase {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></IconBase>;
        const Info = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10" /><path d="M12 16v-4" /><path d="M12 8h.01" /></IconBase>;
        
        // Icono personalizado (mantenido del código original)
        const ActivityIcon = ({ className }) => (
            <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        );

        // --- DATOS DEL CICLO ---
        const stages = [
            {
                id: 'ingreso',
                title: 'Ingreso',
                subtitle: 'Diagnóstico Inicial',
                color: 'blue',
                outer: {
                    label: 'Diagnóstico Inicial',
                    icon: <Search className="w-4 h-4" />,
                    concept: 'Caracterización del Perfil de Ingreso',
                    detail: 'Este hito cumple con la Ley 20.903 (Sistema de Desarrollo Profesional Docente) y el Criterio 2, Nivel 2 de la CNA. Su función principal es detectar brechas de entrada respecto a las competencias básicas requeridas, permitiendo una caracterización temprana de la cohorte.',
                    normative: 'Ley 20.903; CNA Crit. 2'
                },
                inner: {
                    label: 'Nivelación PACE',
                    icon: <Users className="w-4 h-4" />,
                    action: 'Nivelación PACE / Mentoría',
                    detail: 'En respuesta al diagnóstico, se activan soportes (basados en Rex. N° 680/2015 MINEDUC) diseñados para cerrar las brechas detectadas. El objetivo es asegurar la equidad en la progresión académica desde el primer semestre.',
                    ref: 'CNA Crit. 2 (Brechas)'
                }
            },
            {
                id: 'inicial',
                title: 'Ciclo Inicial',
                subtitle: 'Asignaturas Críticas',
                color: 'orange',
                outer: {
                    label: 'Asignaturas Críticas',
                    icon: <AlertTriangle className="w-4 h-4" />,
                    concept: 'Monitoreo de la Progresión Académica',
                    detail: 'Se monitorean las tasas de aprobación crítica para identificar estudiantes en riesgo de deserción o retraso curricular temprano. Responde al estándar de Retención y Progresión del Criterio 2 de la CNA (Plan de Estudios).',
                    normative: 'CNA Crit. 2: Retención'
                },
                inner: {
                    label: 'Monitoreo Alertas',
                    icon: <ActivityIcon className="w-4 h-4" />,
                    action: 'Monitoreo de Alertas',
                    detail: 'Gestión activa de alertas tempranas. Se implementan intervenciones focalizadas en las asignaturas con altas tasas de reprobación para prevenir la deserción y asegurar la permanencia estudiantil.',
                    ref: 'CNA Crit. 2 (Progresión)'
                }
            },
            {
                id: 'intermedio',
                title: 'Intermedio',
                subtitle: 'Ev. 4° Semestre',
                color: 'indigo',
                outer: {
                    label: 'Ev. 4° Semestre',
                    icon: <Scale className="w-4 h-4" />,
                    concept: 'Hito Evaluativo: Mauricio Villa',
                    detail: 'Verificación progresiva de competencias pedagógicas y disciplinares iniciales (R.A. 1-4). Este hito permite a la carrera tomar decisiones académicas y filtrar el paso al ciclo profesional, cumpliendo con la evaluación progresiva del Perfil de Egreso (CNA Criterio 1).',
                    normative: 'CNA Crit. 1: Perfil de Egreso'
                },
                inner: {
                    label: 'Taller Riesgo',
                    icon: <HeartHandshake className="w-4 h-4" />,
                    action: 'Taller de Riesgo / Mentoría',
                    detail: 'Intervención focalizada para estudiantes con rezago académico detectado en la evaluación de medio término. Se activan planes de acompañamiento específicos para evitar que las brechas se profundicen en el ciclo profesional.',
                    ref: 'CNA Crit. 2 (Apoyo Riesgo)'
                }
            },
            {
                id: 'nacional',
                title: 'Nacional',
                subtitle: 'Resultados END',
                color: 'red',
                outer: {
                    label: 'Resultados END',
                    icon: <FileText className="w-4 h-4" />,
                    concept: 'Evaluación Nacional Diagnóstica',
                    detail: 'Hito de cumplimiento legal obligatorio (Ley 20.903, Art. 19). La carrera utiliza estos resultados externos no solo como estadística, sino como insumo crítico para diseñar planes de mejora obligatorios para estudiantes con bajo desempeño.',
                    normative: 'Ley 20.903; CNA Crit. 6'
                },
                inner: {
                    label: 'Taller Remedial',
                    icon: <Zap className="w-4 h-4" />,
                    action: 'Taller Remedial END',
                    detail: 'Implementación de talleres específicos y obligatorios para subsanar las debilidades normativas y disciplinares detectadas en la END. Es un requisito indispensable para asegurar la calidad antes de la titulación.',
                    ref: 'Ley 20.903 (Obligación Remediales)'
                }
            },
            {
                id: 'avanzado',
                title: 'Avanzado',
                subtitle: 'Ev. Segundo Ciclo',
                color: 'teal',
                outer: {
                    label: 'Ev. 2° Ciclo',
                    icon: <ClipboardCheck className="w-4 h-4" />,
                    concept: 'Hito: Valenzuela / Jorge',
                    detail: 'Control de calidad previo a la fase de síntesis profesional. Se verifica la adquisición de competencias avanzadas y la coherencia del plan de estudios (CNA Criterio 2), asegurando que el estudiante está apto para la intervención práctica real.',
                    normative: 'CNA Crit. 2: Coherencia'
                },
                inner: {
                    label: 'Remedial Avanz.',
                    icon: <BookOpen className="w-4 h-4" />,
                    action: 'Taller Remedial Avanzado',
                    detail: 'Fortalecimiento disciplinar y pedagógico intensivo (Mentoría Avanzada). Su objetivo es cerrar cualquier brecha remanente para garantizar que el estudiante llegue plenamente preparado a su práctica profesional final.',
                    ref: 'CNA Crit. 6 (Autorregulación)'
                }
            },
            {
                id: 'egreso',
                title: 'Egreso',
                subtitle: 'Práctica y Seminario',
                color: 'green',
                outer: {
                    label: 'Práctica/Sem.',
                    icon: <GraduationCap className="w-4 h-4" />,
                    concept: 'Hito Final (Práctica y Seminario)',
                    detail: 'Validación final del Perfil de Egreso a través de la demostración de capacidades en contextos reales. Cumple con el requisito de vinculación bidireccional con el medio escolar (CNA Criterio 3: Formación Práctica).',
                    normative: 'CNA Crit. 3: Formación Práctica'
                },
                inner: {
                    label: 'Retroalim. Plan',
                    icon: <RefreshCw className="w-4 h-4" />,
                    action: 'Retroalimentación al Plan de Estudios',
                    detail: 'El "Bucle de Calidad" se cierra aquí: el desempeño de los estudiantes en práctica genera información que se utiliza para ajustar y actualizar el Plan de Estudios, garantizando la pertinencia curricular.',
                    ref: 'CNA Crit. 3 (Práctica Progresiva)'
                }
            }
        ];

        // --- COMPONENTE PRINCIPAL ---
        const QualityMechanismApp = () => {
            const [activeIndex, setActiveIndex] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);

            useEffect(() => {
                let interval;
                if (isPlaying) {
                interval = setInterval(() => {
                    setActiveIndex((prev) => (prev + 1) % stages.length);
                }, 5000);
                }
                return () => clearInterval(interval);
            }, [isPlaying]);

            const activeStage = stages[activeIndex];

            // Helper para posicionar items en círculo
            const getPosition = (index, total, radius) => {
                const angle = (index * (360 / total) - 90) * (Math.PI / 180);
                const x = radius * Math.cos(angle);
                const y = radius * Math.sin(angle);
                return { x, y };
            };

            return (
                <div className="min-h-screen bg-slate-950 text-slate-200 font-sans flex flex-col relative overflow-hidden selection:bg-amber-500 selection:text-slate-900">
                
                {/* Fondo Decorativo */}
                <div className="absolute inset-0 bg-[linear-gradient(to_right,#1e293b_1px,transparent_1px),linear-gradient(to_bottom,#1e293b_1px,transparent_1px)] bg-[size:40px_40px] opacity-[0.15] z-0 pointer-events-none"></div>
                <div className="absolute inset-0 bg-radial-at-center from-slate-900/0 via-slate-950/80 to-slate-950 z-0 pointer-events-none"></div>

                {/* Header */}
                <header className="relative z-20 border-b border-white/5 bg-slate-900/60 backdrop-blur-xl sticky top-0">
                    <div className="max-w-7xl mx-auto p-4 md:p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div className="flex items-center gap-4">
                        <div className="bg-amber-500/10 p-2 rounded-xl border border-amber-500/20">
                        <ShieldCheck className="w-8 h-8 text-amber-400" />
                        </div>
                        <div>
                        <h1 className="text-xl md:text-2xl font-bold leading-tight text-white tracking-tight">Mecanismo de Aseguramiento de la Calidad</h1>
                        <p className="text-slate-400 text-xs md:text-sm font-medium">
                            CNA Pedagogía &bull; Ley 20.903 &bull; Autorregulación
                        </p>
                        </div>
                    </div>
                    
                    <button 
                        onClick={() => setIsPlaying(!isPlaying)}
                        className={`flex items-center gap-2 px-6 py-2.5 rounded-full font-semibold transition-all shadow-lg text-sm border backdrop-blur-sm cursor-pointer
                        ${isPlaying 
                            ? 'bg-amber-500/10 text-amber-200 border-amber-500/50 hover:bg-amber-500/20 shadow-amber-900/20' 
                            : 'bg-white/5 text-slate-300 border-white/10 hover:bg-white/10 hover:text-white'
                        }`}
                    >
                        {isPlaying ? <Pause className="w-4 h-4 fill-current" /> : <Play className="w-4 h-4 fill-current" />}
                        {isPlaying ? 'PAUSAR CICLO' : 'INICIAR RECORRIDO'}
                    </button>
                    </div>
                </header>

                <main className="flex-1 relative z-10 max-w-7xl mx-auto w-full p-4 md:p-8 flex flex-col gap-8 lg:gap-12">
                    
                    <div className="flex flex-col xl:flex-row gap-8 items-center justify-center min-h-[600px]">
                    
                    {/* VISUALIZACIÓN DE CICLOS */}
                    <div className="relative w-full max-w-[500px] h-[500px] flex-shrink-0 flex items-center justify-center scale-90 md:scale-100 xl:mr-12">
                        
                        {/* Núcleo Central */}
                        <div className="absolute inset-0 m-auto w-28 h-28 rounded-full bg-slate-900 flex flex-col items-center justify-center text-center p-2 shadow-[0_0_50px_rgba(0,0,0,0.8)] z-30 border border-slate-700/50 ring-1 ring-white/10 backdrop-blur-sm">
                        <ShieldCheck className="w-8 h-8 text-white mb-1 drop-shadow-md" />
                        <span className="text-[10px] text-slate-300 font-bold uppercase tracking-widest leading-tight">Calidad<br/>Interna</span>
                        </div>

                        {/* ANILLO INTERIOR */}
                        <div className="absolute inset-0 m-auto w-[240px] h-[240px] rounded-full border border-indigo-500/20 bg-indigo-500/5 -z-0"></div>
                        
                        {stages.map((stage, index) => {
                        const radius = 120;
                        const pos = getPosition(index, stages.length, radius);
                        const isActive = index === activeIndex;

                        return (
                            <button
                            key={`inner-${stage.id}`}
                            onClick={() => { setActiveIndex(index); setIsPlaying(false); }}
                            style={{ transform: `translate(${pos.x}px, ${pos.y}px)` }}
                            className={`absolute inset-0 m-auto w-12 h-12 rounded-full flex flex-col items-center justify-center shadow-lg transition-all duration-500 z-20 group cursor-pointer
                                ${isActive 
                                ? 'bg-indigo-600 text-white scale-125 ring-4 ring-indigo-900/80 shadow-[0_0_20px_rgba(99,102,241,0.6)]' 
                                : 'bg-slate-800 text-indigo-400 border border-indigo-500/30 hover:bg-slate-700'}
                            `}
                            >
                            {stage.inner.icon}
                            <div className={`absolute left-1/2 top-1/2 w-[60px] h-[2px] -z-10 origin-left transition-colors duration-300
                                ${isActive ? 'bg-slate-400' : 'bg-slate-800'}
                            `} style={{ transform: `rotate(${index * (360 / stages.length) - 90}deg) translate(0, -50%)` }}></div>
                            
                            <span className={`absolute -bottom-7 text-[9px] md:text-[10px] font-bold px-2.5 py-1 rounded-md whitespace-nowrap transition-all duration-300 border backdrop-blur-md
                                ${isActive 
                                ? 'text-white bg-indigo-600/90 border-indigo-400 z-30 scale-105 shadow-lg translate-y-1' 
                                : 'text-indigo-300 bg-slate-900/80 border-slate-700 z-10 opacity-70 group-hover:opacity-100'}
                            `}>
                                {stage.inner.label}
                            </span>
                            </button>
                        );
                        })}

                        {/* ANILLO EXTERIOR */}
                        <div className="absolute inset-0 m-auto w-[400px] h-[400px] rounded-full border border-amber-500/20 -z-10 bg-slate-900/20"></div>
                        
                        {stages.map((stage, index) => {
                        const radius = 200;
                        const pos = getPosition(index, stages.length, radius);
                        const isActive = index === activeIndex;

                        return (
                            <button
                            key={`outer-${stage.id}`}
                            onClick={() => { setActiveIndex(index); setIsPlaying(false); }}
                            style={{ transform: `translate(${pos.x}px, ${pos.y}px)` }}
                            className={`absolute inset-0 m-auto w-16 h-16 rounded-full flex flex-col items-center justify-center shadow-xl transition-all duration-500 z-20 cursor-pointer
                                ${isActive 
                                ? 'bg-amber-500 text-slate-950 scale-110 ring-4 ring-amber-900/50 shadow-[0_0_25px_rgba(245,158,11,0.5)]' 
                                : 'bg-slate-900 text-amber-500 border border-amber-500/30 hover:bg-slate-800 hover:border-amber-400/50'}
                            `}
                            >
                            {stage.outer.icon}
                            <span className={`text-[9px] font-bold mt-1.5 text-center leading-tight px-1 transition-all duration-300 max-w-[90px]
                                ${isActive ? 'text-slate-900 font-extrabold translate-y-0.5' : 'text-slate-500 group-hover:text-amber-200'}
                            `}>
                                {stage.outer.label}
                            </span>
                            </button>
                        );
                        })}
                        
                        <div className="absolute top-0 left-0 p-4 pointer-events-none opacity-60">
                        <div className="flex items-center gap-2 mb-1">
                            <div className="w-2 h-2 rounded-full bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,1)]"></div>
                            <span className="text-[10px] font-bold text-amber-200 uppercase tracking-widest">Evaluación</span>
                        </div>
                        <p className="text-[9px] text-slate-500 pl-4 max-w-[100px] leading-tight">Detección de Brechas</p>
                        </div>
                        
                        <div className="absolute bottom-0 right-0 p-4 text-right pointer-events-none opacity-60">
                        <div className="flex items-center gap-2 justify-end mb-1">
                            <span className="text-[10px] font-bold text-indigo-300 uppercase tracking-widest">Acompañamiento</span>
                            <div className="w-2 h-2 rounded-full bg-indigo-500 shadow-[0_0_10px_rgba(99,102,241,1)]"></div>
                        </div>
                        <p className="text-[9px] text-slate-500 pr-4 ml-auto max-w-[100px] leading-tight">Respuesta Institucional</p>
                        </div>

                    </div>

                    {/* Panel de Detalles */}
                    <div className="flex-1 w-full max-w-2xl">
                        <div className="bg-slate-900/40 backdrop-blur-xl border border-white/10 rounded-3xl overflow-hidden shadow-2xl transition-all duration-500">
                        
                        <div className={`relative p-8 overflow-hidden`}>
                            <div className={`absolute inset-0 bg-gradient-to-r from-${activeStage.color}-900/20 to-transparent opacity-50`}></div>
                            <div className="relative z-10">
                            <div className="flex justify-between items-start mb-4">
                                <span className="inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide bg-white/5 border border-white/10 text-slate-300">
                                <span className={`w-2 h-2 rounded-full bg-${activeStage.color}-500 animate-pulse`}></span>
                                Etapa {activeIndex + 1}
                                </span>
                                <div className="flex gap-2">
                                <div className="px-2 py-1 bg-amber-500/10 border border-amber-500/20 rounded text-[10px] font-bold text-amber-400 uppercase tracking-wider">
                                    Eval
                                </div>
                                <div className="px-2 py-1 bg-indigo-500/10 border border-indigo-500/20 rounded text-[10px] font-bold text-indigo-400 uppercase tracking-wider">
                                    Apoyo
                                </div>
                                </div>
                            </div>
                            <h2 className="text-3xl font-bold text-white mb-2 tracking-tight">{activeStage.subtitle}</h2>
                            <p className="text-lg text-slate-400 font-light border-b border-white/5 pb-4 mb-4">
                                {activeStage.title}
                            </p>
                            </div>
                        </div>

                        <div className="p-8 pt-0 grid gap-8 relative">
                            <div className="absolute left-[39px] top-4 bottom-8 w-px bg-gradient-to-b from-amber-500/40 via-slate-700 to-indigo-500/40"></div>

                            {/* SECCIÓN EVALUACIÓN */}
                            <div className="relative group pl-12">
                            <div className="absolute left-[30px] top-1.5 w-[19px] h-[19px] rounded-full bg-slate-900 border-2 border-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.4)] z-10 flex items-center justify-center">
                                <div className="w-1.5 h-1.5 bg-amber-500 rounded-full"></div>
                            </div>
                            
                            <div className="mb-2">
                                <h3 className="text-xs font-bold text-amber-400 uppercase tracking-widest mb-1">Hito Evaluativo</h3>
                                <h4 className="text-lg font-semibold text-white">{activeStage.outer.concept}</h4>
                            </div>
                            
                            <p className="text-sm text-slate-300 leading-relaxed mb-3">
                                {activeStage.outer.detail}
                            </p>
                            
                            <div className="inline-flex items-center gap-1.5 px-2.5 py-1 bg-amber-950/30 border border-amber-900/50 rounded text-[11px] text-amber-200/80 font-mono">
                                <FileText className="w-3 h-3" />
                                {activeStage.outer.normative}
