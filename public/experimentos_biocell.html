<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Biología Interactivo (Corregido)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.1/chart.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chosen Palette: Bioluminescent (Deep Navy, Aqua, Glowing Green) -->
    <!-- Application Structure Plan: Reconstrucción desde cero. Diseño a pantalla completa con cabecera de filtros. La interactividad es central: KPIs y los gráficos de Chart.js son clicables y actúan como filtros dinámicos, actualizando los controles de la cabecera y la vista de datos en un flujo coherente. -->
    <!-- Visualization & Content Choices: Se mantiene el estilo "glassmorphism". Los KPIs tienen nuevos iconos SVG biológicos. Los gráficos (barra horizontal y dona) tienen eventos 'onClick' correctamente implementados para filtrar. El modal usa pestañas para organizar la información. No se usa SVG para gráficos ni Mermaid JS. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    <style>
        body { background-color: #0c1427; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .glass-card { 
            background: rgba(18, 29, 51, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(45, 212, 191, 0.1);
            transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
        }
        .glass-card:hover:not(.non-clickable) { 
            transform: translateY(-4px);
            border-color: rgba(45, 212, 191, 0.4);
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.1);
        }
        .modal-content {
            background: rgba(18, 29, 51, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(45, 212, 191, 0.2);
        }
        .custom-input, .custom-select {
            background-color: rgba(18, 29, 51, 0.8);
            border: 1px solid rgba(45, 212, 191, 0.2);
            color: #e0e0e0;
        }
        .custom-input:focus, .custom-select:focus {
            outline: none;
            border-color: rgba(45, 212, 191, 0.8);
            box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.3);
        }
        .tab-button {
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }
        .tab-button.active {
            color: #2dd4bf; /* teal-400 */
            border-bottom-color: #2dd4bf;
        }
        .custom-select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            padding-right: 2.5rem; /* Space for arrow */
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%235eead4' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
        .kpi-card { cursor: pointer; }
        canvas { cursor: pointer; }
        .tag {
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
        }
        /* Asegurar que textos no se desborden de recuadros */
        .wrap-text { word-break: break-word; overflow-wrap: anywhere; }
        table.troubleshooting-table {
            width: 100%;
            border-collapse: collapse;
        }
        table.troubleshooting-table th, table.troubleshooting-table td {
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px;
            text-align: left;
        }
        table.troubleshooting-table th {
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>

                    </div>
                    <select id="categoria" class="custom-select rounded-md w-full sm:w-auto px-3 py-2 text-sm"><option value="todas">Todas las categorías</option></select>
                    <select id="nivel" class="custom-select rounded-md w-full sm:w-auto px-3 py-2 text-sm"><option value="todos">Todos los niveles</option></select>
                    <select id="tipo" class="custom-select rounded-md w-full sm:w-auto px-3 py-2 text-sm">
                        <option value="todos">DIY o Académico</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="p-4 sm:p-6 lg:p-8 max-w-7xl mx-auto">
            <!-- Stats Cards -->
            <div id="kpi-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-6"></div>

            <!-- Charts -->
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-6 mb-8">
                <div class="lg:col-span-3 glass-card p-4 rounded-lg">
                    <h3 class="font-semibold text-white text-sm mb-2">Top Conceptos Clave</h3>
                    <div class="relative h-64 md:h-80"><canvas id="conceptsChart"></canvas></div>
                </div>
                <div class="lg:col-span-2 glass-card p-4 rounded-lg">
                    <h3 class="font-semibold text-white text-sm mb-2">Distribución por Nivel</h3>
                    <div class="relative h-64 md:h-80"><canvas id="levelChart"></canvas></div>
                </div>
            </div>

            <!-- Experiments Grid -->
            <h2 class="text-2xl font-bold text-white mb-4">Catálogo de Experimentos</h2>
            <div id="experiments-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div id="modal-content" class="modal-content rounded-lg w-full max-w-4xl max-h-[90vh] overflow-y-auto transform scale-95 transition-transform duration-300"></div>

                    'Biología Molecular': /molec/i,
                    'Microbiología': /microbio/i,
                    'Biotecnología': /biotec/i,
                    'Biología Sintética': /sint/i,
                    'Ensayos Funcionales': /ensayo|funcion/i,
                    'Bioquímica': /bioqu|qu[ií]m/i
                };
                const canonicalCats = Object.keys(tests);
                const kpiEntries = [
                    ['Total', { count: fullData.length, filter: 'total' }],
                    ...canonicalCats.map(cat => [cat, { count: fullData.filter(e => (e.categoria && (e.categoria === cat || tests[cat].test(e.categoria)))).length, filter: cat.toLowerCase() }])
                ];

                this.elements.kpiGrid.innerHTML = kpiEntries.map(([label, {count, filter}]) => `
                    <div class="glass-card kpi-card p-4 rounded-lg flex items-center gap-4 border-2 ${this.getCategoryBorder(label)} ${this.getCategoryTint(label)} overflow-hidden transition-transform transition-colors duration-200 hover:-translate-y-0.5 hover:ring-2 ${this.getCategoryBorder(label).replace('border-','ring-')} ring-offset-0" data-filter="${filter}">
                         ${this.getKpiIconByFilter(filter)}
                        <div class="min-w-0">
                            <h4 class="text-sm font-medium text-gray-200 wrap-text leading-snug">${label}</h4>
                            <p class="text-2xl font-bold text-white">${count}</p>
                        </div>
                    </div>
                `).join('');
            },

            getCategoryBorder(label) {
                const map = {
                    'biología celular': 'border-blue-500',
                    'biología molecular': 'border-indigo-500',
                    'microbiología': 'border-rose-500',
                    'biotecnología': 'border-amber-500',
                    'biología sintética': 'border-teal-500',
                    'ensayos funcionales': 'border-yellow-500',
                    'bioquímica': 'border-lime-500'
                };
                return map[label.toLowerCase()] || 'border-slate-600';
            },

            getCategoryTint(label) {
                const map = {
                    'biología celular': 'hover:bg-blue-500/10',
                    'biología molecular': 'hover:bg-indigo-500/10',
                    'microbiología': 'hover:bg-rose-500/10',
                    'biotecnología': 'hover:bg-amber-500/10',
                    'biología sintética': 'hover:bg-teal-500/10',
                    'ensayos funcionales': 'hover:bg-yellow-500/10',
                    'bioquímica': 'hover:bg-lime-500/10'
                };
                return map[label.toLowerCase()] || 'hover:bg-white/5';
            },
            
            getKpiIcon(label) {
                const iconClasses = "w-8 h-8 text-teal-400 flex-shrink-0";
                switch (label) {
                    case "Total": return `<svg class="${iconClasses}" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>`;
                    case "B. Celular": return `<svg class="${iconClasses}" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zm0-5a3 3 0 1 0-3-3 3 3 0 0 0 3 3z"/></svg>`;
                    case "B. Molecular": return `<svg class="${iconClasses}" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M16.9 8.43C16.5 8.15 16 8 15.5 8h-3.5V4.5a1.5 1.5 0 0 0-1.5-1.5h-1A1.5 1.5 0 0 0 8 4.5V8H4.5A1.5 1.5 0 0 0 3 9.5v1A1.5 1.5 0 0 0 4.5 12H8v3.5a1.5 1.5 0 0 0 1.5 1.5h1A1.5 1.5 0 0 0 12 15.5V12h3.5a1.5 1.5 0 0 0 1.5-1.5v-1c0-.28-.15-.54-.4-.71l.3-.16z"/></svg>`;
                    case "Microbiología": return `<svg class="${iconClasses}" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9v-2h2v2zm0-4H9V7h2v5zm4 4h-2v-2h2v2zm0-4h-2V7h2v5z"/></svg>`;
                    case "Biotecnología": return `<svg class="${iconClasses}" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zM16 18H8v-2h8v2zm0-4H8v-2h8v2zm0-4H8V8h8v2z"/></svg>`;
                    case "Bioquímica": return `<svg class="${iconClasses}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.375 1.439l-2.5 2.5a3 3 0 01-4.242 0l-.707-.707a3 3 0 010-4.242l2.5-2.5a3 3 0 011.44-.375h1.007M9 17.25A3.375 3.375 0 0012.375 21h0c1.862 0 3.375-1.513 3.375-3.375s-1.513-3.375-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5A3.375 3.375 0 009 3.75h0c-1.862 0-3.375 1.513-3.375 3.375s1.513 3.375 3.375 3.375h1.5a1.125 1.125 0 011.125 1.125v1.5" /></svg>`;
                    default: return `<svg class="w-8 h-8 text-teal-400 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm3 4h4v2h-4V6zm0 4h7v2h-7v-2zm0 4h7v2h-7v-2zM7 10h2v2H7v-2zm0 4h2v2H7v-2z"/></svg>`;
                }
            },

            renderGrid(data) {
                this.elements.grid.innerHTML = data.length ? data.map(this.createCard).join('') : `<div class="glass-card rounded-lg p-10 col-span-full text-center text-gray-400">No se encontraron experimentos con los filtros actuales.</div>`;
            },

            createCard(exp) {
                const matchedKey = Object.keys(categoryColors).find(k => (exp.categoria === k) || (categoryMatchers[k] && categoryMatchers[k].test(exp.categoria))) || exp.categoria;
                const colorClass = categoryColors[matchedKey] || "border-gray-500";
                return `
                    <div class="glass-card rounded-lg flex flex-col cursor-pointer p-5 border-2 ${colorClass} ${(categoryBgTints[matchedKey] || 'hover:bg-white/5')} overflow-hidden transition-transform transition-colors duration-200 hover:-translate-y-0.5 hover:ring-2 ${(colorClass).replace('border-','ring-')} ring-offset-0" data-id="${exp.id}">
                        <div class="mb-2">
                            <span class="tag bg-teal-500/20 text-teal-300">${matchedKey}</span>
                        </div>
                        <h3 class="font-bold text-lg text-teal-300 mb-2 wrap-text leading-snug">${exp.nombre}</h3>
                        <p class="text-sm text-gray-400 flex-grow mb-4 wrap-text">${exp.descripcion_tecnica}</p>
                        <div class="mt-auto pt-4 border-t border-white/10 text-sm text-gray-400 flex justify-between items-center">
                            <span class="flex items-center gap-1.5">${exp.costo_aprox_USD && exp.costo_aprox_USD.alto > 0 ? `<svg class="w-4 h-4 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> $${exp.costo_aprox_USD.alto}` : 'Costo: N/A'}</span>
                            <div class="flex gap-2 items-center">
                                ${exp.nivel_educativo.map(n => `<span class="tag ${n === 'media' ? 'bg-green-500/20 text-green-300' : n === 'Básica' ? 'bg-yellow-500/20 text-yellow-300' : 'bg-sky-500/20 text-sky-300'}">${n === 'media' ? 'Media' : n === 'Básica' ? 'Básica' : 'U'}</span>`).join('')}
                                ${exp.tipo_experimento ? `<span class="tag ${exp.tipo_experimento === 'DIY' ? 'bg-teal-500/20 text-teal-300' : 'bg-indigo-500/20 text-indigo-300'}">${exp.tipo_experimento}</span>` : ''}
                            </div>
                        </div>
                    </div>`;
            },
            
            updateCharts(data) {
                Chart.defaults.color = '#9ca3af'; Chart.defaults.borderColor = 'rgba(255,255,255,0.1)';
                const conceptCounts = data.flatMap(e => e.conceptos_clave).reduce((acc, c) => ({...acc, [c]: (acc[c] || 0) + 1 }), {});
                const sortedConcepts = Object.entries(conceptCounts).sort((a,b) => b[1] - a[1]).slice(0, 7);
                
                if (this.charts.concepts) this.charts.concepts.destroy();
                const conceptsCtx = this.elements.conceptsChartCanvas.getContext('2d');
                this.charts.concepts = new Chart(conceptsCtx, { 
                    type: 'bar', 
                    data: { 
                        labels: sortedConcepts.map(c => c[0].charAt(0).toUpperCase() + c[0].slice(1)), 
                        datasets: [{ 
                            label: '# Experimentos', 
                            data: sortedConcepts.map(c => c[1]), 
                            backgroundColor: 'rgba(45, 212, 191, 0.4)', 
                            borderColor: 'rgba(45, 212, 191, 1)', 
                            borderWidth: 1, 
                            borderRadius: 4 
                        }] 
                    }, 
                    options: { 
                        indexAxis: 'y', 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        scales: { x: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { stepSize: 1 }}}, 
                        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#0c1427', titleFont: { weight: 'bold' }, bodyFont: { size: 14 }, displayColors: false } }
                    } 
                });

                const levelCounts = data.flatMap(e => e.nivel_educativo).reduce((acc, l) => ({...acc, [l]: (acc[l] || 0) + 1}), {});
                if(this.charts.level) this.charts.level.destroy();
                this.charts.level = new Chart(this.elements.levelChartCanvas, { 
                    type: 'doughnut', 
                    data: { 
                        labels: Object.keys(levelCounts).map(l => l === 'media' ? 'E. Media' : l === 'basica' ? 'Básica' : 'Universidad'), 
                        datasets: [{ 
                            data: Object.values(levelCounts), 
                            backgroundColor: ['rgba(34, 211, 238, 0.7)', 'rgba(167, 139, 250, 0.7)', 'rgba(255, 193, 7, 0.7)'], 
                            borderColor: '#121d33', 
                            borderWidth: 4 
                        }] 
                    }, 
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        cutout: '65%', 
                        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 20 } }, tooltip: { backgroundColor: '#0c1427', titleFont: { weight: 'bold' }, bodyFont: { size: 14 }, displayColors: true } }
                    } 
                });
            },

            showModal(id) {
                const exp = experimentsData.find(e => e.id === id);
                if (!exp) return;

                this.elements.modalContent.innerHTML = `
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="tag text-sm mb-2 bg-teal-500/20 text-teal-300">${exp.categoria}</span>
                                <h2 class="text-2xl font-bold text-white">${exp.nombre}</h2>
                            </div>
                            <button onclick="app.hideModal()" class="text-gray-400 hover:text-white text-4xl leading-none">&times;</button>
                        </div>
                        
                        <div class="border-b border-white/10 mb-4">
                            <nav id="modal-tabs" class="-mb-px flex space-x-6" aria-label="Tabs">
                                <button class="tab-button active flex items-center gap-2 whitespace-nowrap py-3 px-1 font-medium text-sm" data-tab="tab-overview"><svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" /></svg>General</button>
                                <button class="tab-button flex items-center gap-2 whitespace-nowrap py-3 px-1 font-medium text-sm text-gray-400 hover:text-white" data-tab="tab-results"><svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 100 15 7.5 7.5 0 000-15zM21 21l-5.69-5.69" /></svg>Resultados y Problemas</button>
                                <button class="tab-button flex items-center gap-2 whitespace-nowrap py-3 px-1 font-medium text-sm text-gray-400 hover:text-white" data-tab="tab-assessment"><svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>Evaluación</button>
                            </nav>
                        </div>

                        <div id="tab-overview" class="tab-content space-y-4">
                            <p class="text-gray-300">${exp.descripcion_tecnica}</p>
                            ${exp.pedagogical_module && exp.pedagogical_module.nombre ? `
                                <div class="p-4 bg-black/20 rounded-lg">
                                    <h4 class="font-semibold text-white mb-2">Módulo Pedagógico: <span class="text-indigo-400">${exp.pedagogical_module.nombre}</span></h4>
                                    <p class="text-sm text-gray-400">${exp.pedagogical_module.justificacion}</p>
                                </div>
                            ` : ''}
                            ${exp.costo_aprox_USD && exp.costo_aprox_USD.alto > 0 ? `
                                <div class="p-4 bg-black/20 rounded-lg text-sm text-gray-400 flex justify-between items-center">
                                    <span>Costo Estimado:</span> <span class="font-semibold text-gray-200">$${exp.costo_aprox_USD.alto} USD</span>
                                </div>
                            ` : ''}
                        </div>

                        <div id="tab-results" class="tab-content hidden space-y-6">
                             <div>
                                <h3 class="font-bold text-lg text-white mb-2">Resultado Esperado</h3>
                                ${exp.expected_result_media ? `<img src="${exp.expected_result_media}" alt="Resultado esperado" class="rounded-lg w-full max-w-md mx-auto" onerror="this.src='https://placehold.co/600x400/121d33/e0e0e0?text=Imagen+no+disponible'">` : '<p class="text-gray-400">No hay imagen disponible para este experimento.</p>'}
                            </div>
                            <div>
                                <h3 class="font-bold text-lg text-white mb-2">Solución de Problemas</h3>
                                <div class="overflow-x-auto">
                                <table class="troubleshooting-table text-sm">
                                    <thead><tr><th>Problema</th><th>Causa</th><th>Solución</th></tr></thead>
                                    <tbody>${exp.troubleshooting_tips.map(tip => `<tr><td>${tip.problema}</td><td>${tip.causa_probable}</td><td>${tip.solucion}</td></tr>`).join('')}</tbody>
                                </table>
                                </div>
                            </div>
                        </div>

                        <div id="tab-assessment" class="tab-content hidden space-y-3">
                            <h3 class="font-bold text-lg text-white">Banco de Preguntas</h3>
                            ${(exp.assessment_questions && exp.assessment_questions.length > 0) ? exp.assessment_questions.map((q, i) => `
                                <div class="bg-black/20 p-3 rounded-lg text-sm">
                                    <p class="font-semibold text-gray-300">${q.tipo === 'pre-lab' ? 'Pre-Lab:' : 'Post-Lab:'} ${q.pregunta}</p>
                                    <p class="text-teal-400 mt-2 hidden" id="answer-${exp.id}-${i}">${q.respuesta}</p>
                                    <button onclick="document.getElementById('answer-${exp.id}-${i}').classList.toggle('hidden')" class="text-xs text-indigo-400 hover:underline mt-2">Mostrar Respuesta</button>
                                </div>`).join('') : '<p class="text-gray-400">No hay preguntas de evaluación para este experimento.</p>'}
                        </div>
                        
                         <div class="mt-6 text-center">
                            <a href="${exp.link_protocolo}" target="_blank" class="inline-block bg-teal-600 hover:bg-teal-500 text-white font-bold py-2 px-6 rounded-md transition-colors">Ver Recurso</a>
                        </div>
                    </div>`;

                this.elements.modal.classList.remove('hidden');
                setTimeout(() => {
                    this.elements.modal.classList.remove('opacity-0');
                    this.elements.modal.querySelector('#modal-content').classList.remove('scale-95');
                }, 10);
                
                // Add tab switching logic
                const tabs = this.elements.modalContent.querySelectorAll('.tab-button');
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        const contents = this.elements.modalContent.querySelectorAll('.tab-content');
                        contents.forEach(c => c.classList.add('hidden'));
                        this.elements.modalContent.querySelector('#' + tab.dataset.tab).classList.remove('hidden');
                    });
                });
            },
            hideModal() {
                this.elements.modal.classList.add('opacity-0');
                this.elements.modal.querySelector('#modal-content').classList.add('scale-95');
                setTimeout(() => this.elements.modal.classList.add('hidden'), 300);
            },
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
        window.app = app;
    </script>
</body>
</html>
