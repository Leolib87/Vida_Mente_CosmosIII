        :root {

            background: rgba(34, 211, 238, 0.1);
            color: var(--neon-cyan);
            border-right: 2px solid var(--neon-cyan);
        }

        .animate-status {
            animation: pulse-ring 2s infinite ease-in-out;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }
        
        #radar-chart-container svg { max-width: 100%; height: auto; overflow: visible; }

        .category-group[data-open="false"] .category-content {
            display: none;
        }

        .chevron-icon {
            transition: transform 0.3s ease;
        }
        .category-group[data-open="true"] .chevron-icon {
            transform: rotate(180deg);
        }

        .biology-text {
            max-height: 400px;
            overflow-y: auto;
        }

        .references-list li {
            margin-bottom: 0.5rem;
        }

        let openCategories = {

        function toggleCategory(catName) {
            openCategories[catName] = !openCategories[catName];
            initNav();
        }

        function initNav() {
            const nav = document.getElementById('navigation-content');
            const categories = ['Principiantes', 'Intermedio', 'Avanzado'];
            const currentHash = window.location.hash.replace('#', '') || plants[0].id;

            nav.innerHTML = categories.map(cat => {
                const catPlants = plants.filter(p => p.category === cat);
                const isOpen = openCategories[cat];
                return `
                    <div class="category-group" data-open="${isOpen}">
                        <button onclick="toggleCategory('${cat}')" class="w-full flex items-center justify-between py-2 border-b border-white/5 group">
                            <h3 class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-500 group-hover:text-cyan-400 transition-colors">${cat}</h3>
                            <svg class="w-3 h-3 text-slate-500 chevron-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div class="category-content flex flex-col gap-1 mt-2 mb-4">
                            ${catPlants.map(p => `
                                <a href="#${p.id}" class="nav-link px-4 py-2.5 rounded-lg text-sm font-semibold text-slate-400 hover:text-white hover:bg-white/5 transition-all flex justify-between items-center ${currentHash === p.id ? 'active' : ''}">
                                    ${p.common}
                                    <span class="w-1.5 h-1.5 rounded-full ${p.id === currentHash ? 'bg-cyan-400 shadow-[0_0_8px_cyan]' : 'bg-slate-700'}"></span>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

                                    <h2 class="text-4xl md:text-6xl font-black text-white tracking-tighter mb-2">${plant.common}</h2>
                                    <p class="text-xl text-cyan-400/80 italic font-light mb-8">${plant.scientific}</p>
                                    
                                    <div class="relative rounded-[2.5rem] overflow-hidden border border-white/10 h-[380px] md:h-[550px] bg-slate-900/40 flex items-center justify-center">
                                        <div id="vitality-canvas" class="absolute inset-0 z-0 opacity-40"></div>
                                        <img src="${plant.image}" 
                                             alt="${plant.common}" 
                                             class="max-w-full max-h-full w-auto h-auto object-contain relative z-10 p-6 transition-transform duration-1000 hover:scale-105" 
                                             onerror="this.src='https://via.placeholder.com/800x600/020617/22d3ee?text=BIOMA_NO_DISPONIBLE'">
                                    </div>
                                </div>
                            </section>

                            <section class="glass-panel p-8 rounded-[2rem]">
                                <h4 class="text-[11px] font-black uppercase tracking-[0.3em] text-cyan-500 mb-6 flex items-center gap-2">
                                    <span class="w-2 h-2 bg-cyan-500 rounded-full animate-status"></span> Análisis Biológico
                                </h4>
                                <p class="text-slate-300 leading-relaxed text-justify font-light text-sm biology-text">${plant.biology}</p>
                            </section>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <section class="glass-panel p-8 rounded-[2rem] flex flex-col">
                                    <h4 class="text-[11px] font-black uppercase tracking-[0.3em] text-cyan-500 mb-8">Taxonomía Completa</h4>
                                    <div class="space-y-2.5 relative">
                                        <div class="absolute left-1.5 top-2 bottom-2 w-[1px] bg-cyan-500/10"></div>
                                        ${Object.entries(plant.taxonomy).map(([key, val], idx) => `
                                            <div class="flex items-center gap-4 relative pl-5 group">
                                                <div class="absolute left-0 w-3 h-3 rounded-full border border-cyan-500/30 bg-slate-950 z-10 flex items-center justify-center group-hover:border-cyan-400 transition-colors">
                                                    <div class="w-1 h-1 bg-cyan-500/50 rounded-full"></div>
                                                </div>
                                                <div class="flex-1 p-2.5 rounded-xl bg-white/[0.02] border border-white/5 hover:border-cyan-500/20 hover:bg-white/[0.04] transition-all">
                                                    <div class="flex justify-between items-baseline mb-0.5">
                                                        <p class="text-[7px] uppercase text-cyan-500/50 font-black tracking-[0.2em]">${key}</p>
                                                        <p class="text-[6px] text-slate-600 font-bold uppercase italic">Rango ${idx + 1}</p>
                                                    </div>
                                                    <p class="text-[11px] font-extrabold text-slate-100 tracking-tight">${val}</p>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                    <div class="mt-8 pt-6 border-t border-white/5">
                                        <p class="text-[9px] uppercase text-slate-500 font-bold mb-1">Distribución Nativa</p>
                                        <p class="text-xs italic text-slate-300 font-light">${plant.origin}</p>
                                    </div>
                                </section>

                                <section class="glass-panel p-8 rounded-[2rem]">
                                    <h4 class="text-[11px] font-black uppercase tracking-[0.3em] text-cyan-500 mb-6">Ficha de Cultivo</h4>
                                    <div class="grid grid-cols-1 gap-6">
                                        <div class="p-4 bg-white/5 rounded-xl border border-white/5">
                                            <p class="text-[10px] font-bold text-cyan-400 uppercase mb-2">Propagación</p>
                                            <p class="text-[11px] text-slate-400">${plant.propagation}</p>
                                        </div>
                                        <div class="p-4 bg-white/5 rounded-xl border border-white/5">
                                            <p class="text-[10px] font-bold text-amber-400 uppercase mb-2">Amenazas Bióticas</p>
                                            <ul class="text-[11px] text-slate-400 list-disc list-inside">${plant.commonIssues.map(i => `<li>${i}</li>`).join('')}</ul>
                                        </div>
                                        <div class="p-4 bg-white/5 rounded-xl border border-white/5">
                                            <p class="text-[10px] font-bold text-emerald-400 uppercase mb-2">Nota Botánica</p>
                                            <p class="text-[11px] text-slate-400 italic">${plant.interestingFacts}</p>
                                        </div>
                                    </div>
                                </section>
                            </div>

                            <section class="glass-panel p-8 rounded-[2rem]">
                                <h4 class="text-[11px] font-black uppercase tracking-[0.3em] text-cyan-500 mb-6">Referencias Científicas</h4>
                                <ul class="text-[11px] text-slate-400 list-disc list-inside references-list">
                                    ${plant.references.map(r => `<li>${r}</li>`).join('')}
                                </ul>
                            </section>
                        </div>

                        <div class="xl:col-span-4 space-y-8">
                            <section class="glass-panel p-8 rounded-[2rem] neo-border">
                                <h4 class="text-[11px] font-black uppercase tracking-[0.3em] text-cyan-500 mb-8">Protocolo Vital</h4>
                                <div class="space-y-6">
                                    <div class="flex items-start gap-4">
                                        <div class="text-2xl">💧</div>
                                        <div><p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Agua</p><p class="text-xs text-slate-200 font-semibold">${plant.water}</p></div>
                                    </div>
                                    <div class="flex items-start gap-4">
                                        <div class="text-2xl">☀️</div>
                                        <div><p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Fotometría</p><p class="text-xs text-slate-200 font-semibold">${plant.light}</p></div>
                                    </div>
                                    <div class="flex items-start gap-4">
                                        <div class="text-2xl">☁️</div>
                                        <div><p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Humedad</p><p class="text-xs text-slate-200 font-semibold">${plant.humidity}</p></div>
                                    </div>
                                </div>
                            </section>

                            <!-- Mejorado: Módulo de Biometría -->
                            <section class="glass-panel p-8 rounded-[2rem]">
                                <h4 class="text-[11px] font-black uppercase tracking-[0.3em] text-cyan-500 mb-6 text-center">Biometría</h4>
                                <div id="radar-chart-container" class="w-full aspect-square flex items-center justify-center overflow-visible"></div>
                                <div class="mt-8 space-y-5 border-t border-white/5 pt-6">
                                    <div>
                                        <p class="text-[9px] text-slate-500 uppercase font-black tracking-[0.2em] mb-1">Crecimiento Estacional</p>
                                        <p class="text-xs font-bold text-slate-100 leading-snug">${plant.growthRate}</p>
                                    </div>
                                    <div>
                                        <p class="text-[9px] text-slate-500 uppercase font-black tracking-[0.2em] mb-1">Dimensión Estructural</p>
                                        <p class="text-xs font-bold text-slate-100 leading-snug">${plant.size}</p>
                                    </div>
                                </div>
                            </section>
                        </div>
                    </div>
                `;

                requestAnimationFrame(() => {
                    initRadarChart(plant);
                    initVitalityMatrix(plant.careProfile.growth);
                });
                
                main.classList.remove('opacity-0', 'translate-y-4');
                main.classList.add('opacity-100', 'translate-y-0');
            }, 300);
        }

        function initRadarChart(plant) {
            const container = d3.select("#radar-chart-container");
            const node = container.node();
            if (!node) return;
            container.select("svg").remove();
            
            const width = node.offsetWidth || 280, height = node.offsetHeight || 280;
            const radius = Math.min(width, height) / 2 - 50; 
            const svg = container.append("svg").attr("width", width).attr("height", height).attr("viewBox", `0 0 ${width} ${height}`).append("g").attr("transform", `translate(${width/2}, ${height/2})`);
            const data = [
                { axis: "Agua", value: plant.careProfile.water / 5 },
                { axis: "Luz", value: plant.careProfile.light / 5 },
                { axis: "Humedad", value: plant.careProfile.humidity / 5 },
                { axis: "Dificultad", value: plant.careProfile.difficulty / 5 },
                { axis: "Crecimiento", value: plant.careProfile.growth / 5 }
            ];
            const angleSlice = (Math.PI * 2) / data.length;
            const rScale = d3.scaleLinear().range([0, radius]).domain([0, 1]);
            
            for(let j=0; j<5; j++) {
                const levelFactor = radius * ((j+1)/5);
                svg.append("polygon").attr("points", data.map((d, i) => [levelFactor * Math.cos(angleSlice * i - Math.PI/2), levelFactor * Math.sin(angleSlice * i - Math.PI/2)].join(",")).join(" ")).attr("fill", "none").attr("stroke", "rgba(34, 211, 238, 0.15)").attr("stroke-width", 0.5);
            }
            const axis = svg.selectAll(".axis").data(data).enter().append("g");
            axis.append("line").attr("x1", 0).attr("y1", 0).attr("x2", (d, i) => rScale(1.05) * Math.cos(angleSlice * i - Math.PI/2)).attr("y2", (d, i) => rScale(1.05) * Math.sin(angleSlice * i - Math.PI/2)).attr("stroke", "rgba(34, 211, 238, 0.3)").attr("stroke-width", 1);
            
            axis.append("text").attr("x", (d, i) => rScale(1.2) * Math.cos(angleSlice * i - Math.PI/2)).attr("y", (d, i) => rScale(1.2) * Math.sin(angleSlice * i - Math.PI/2)).attr("text-anchor", "middle").attr("dy", "0.35em").attr("font-size", "10px").attr("font-weight", "800").attr("fill", "#64748b").text(d => d.axis);
            
            const radarLine = d3.lineRadial().radius(d => rScale(d.value)).angle((d, i) => i * angleSlice).curve(d3.curveCatmullRomClosed.alpha(0.5));
            svg.append("path").datum(data).attr("d", radarLine).attr("fill", "rgba(34, 211, 238, 0.25)").attr("stroke", "#22d3ee").attr("stroke-width", 2.5).attr("stroke-linejoin", "round");
            
            data.forEach((d, i) => {
                svg.append("text").attr("x", rScale(d.value) * Math.cos(angleSlice * i - Math.PI/2) + 12 * Math.cos(angleSlice * i - Math.PI/2)).attr("y", rScale(d.value) * Math.sin(angleSlice * i - Math.PI/2) + 12 * Math.sin(angleSlice * i - Math.PI/2)).attr("text-anchor", "middle").attr("dy", "0.35em").attr("font-size", "9px").attr("font-weight", "bold").attr("fill", "#22d3ee").text(Math.round(d.value * 5));
            });
        }

        function initVitalityMatrix(growthFactor) {
            const container = d3.select("#vitality-canvas");
            const node = container.node();
            if (!node) return;
            container.select("svg").remove();
            const width = node.offsetWidth, height = node.offsetHeight;
            if (width === 0 || height === 0) return;

            const svg = container.append("svg").attr("width", width).attr("height", height);
            const nodes = d3.range(30 + growthFactor * 10).map(() => ({ x: Math.random() * width, y: Math.random() * height, r: Math.random() * 2 + 1 }));

            const simulation = d3.forceSimulation(nodes).force("charge", d3.forceManyBody().strength(5)).force("center", d3.forceCenter(width / 2, height / 2)).force("collision", d3.forceCollide().radius(20)).on("tick", () => { nodeElems.attr("cx", d => d.x).attr("cy", d => d.y); });
            const nodeElems = svg.selectAll("circle").data(nodes).enter().append("circle").attr("r", d => d.r).attr("fill", "#22d3ee").attr("opacity", 0.4);
        }

        function router() {
            const id = window.location.hash.replace('#', '') || plants[0].id;
            const plant = plants.find(p => p.id === id) || plants[0];
            initNav();
            renderPlant(plant);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.addEventListener('hashchange', router);
        window.addEventListener('load', router);
        window.addEventListener('resize', () => {
            const id = window.location.hash.replace('#', '') || plants[0].id;
            const plant = plants.find(p => p.id === id) || plants[0];
            initRadarChart(plant);
            initVitalityMatrix(plant.careProfile.growth);
        });
    </script>
</body>
</html>
