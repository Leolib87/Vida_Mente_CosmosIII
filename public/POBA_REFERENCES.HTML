        const ProgressBar = () => {

            });
            return (
                <motion.div
                    className="fixed top-0 left-0 right-0 h-1 bg-cyan-500 origin-left z-50 shadow-[0_0_10px_rgba(6,182,212,0.5)]"
                    style={{ scaleX }}

        const ReferenceItem = ({ text, id }) => {
            // NLP-lite parsing for coloring
            const parts = text.split(/(\(.*?\))/); // Split by first occurrence of something in parens (usually year)
            
            let author = parts[0];
            let remainder = parts.slice(1).join("");
            
            let isStarred = author.trim().startsWith("*");
            let displayAuthor = isStarred ? author.trim().substring(1) : author;

            // Handle MathJax re-render if updated
            useEffect(() => {
                if (window.MathJax) {
                    window.MathJax.typesetPromise && window.MathJax.typesetPromise();
                }
            }, []);

            return (
                <motion.div 
                    initial={{ opacity: 0, y: 10 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true, margin: "-50px" }}
                    transition={{ duration: 0.5 }}
                    className="mb-6 hanging-indent text-lg leading-relaxed text-justify hyphens-auto group relative"
                >
                    {isStarred && (
                        <span className="absolute -left-6 top-1 text-amber-500 animate-pulse" title="Fuente de influencia significativa">
                            *
                        </span>
                    )}
                    
                    <span className="font-semibold text-cyan-400 group-hover:text-cyan-300 transition-colors duration-300">
                        {displayAuthor}
                    </span>
                    
                    {/* Render remainder, looking for latin terms or emphasis keys */}
                    <span dangerouslySetInnerHTML={{
                        __html: remainder
                            .replace(/(et al\.|ibid\.|op\. cit\.)/g, '<span class="text-amber-500 italic">$1</span>')
                            // Attempt to italicize book titles (between comma and comma, loosely) is risky without proper data structure.
                            // Adhering to strict transcription, but enhancing specific detected math.
                            .replace(/\\lambda/g, 'λ') 
                    }} />
                </motion.div>
            );
        };
