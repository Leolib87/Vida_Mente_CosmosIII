<body>
    <a id="vmc-home-pill" href="index.html"><span class="vmc-dot"></span>Vida, Mente y Cosmos</a>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useScroll, useSpring } from 'framer-motion';
        import { 
            BookOpen, 
            ChevronRight, 
            Info, 
            ExternalLink, 
            Menu,

        const App = () => {
            const [activeNote, setActiveNote] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const { scrollYProgress } = useScroll();
            const scaleX = useSpring(scrollYProgress, {
                state: { stiffness: 100, damping: 30, restDelta: 0.001 }
            });

            // Referencias bibliográficas completas traducidas
            const references = [
                { id: 1, text: "Yildirim, I. y Paul, L.A. (2024) From task structures to world models: what do LLMs know? Trends Cogn. Sci. 28, 404-415" },
                { id: 2, text: "Noë, A. (2023) The Entanglement: How Art and Philosophy Make Us Who We Are. Princeton University Press" },
                { id: 3, text: "Frank, A. et al. (2024) The Blind Spot: Why Science Cannot Ignore Human Experience, MIT Press" },
                { id: 4, text: "Dickinson, A. (1994) Instrumental conditioning. En Animal Learning and Cognition (Mackintosh, N.J., ed.), pp. 45-79, Academic Press" },
                { id: 5, text: "Goddu, M. y Gopnik, A. (2024) The development of human causal learning and reasoning. Nat. Rev. Psychol. 3, 319-339" },
                { id: 6, text: "Pearl, J. y Mackenzie, D. (2018) The Book of Why: The New Science of Cause and Effect, Basic Books" },
                { id: 7, text: "Pearl, J. (2009) Causality, Cambridge University Press" },
                { id: 8, text: "Woodward, J. (2007) Interventionist theories of causation in psychological perspective. En Causal Learning: Psychology, Philosophy, and Computation (Gopnik, A. y Schulz, L., eds), pp. 19-36, Oxford University Press" },
                { id: 9, text: "Woodward, J. (2021) Causation with a Human Face: Normative Theory and Descriptive Psychology, Oxford University Press" },
                { id: 10, text: "Smith, B.C. (2019) The Promise of Artificial Intelligence: Reckoning and Judgment, MIT Press" },
                { id: 11, text: "Birhane, A. (2021) The impossibility of automating ambiguity. Artif. Life 27, 44-61" },
                { id: 12, text: "Rolli, A. et al. (2022) How organisms come to know the world: fundamental limits on artificial general intelligence. Front. Ecol. Evol. 9, 806283" }
            ];

            const Note = ({ id }) => (
                <span 
                    className="text-cyan-400 font-bold cursor-help hover:underline px-0.5"
                    onMouseEnter={() => setActiveNote(references.find(r => r.id === id))}
                    onMouseLeave={() => setActiveNote(null)}
                >
                    [{id}]
                </span>
            );

            const Concept = ({ children }) => (
                <span className="text-amber-500 font-medium italic">"{children}"</span>
            );

            const AuthorName = ({ children }) => (
                <span className="text-cyan-400 font-semibold">{children}</span>
            );

            return (
                <div className="min-h-screen bg-slate-950 text-slate-300 selection:bg-cyan-500/30 font-inter antialiased overflow-x-hidden">
                    
                    {/* Progress Bar */}
                    <motion.div 
                        className="fixed top-0 left-0 right-0 h-1 bg-cyan-500 z-50 origin-left"
                        style={{ scaleX }}
                    />

                    {/* Sticky Header */}
                    <header className="fixed top-0 w-full bg-slate-950/80 backdrop-blur-md border-b border-slate-800 z-40 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <span className="text-xs font-medium text-cyan-400">Carta: Goddu, Noë y Thompson</span>
                            </div>
                            <button 
                                onClick={() => setIsMenuOpen(!isMenuOpen)}
                                className="flex items-center gap-2 hover:text-cyan-400 transition-colors"
                            >
                                <Menu size={20} />
                                <span className="text-xs font-bold uppercase tracking-tighter">Índice</span>
                            </button>
                        </div>
                    </header>

                    {/* Lateral Index / Menu */}
                    <div className={`fixed inset-0 z-50 transition-transform duration-500 ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="absolute inset-0 bg-slate-950/95" onClick={() => setIsMenuOpen(false)} />
                        <div className="absolute right-0 top-0 h-full w-full max-w-sm bg-slate-900 border-l border-slate-800 p-8 shadow-2xl">
                            <div className="flex justify-between items-center mb-12">
                                <h3 className="text-xl font-playfair text-white italic">Navegación</h3>
                                <button onClick={() => setIsMenuOpen(false)}><X size={24} /></button>
                            </div>
                            <nav className="space-y-6">
                                <a href="#hero" onClick={() => setIsMenuOpen(false)} className="flex items-center gap-3 hover:text-cyan-400 transition-colors py-2 border-b border-slate-800">
                                    <Hash size={16} /> Introducción
                                </a>
                                <a href="#body" onClick={() => setIsMenuOpen(false)} className="flex items-center gap-3 hover:text-cyan-400 transition-colors py-2 border-b border-slate-800">
                                    <Hash size={16} /> Cuerpo del Texto
                                </a>
                                <a href="#leaps" onClick={() => setIsMenuOpen(false)} className="flex items-center gap-3 hover:text-cyan-400 transition-colors py-2 border-b border-slate-800">
                                    <Hash size={16} /> Los Tres Saltos
                                </a>
                                <a href="#references" onClick={() => setIsMenuOpen(false)} className="flex items-center gap-3 hover:text-cyan-400 transition-colors py-2 border-b border-slate-800">
                                    <Hash size={16} /> Referencias
                                </a>
                            </nav>
                        </div>
                    </div>

                    <main className="pt-24 pb-32">
                        {/* Hero Section */}
                        <section id="hero" className="relative w-screen h-[70vh] flex items-center justify-center bg-gradient-to-b from-slate-900 to-slate-950 px-6">
                            <div className="max-w-4xl text-center">
                                <motion.div 
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    transition={{ duration: 0.8 }}
                                >
                                    <h2 className="text-cyan-400 text-sm font-bold uppercase tracking-[0.3em] mb-4 flex items-center justify-center gap-2">
                                        <BookOpen size={16} /> Carta
                                    </h2>
                                    <h1 className="text-5xl md:text-7xl font-playfair text-white italic mb-8 leading-tight">
                                        Los LLM no saben nada: <br className="hidden md:block" />
                                        <span className="text-slate-400 not-italic font-bold text-3xl md:text-5xl">respuesta a Yildirim y Paul</span>
                                    </h1>
                                    <div className="flex flex-wrap justify-center gap-8 text-sm tracking-wide">
                                        <div className="flex items-center gap-2">
                                            <User size={14} className="text-cyan-400" />
                                            <AuthorName>Mariel K. Goddu</AuthorName>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <User size={14} className="text-cyan-400" />
                                            <AuthorName>Alva Noë</AuthorName>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <User size={14} className="text-cyan-400" />
                                            <AuthorName>Evan Thompson</AuthorName>
                                        </div>
                                    </div>
                                </motion.div>
                            </div>
                        </section>

                        {/* Content Body */}
                        <div className="max-w-3xl mx-auto px-6 space-y-12 text-lg leading-relaxed hyphens-auto text-justify" id="body">
                            
                            <p className="first-letter:text-7xl first-letter:font-playfair first-letter:text-white first-letter:mr-3 first-letter:float-left">
                                En su reciente Opinión en TICS <Note id={1} />, <AuthorName>Yildirim y Paul</AuthorName> proponen que los grandes modelos de lenguaje (LLM) poseen <Concept>conocimiento instrumental</Concept> y posiblemente el tipo de conocimiento <Concept>mundano</Concept> que tienen los humanos. Sugieren que la producción de respuestas apropiadas por parte de los LLM es evidencia de que estos infieren una <Concept>estructura de tarea</Concept> que podría reflejar <Concept>abstracciones causales de... entidades y procesos en el mundo real</Concept> <Note id={1} />. Aunque coincidimos en que los LLM son impresionantes y potencialmente interesantes para la ciencia cognitiva, nos oponemos a este proyecto por dos razones. Primero, presenta a los LLM como agentes en lugar de modelos. Segundo, sugiere que la comprensión causal podría adquirirse a partir de la mera capacidad de predicción.
                            </p>

                            <p>
                                El mapa no conoce el camino a casa, y el ábaco no es hábil en aritmética. Se requiere conocimiento para diseñar y utilizar tales modelos, pero los modelos en sí mismos no tienen conocimiento. No porque sean ignorantes, sino porque son modelos: es decir, herramientas <Note id={2} />, <Note id={3} />. No navegan ni calculan, ni tienen destinos que alcanzar o deudas que pagar. Los humanos los utilizan para estos propósitos epistémicos. Los LLM tienen más en común con el mapa o el ábaco que con las personas que los diseñan y utilizan como instrumentos. Es el creador y el usuario de la herramienta, no la herramienta, quien posee el conocimiento.
                            </p>

                            <p className="relative group">
                                A pesar de estas consideraciones, <AuthorName>Yildirim y Paul</AuthorName> <Note id={1} /> consideran la hipótesis de que los LLM podrían construir <Concept>conocimiento mundano</Concept> a partir de lo que llaman <Concept>conocimiento instrumental</Concept>, analizado como el éxito en la generación del siguiente token, en <Concept>dominios de tarea</Concept> particulares. Esta es una caracterización engañosa del <Concept>conocimiento instrumental</Concept>. El término se utiliza típicamente para referirse precisamente no al aprendizaje estadístico o asociativo, sino, por el contrario, al conocimiento alcanzado por humanos y otros animales sobre la base de apreciar las contingencias entre sus acciones y los resultados (por ejemplo, el condicionamiento operante) <Note id={4} />. Mientras que el conocimiento instrumental, entendido correctamente, es conocimiento que <Concept>marca la diferencia</Concept> y sustenta la intervención causal <Note id={5} />, <Note id={6} />, <Note id={7} />, <Note id={8} />, <Note id={9} />, la capacidad de adivinar qué viene después, por muy robusta que sea, no es tal habilidad. Ninguna cantidad de predicción, a partir de un conjunto de observaciones por grande que sea, puede sustentar la captación de la noción de <Concept>hacer</Concept>, <Concept>generar</Concept> o <Concept>realizar</Concept> que es la base de nuestro conocimiento del mundo.
                            </p>

                            <p>
                                Imaginen ver una secuencia de luces en la pared: verde, amarilla, roja; verde, amarilla, roja. Dadas estas observaciones, pueden predecir con éxito el siguiente color (verde). La capacidad de hacer esta predicción, una forma de inferencia estadística, es distinta de la capacidad de comprender qué genera la secuencia, o qué la cambiaría (por ejemplo, saber que es producida por el semáforo de afuera, sin el cual no ocurriría). La evidencia de la psicología del desarrollo sugiere que la capacidad humana para apreciar este tipo de dependencia (es decir, tener un concepto generativo de <Concept>causa</Concept>) se desarrolla a partir de nuestra experiencia de nuestras propias acciones dirigidas a metas y las de los otros <Note id={5} />. El aprendizaje humano ocurre a través de la participación activa en los asuntos del mundo, marcando las diferencias que necesitamos y queremos hacer en nuestras vidas como organismos sociales y biológicos.
                            </p>

                            <section id="leaps" className="space-y-8">
                                <p>
                                    De hecho, <AuthorName>Yildirim y Paul</AuthorName> reconocen que la idea de que los LLM podrían adquirir abstracciones causales del mundo requiere <Concept>un salto de fe</Concept> <Note id={1} />. Sugerimos que se requieren tres saltos de fe, todos los cuales nos sumergen en lo absurdo.
                                </p>

                                <div className="space-y-12">
                                    <div className="flex gap-6 border-l-2 border-slate-800 pl-6 hover:border-cyan-500 transition-colors">
                                        <p>
                                            El primer salto es la idea de que un modelo de algo podría convertirse en la cosa que está siendo modelada. Los modelos son herramientas, no agentes, y son nuestras herramientas, construidas para servir a nuestros intereses y valores. Los LLM no realizan ninguna de sus propias tareas; realizan nuestras tareas. Las respuestas que los LLM devuelven a nuestros prompts son <Concept>aproximadamente preservadoras de la verdad y relevantes</Concept> <Note id={1} /> solo según nuestro criterio <Note id={10} />. <AuthorName>ChatGPT</AuthorName> realmente parece <Concept>escribir</Concept> ese primer borrador, aunque esto no debería sorprender, ya que para esto lo diseñamos: <AuthorName>ChatGPT</AuthorName> es un sujeto fingido diseñado por sujetos reales para parecer un sujeto real. Insistir en lo que ya sabemos no resta valor a la utilidad potencial (o los riesgos <Note id={11} />) asociados con tecnologías tan poderosas de pseudo-agencia: incluso los mejores modelos no se convierten en aquello que modelan tan eficazmente <Note id={2} />, <Note id={3} />.
                                        </p>
                                    </div>

                                    <div className="flex gap-6 border-l-2 border-slate-800 pl-6 hover:border-cyan-500 transition-colors">
                                        <p>
                                            El segundo salto es la idea de que los procesos computacionales que permiten la detección de patrones estadísticos y la generación de tokens pueden ser un <Concept>instrumento</Concept> para adquirir el conocimiento causal involucrado en la comprensión de la <Concept>estructura de la tarea</Concept> <Note id={1} />. Sin embargo, vincular tokens vacíos basándose en probabilidades (incluso de maneras que estamos en posición de saber que reflejan la verdad de un dominio dado, ya sea una tarea de resumen, física o aritmética) no justifica atribuir conocimiento de ese dominio al generador de tokens en sí mismo.
                                        </p>
                                    </div>

                                    <div className="flex gap-6 border-l-2 border-slate-800 pl-6 hover:border-cyan-500 transition-colors">
                                        <p>
                                            Dijimos anteriormente que los LLM no realizan ninguna tarea propia, realizan nuestras tareas. Sería mejor decir que, en realidad, no hacen nada en absoluto. De ahí el tercer salto: tratar a los LLM como agentes. Sin embargo, dado que los LLM no son agentes <Note id={12} />, y mucho menos epistémicos, no están en posición de hacer o saber nada.
                                        </p>
                                    </div>
                                </div>
                            </section>

                            {/* Author Institutions Section */}
                            <div className="mt-20 pt-12 border-t border-slate-800 text-xs text-slate-500 space-y-2 font-mono">
                                <p>1 Departamento de Filosofía, Universidad de Stanford, 450 Stanford Way, Main Quad, Building 90, Stanford, CA 94305, EE. UU.</p>
                                <p>2 Institut für Philosophie, Freie Universität Berlin, Habelschwerdter Allee 30, 14195, Berlín, Alemania</p>
                                <p>3 Centro de Estudios Avanzados en Humanidades: "Human Abilities," Schönhauser Allee 10-11, 10119, Berlín, Alemania</p>
                                <p>4 Departamento de Filosofía; Universidad de California Berkeley, 314 Philosophy Hall #2390, Berkeley, CA 94720, EE. UU.</p>
                                <p>5 Grupo de Investigación Einstein: "Reorganizing Ourselves," Graduierten Kolleg: Normativity, Critique, Change, Freie Universität Berlin, Altensteinstraße 15, 14195, Berlín, Alemania</p>
                                <p>6 Departamento de Filosofía, Universidad de British Columbia, 1866 Main Mall, Vancouver, BC V6T 1Z4, Canadá</p>
                                <p className="pt-4 text-cyan-400 font-bold uppercase tracking-widest">Correspondencia: evan.thompson@ubc.ca (E. Thompson).</p>
                            </div>

                            {/* References Section */}
                            <section id="references" className="pt-20">
                                <h3 className="text-2xl font-playfair text-white italic mb-8 border-b border-slate-800 pb-2">Referencias</h3>
                                <div className="space-y-4 text-sm leading-relaxed">
                                    {references.map((ref) => (
                                        <div key={ref.id} className="flex gap-4 group">
                                            <span className="text-cyan-500 font-bold min-w-[20px]">{ref.id}.</span>
                                            <p className="group-hover:text-slate-100 transition-colors">{ref.text}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </main>

                    {/* Floating Footnote Tooltip */}
                    {activeNote && (
                        <motion.div 
                            initial={{ opacity: 0, y: 50, x: '-50%' }}
                            animate={{ opacity: 1, y: 0, x: '-50%' }}
                            className="fixed bottom-10 left-1/2 z-50 w-full max-w-2xl bg-slate-900/95 backdrop-blur-xl p-6 rounded-2xl border border-slate-800 shadow-2xl"
                        >
                            <div className="flex items-start gap-4">
                                <div className="bg-cyan-500/10 p-2 rounded-lg text-cyan-400">
                                    <Info size={20} />
                                </div>
                                <div className="space-y-2">
                                    <span className="text-xs font-bold text-cyan-400 uppercase tracking-widest">Referencia {activeNote.id}</span>
                                    <p className="text-slate-200 text-sm leading-relaxed text-justify hyphens-auto">{activeNote.text}</p>
                                </div>
                            </div>
                        </motion.div>
                    )}

                    {/* Footer */}
                    <footer className="bg-slate-900 py-12 px-6 border-t border-slate-800">
                        <div className="max-w-7xl mx-auto flex justify-end items-center">
                            <button 
                                onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                                className="bg-slate-800 hover:bg-cyan-500 hover:text-white p-2 rounded-full transition-all"
                            >
                                <ArrowUp size={16} />
                            </button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
