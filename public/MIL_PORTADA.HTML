                    <main className="w-full px-6 md:px-12">
                        
                        {/* --- PREFACE --- */}
                        <section id="preface">
                            <SectionHeader title="Prefacio" />
                            
                            <TextBlock>
                                <span className="float-left text-6xl text-amber-500 font-serif mr-4 mt-[-10px] leading-[0.8]">E</span>
                                L TEMA DE ESTE LIBRO es la profunda continuidad entre la vida y la mente. Donde hay vida hay mente, y la mente en sus formas más articuladas pertenece a la vida. La vida y la mente comparten un conjunto central de propiedades formales u organizacionales, y las propiedades formales u organizacionales distintivas de la mente son una versión enriquecida de aquellas fundamentales para la vida. Más precisamente, las características de auto-organización de la mente son una versión enriquecida de las características de auto-organización de la vida. La organización autoproducida o <Concept>"autopoyética"</Concept> de la vida biológica ya implica cognición, y esta mente incipiente encuentra expresión sentiente en la dinámica auto-organizada de la acción, la percepción y la emoción, así como en el flujo auto-movido de la conciencia del tiempo.
                            </TextBlock>

                            <TextBlock>
                                Desde esta perspectiva, la vida mental es también vida corporal y está situada en el mundo. Las raíces de la vida mental no yacen simplemente en el cerebro, sino que se ramifican a través del cuerpo y el entorno. Nuestras vidas mentales involucran nuestro cuerpo y el mundo más allá de la membrana superficial de nuestro organismo, y por lo tanto no pueden reducirse simplemente a procesos cerebrales dentro de la cabeza.
                            </TextBlock>

                            <TextBlock>
                                Los capítulos venideros elaboran estas ideas utilizando material extraído de tres fuentes principales: biología, filosofía fenomenológica, y psicología y neurociencia. El libro en su conjunto tiene la intención de llevar a las ciencias experimentales de la vida y la mente a una relación más cercana y armoniosa con las investigaciones fenomenológicas de la experiencia y la subjetividad.
                            </TextBlock>

                            <TextBlock>
                                El motivo principal detrás de este objetivo es avanzar en uno de los problemas filosóficos y científicos más destacados de nuestro tiempo: la llamada <Concept>brecha explicativa</Concept> entre la conciencia y la naturaleza. ¿Exactamente cómo se relacionan la conciencia y la experiencia subjetiva con el cerebro y el cuerpo? Una cosa es ser capaz de establecer correlaciones entre la conciencia y la actividad cerebral; otra cosa es tener una explicación que explique exactamente cómo ciertos procesos biológicos generan y realizan la conciencia y la subjetividad. En el momento actual, no solo carecemos de tal explicación, sino que también estamos inseguros sobre la forma que necesitaría tener para cerrar la brecha conceptual y epistemológica entre la vida y la mente como objetos de investigación científica, y la vida y la mente tal como las experimentamos subjetivamente.
                            </TextBlock>

                            <TextBlock>
                                En este libro, no ofrezco ninguna teoría o modelo nuevo u original de la conciencia, ningún análisis conceptual nuevo de conceptos físicos y fenoménicos, y ninguna nueva síntesis metafísica especulativa para unificar conciencia y naturaleza. Mi objetivo y enfoque son diferentes. Para hacer un progreso real en la brecha explicativa, necesitamos cuentas fenomenológicas más ricas de la estructura de la experiencia, y necesitamos explicaciones científicas de la mente y la vida informadas por estas explicaciones fenomenológicas. La fenomenología a su vez necesita ser informada por la psicología, la neurociencia y la biología. Mi objetivo no es cerrar la brecha explicativa en un sentido reductivo, sino más bien ampliar y enriquecer los recursos filosóficos y científicos que tenemos para abordar la brecha. Mi enfoque es, por tanto, llevar los análisis fenomenológicos de la experiencia a una relación mutuamente iluminadora con los análisis científicos de la vida y la mente.
                            </TextBlock>
                        </section>

                        {/* --- ACKNOWLEDGMENTS --- */}
                        <section id="acknowledgments">
                            <SectionHeader title="Agradecimientos" />

                            <TextBlock>
                                NO PUEDO EVITAR pensar en este libro como ejemplificación de lo que los filósofos llaman la <Concept>teoría del haz</Concept> de la identidad personal. Según la teoría del haz, no hay un yo único y permanente que persista a través del tiempo; el yo es más bien un haz de experiencias o episodios mentales constantemente cambiantes y psicológicamente continuos. De manera similar, este libro comenzó hace muchos años y ha sufrido tantas transformaciones desde su inicio que no puedo decir con confianza que sea el "mismo" libro en el que comencé a trabajar hace más de diez años.
                            </TextBlock>

                            <TextBlock>
                                Originalmente, este libro (o su antepasado textual) se suponía que iba a ser coescrito con <Entity>Francisco Varela</Entity>. Esperábamos escribir una continuación de nuestro libro (coescrito con <Entity>Eleanor Rosch</Entity>), <i>The Embodied Mind: Cognitive Science and Human Experience</i> (MIT Press, 1991). Cuando comenzamos a planificar nuestro nuevo libro (en 1994), Francisco acababa de enterarse de que estaba crónicamente enfermo de Hepatitis C. Así, desde el principio, un sentido de urgencia yacía sobre este libro. Eventualmente se hizo claro que Francisco necesitaría un trasplante de hígado. En este momento (en 1998), Francisco decidió retirarse del proyecto y me animó a continuar por mi cuenta. Así me dispuse a revisar el libro yo solo. Después del éxito del trasplante, Francisco sintió un nuevo entusiasmo por el proyecto, e intentamos reanudar nuestros esfuerzos colaborativos. Tristemente, su enfermedad regresó no mucho después, y Francisco murió el 28 de mayo de 2001, en su hogar en París. El obituario que escribí unos días después para la revista en línea <i>Psyche</i> puede leerse en: <i>http://psyche.cs.monash.edu.au/v7/psyche-7-12-thompson.html</i>. Una versión abreviada también fue publicada en el <i>Journal of Consciousness Studies</i> 8 (2001): 66-69.
                            </TextBlock>

                            <TextBlock>
                                Después de la muerte de Francisco, intenté continuar escribiendo este libro como uno coescrito. Pero aún quedaba una gran cantidad de escritura por hacer, y a medida que pasaba el tiempo se hizo claro que el libro necesitaba ser completamente refundido y reescrito por mí solo. Reorganicé y reescribí los capítulos, y cambié el título dos veces, antes de que el libro finalmente tomara su forma actual. Así, aunque la enorme influencia del pensamiento de Francisco será evidente para cualquiera que lea este libro, asumo plena responsabilidad por los contenidos de esta obra, y todos los defectos y errores son míos.
                            </TextBlock>

                            <TextBlock>
                                A lo largo del largo y difícil tiempo que ha tomado producir este libro, he tenido el apoyo y aliento de muchas personas.
                            </TextBlock>
                            
                            <TextBlock>
                                Nadie me ha dado más aliento, ayuda y amor, y ha compartido más en la tumultuosa vida de este libro, que <Entity>Rebecca Todd</Entity>. El amor y la gratitud que siento están más allá de la expresión. Además de vivir con mis largos períodos de auto-absorción mientras luchaba con este libro, ella ha leído numerosos borradores y me ha ayudado a mejorar mi pensamiento y escritura inmensamente. No puedo imaginar haber escrito este libro sin ella.
                            </TextBlock>

                            <TextBlock>
                                Nuestros hijos <Entity>Maximilian Todd Williams</Entity> y <Entity>Gareth Todd Thompson</Entity> han tenido que soportar mi trabajo en este libro durante casi toda sus vidas. Mi gratitud hacia ellos es ilimitada. Dedico este libro a ellos, y a nuestro querido amigo de la familia, <Entity>Gabriel Cohen Varela</Entity>, hijo de Francisco Varela y <Entity>Amy Cohen Varela</Entity>, y de la misma edad que mi hijo menor.
                            </TextBlock>

                            <TextBlock>
                                <Entity>Gail Thompson</Entity>, <Entity>William Irwin Thompson</Entity>, y <Entity>Hilary Thompson</Entity> han brindado un gran apoyo en formas demasiado numerosas para detallar. Les estoy profundamente agradecido.
                            </TextBlock>

                            </TextBlock>

                            <TextBlock>
                                Muchas personas a lo largo de los años han leído varias porciones de este libro y dado consejos útiles en el camino: <Entity>Giovanna Colombetti</Entity>, <Entity>Diego Cosmelli</Entity>, <Entity>Isabela Granic</Entity>, <Entity>Robert Hanna</Entity>, <Entity>Marc Lewis</Entity>, <Entity>Antoine Lutz</Entity>, <Entity>Susan Oyama</Entity>, <Entity>Michael Silberstein</Entity>, <Entity>Dan Zahavi</Entity>, y <Entity>Phil Zelazo</Entity>.
