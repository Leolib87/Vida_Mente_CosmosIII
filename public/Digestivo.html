<!DOCTYPE html>
<html lang="es">
<head>
    <!-- vmc-theme-injected -->
    <link rel="stylesheet" href="theme.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Maestro: El Sistema Digestivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .option-card {
            transition: all 0.2s ease-in-out;
        }

        .option-card:hover:not(.disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .option-card.selected {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }

        .option-card.correct {
            border-color: #22c55e;
            background-color: #f0fdf4;
            color: #15803d;
        }

        .option-card.incorrect {
            border-color: #ef4444;
            background-color: #fef2f2;
            color: #b91c1c;
        }

        .option-card.disabled {
            cursor: default;
            opacity: 0.7;
        }

        .progress-bar-fill {
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

<script>
const questionBank = [
    // GENERALIDADES
    {
        c: "GENERALIDADES",
        q: "¿Cuáles son los dos grupos de órganos principales que componen el aparato digestivo?",
        opts: ["Tracto gastrointestinal y órganos digestivos accesorios", "Estómago e intestino", "Vísceras sólidas y huecas", "Sistema superior e inferior"],
        a: 0,
        exp: "El aparato digestivo se divide en el tracto gastrointestinal (tubo continuo boca-ano) y los órganos digestivos accesorios (dientes, lengua, glándulas, etc.)."
    },
    {
        c: "GENERALIDADES",
        q: "¿Cuál es la longitud aproximada del tracto gastrointestinal en una persona viva con tono muscular?",
        opts: ["9-11 metros", "5-7 metros", "2-3 metros", "10-12 metros"],
        a: 1,
        exp: "En una persona viva, debido al tono muscular, mide unos 5-7 metros. En un cadáver es más largo (7-9m) por la pérdida de tono."
    },
    {
        c: "GENERALIDADES",
        q: "¿Cuál de los siguientes NO es uno de los 6 procesos básicos del aparato digestivo?",
        opts: ["Ingestión", "Filtración", "Secreción", "Mezcla y propulsión"],
        a: 1,
        exp: "Los 6 procesos son: Ingestión, Secreción, Mezcla/Propulsión, Digestión, Absorción y Defecación. La filtración es renal."
    },
    // CAPAS DEL TUBO
    {
        c: "HISTOLOGÍA",
        q: "¿Cuál es la secuencia correcta de las capas del tubo digestivo desde la profundidad a la superficie?",
        opts: ["Serosa, Muscular, Submucosa, Mucosa", "Mucosa, Submucosa, Muscular, Serosa", "Mucosa, Muscular, Submucosa, Serosa", "Submucosa, Mucosa, Serosa, Muscular"],
        a: 1,
        exp: "El orden desde la luz hacia afuera es: Mucosa (epitelio, lámina propia, muscularis mucosae), Submucosa, Muscular y Serosa/Adventicia."
    },
    {
        c: "HISTOLOGÍA",
        q: "¿Qué es el MALT y dónde se localiza principalmente?",
        opts: ["Músculo de absorción en la submucosa", "Tejido Linfático Asociado a la Mucosa, en la lámina propia", "Mucosa Alveolar, en la boca", "Membrana de transporte, en la serosa"],
        a: 1,
        exp: "El MALT (Tejido Linfático Asociado a la Mucosa) contiene células inmunitarias y está en la lámina propia de la mucosa."
    },
    {
        c: "INERVACIÓN",
        q: "¿Dónde se localiza el Plexo de Meissner y qué regula?",
        opts: ["En la muscular; regula la motilidad", "En la submucosa; regula la secreción", "En la serosa; regula el dolor", "En la mucosa; regula la absorción"],
        a: 1,
        exp: "El plexo submucoso o de Meissner se encuentra en la submucosa y regula principalmente las secreciones gastrointestinales."
    },
    {
        c: "INERVACIÓN",
        q: "¿Dónde se localiza el Plexo Mientérico o de Auerbach?",
        opts: ["En la submucosa", "Entre las capas longitudinal y circular de la muscular", "En la serosa", "En la lámina propia"],
        a: 1,
        exp: "El plexo mientérico se localiza entre las capas de músculo liso circular y longitudinal y controla la motilidad (frecuencia y fuerza)."
    },
    // PERITONEO
    {
        c: "PERITONEO",
        q: "¿Qué órganos se consideran retroperitoneales?",
        opts: ["Estómago e Hígado", "Yeyuno e Íleon", "Riñones y Páncreas", "Colon transverso y sigmoides"],
        a: 2,
        exp: "Los riñones y el páncreas (junto con el colon ascendente/descendente y duodeno) se localizan en la pared posterior y son retroperitoneales."
    },
    {
        c: "PERITONEO",
        q: "¿Qué repliegue peritoneal cuelga sobre el colon transverso y el intestino delgado como un 'delantal adiposo'?",
        opts: ["Epiplón menor", "Mesenterio", "Epiplón mayor", "Ligamento falciforme"],
        a: 2,
        exp: "El epiplón mayor es la hoja más grande del peritoneo, contiene mucho tejido adiposo y ganglios linfáticos."
    },
    {
        c: "PERITONEO",
        q: "¿Qué repliegue une el hígado a la pared abdominal anterior?",
        opts: ["Mesocolon", "Ligamento falciforme", "Epiplón menor", "Mesenterio"],
        a: 1,
        exp: "El ligamento falciforme une el hígado a la pared abdominal anterior y al diafragma."
    },
    {
        c: "PERITONEO",
        q: "¿Qué estructura une el intestino delgado a la pared abdominal posterior?",
        opts: ["Mesenterio", "Mesocolon", "Epiplón mayor", "Ligamento redondo"],
        a: 0,
        exp: "El mesenterio es el repliegue en forma de abanico que fija el yeyuno y el íleon a la pared posterior."
    },
    // BOCA
    {
        c: "BOCA",
        q: "¿Qué enzima contenida en la saliva inicia la digestión del almidón?",
        opts: ["Lipasa lingual", "Pepsina", "Amilasa salival", "Tripsina"],

        exp: "La amilasa salival inicia la degradación del almidón en maltosa, maltotriosa o a-dextrinas en la boca."
    },
    {
        c: "BOCA",
        q: "¿Qué glándula salival vierte su secreción a través del conducto de Stenon (parotídeo) frente al segundo molar superior?",

        a: 0,
        exp: "La parótida secreta saliva serosa rica en amilasa a través del conducto parotídeo hacia el vestíbulo."
    },
    {
        c: "BOCA",
        q: "¿Cuál es la sustancia más dura del cuerpo humano?",
        opts: ["Hueso compacto", "Dentina", "Esmalte dental", "Cemento"],
        a: 2,
        exp: "El esmalte consiste en 95% de sales de calcio (fosfato y carbonato) y es la sustancia más dura."
    },
    {
        c: "BOCA",
        q: "¿Cuántos dientes tiene la dentición permanente completa?",
        opts: ["20", "28", "32", "36"],
        a: 2,
        exp: "La dentición permanente consta de 32 dientes (8 incisivos, 4 caninos, 8 premolares y 12 molares)."
    },
    {
        c: "BOCA",
        q: "¿Qué función cumple la úvula durante la deglución?",
        opts: ["Triturar alimentos", "Cerrar la nasofaringe", "Secretar saliva", "Detectar sabores"],

        exp: "El paladar blando y la úvula se elevan para ocluir la nasofaringe y evitar que los alimentos entren en la cavidad nasal."

    // ESÓFAGO Y DEGLUCIÓN
    {
        c: "ESÓFAGO",
        q: "¿Qué tipo de músculo se encuentra en el tercio superior del esófago?",
        opts: ["Músculo liso exclusivamente", "Músculo esquelético", "Mezcla de liso y esquelético", "Cartílago"],

        exp: "El tercio superior es músculo esquelético, el medio es mixto, y el inferior es músculo liso."

    {
        c: "DEGLUCIÓN",
        q: "¿En qué fase de la deglución el bolo pasa involuntariamente hacia el esófago mientras se cierra la epiglotis?",

        exp: "La fase faríngea es involuntaria; el paladar blando sube, la epiglotis baja y el bolo pasa a través de la faringe."

    {
        c: "ESÓFAGO",
        q: "¿Qué esfínter falla en la Enfermedad por Reflujo Gastroesofágico (ERGE)?",

        a: 3,
        exp: "Si el esfínter esofágico inferior no se cierra adecuadamente, el contenido ácido del estómago refluye al esófago."
    },
    // ESTÓMAGO
    {
        c: "ESTÓMAGO",
        q: "¿Cuáles son las cuatro regiones principales del estómago?",
        opts: ["Cardias, Fundus, Cuerpo, Píloro", "Cabeza, Cuello, Cuerpo, Cola", "Ascendente, Transverso, Descendente, Sigmoides", "Duodeno, Yeyuno, Íleon, Ciego"],
        a: 0,
        exp: "El estómago se divide en Cardias (entrada), Fundus (cúpula), Cuerpo (central) y Píloro (salida)."
    },
    {
        c: "ESTÓMAGO",
        q: "¿Qué célula gástrica secreta el Factor Intrínseco y por qué es vital?",
        opts: ["Célula principal; para digerir proteínas", "Célula G; para secretar gastrina", "Célula parietal; para absorber vitamina B12", "Célula mucosa; para proteger la pared"],

        exp: "Las células parietales secretan HCl y Factor Intrínseco. Este último es indispensable para la absorción de vitamina B12 en el íleon."
    },
    {
        c: "ESTÓMAGO",
        q: "¿Qué secretan las células principales (cimógenas)?",
        opts: ["Ácido clorhídrico", "Pepsinógeno y lipasa gástrica", "Gastrina", "Moco alcalino"],
        a: 1,
        exp: "Secretan pepsinógeno (inactivo) y lipasa gástrica. El pepsinógeno se activa a pepsina con el ácido."

    {
        c: "ESTÓMAGO",
        q: "¿Cómo se genera el Ácido Clorhídrico (HCl) en el estómago?",

        exp: "Las células parietales secretan H+ y Cl- por separado a la luz gástrica. La bomba H+/K+ ATPasa es clave en este proceso."

    {
        c: "ESTÓMAGO",
        q: "¿Qué hormona estimula la secreción de jugo gástrico, la motilidad y relaja el esfínter pilórico?",
        opts: ["Secretina", "CCK", "Gastrina", "Somatostatina"],
        a: 2,
        exp: "La Gastrina, secretada por las células G, estimula la actividad gástrica general (secreción de HCl y pepsinógeno, motilidad)."

    {

        exp: "La lipasa gástrica desdobla triglicéridos de cadena corta (comunes en la leche) y opera mejor a pH 5-6."

        q: "¿Qué porcentaje del páncreas tiene función exocrina (ácinos) vs endocrina (islotes)?",

        exp: "El 99% del páncreas son ácinos que secretan jugo pancreático; solo el 1% son islotes de Langerhans (insulina/glucagón)."

    {
        c: "PÁNCREAS",
        q: "¿Cuál es la función principal del bicarbonato de sodio en el jugo pancreático?",

        exp: "El bicarbonato neutraliza la acidez del quimo que llega del estómago, creando un pH alcalino óptimo para las enzimas pancreáticas."

        q: "¿Qué enzima del intestino activa al Tripsinógeno convirtiéndolo en Tripsina?",

        exp: "La enterocinasa, una enzima del ribete en cepillo, activa el tripsinógeno. La tripsina luego activa a otras enzimas precursoras."

    {

        q: "¿Dónde desembocan el conducto colédoco y el conducto pancreático principal?",

// Unir arrays
const finalQuizData = [...questionBank, ...extraQuestions];

// Estado de la App
const app = {
    currentQ: 0,
    score: 0,
    answers: new Array(finalQuizData.length).fill(null), // Guarda índices de respuestas
    
    init() {
        this.renderProgressBar();
        this.loadQuestion();
        this.updateNavButtons();
        document.getElementById('loading').style.display = 'none';
    },

    loadQuestion() {
        const q = finalQuizData[this.currentQ];
        const qNum = this.currentQ + 1;
        
        // Update UI Text
        document.getElementById('current-q-num').textContent = qNum;
        document.getElementById('category-tag').textContent = q.c;
        document.getElementById('question-text').textContent = q.q;
        
        // Update Options
        const optsContainer = document.getElementById('options-list');
        optsContainer.innerHTML = '';
        
        q.opts.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = `option-card w-full text-left p-4 rounded-xl border-2 border-slate-100 bg-white font-medium text-slate-700 flex items-center gap-3 ${this.answers[this.currentQ] !== null ? 'disabled' : ''}`;
            
            // Estado previo (si ya respondió)
            if (this.answers[this.currentQ] !== null) {
                const userAns = this.answers[this.currentQ];
                if (index === q.a) {
                    btn.classList.add('correct');
                    btn.innerHTML = `<i class="fas fa-check-circle"></i> ${opt}`;
                } else if (index === userAns) {
                    btn.classList.add('incorrect');
                    btn.innerHTML = `<i class="fas fa-times-circle"></i> ${opt}`;
                } else {
                    btn.innerHTML = `<i class="far fa-circle"></i> ${opt}`;
                }
                btn.disabled = true;
            } else {
                btn.innerHTML = `<div class="w-6 h-6 rounded-full border-2 border-slate-300 flex items-center justify-center group-hover:border-blue-400"><div class="w-3 h-3 rounded-full bg-blue-500 transform scale-0 transition"></div></div> ${opt}`;
                btn.onclick = () => this.selectAnswer(index);
            }
            
            optsContainer.appendChild(btn);
        });

        // Update Feedback visibility
        this.toggleFeedback(this.answers[this.currentQ] !== null);
    },

    selectAnswer(index) {
        if (this.answers[this.currentQ] !== null) return; // Ya respondido

        this.answers[this.currentQ] = index;
        const q = finalQuizData[this.currentQ];

        if (index === q.a) {
            this.score++;
            this.updateScore();
        }

        this.renderProgressBar();
        this.loadQuestion(); // Recargar para mostrar estados
    },

    toggleFeedback(show) {
        const area = document.getElementById('feedback-area');
        const icon = document.getElementById('feedback-icon');
        const title = document.getElementById('feedback-title');
        const text = document.getElementById('feedback-text');
        const q = finalQuizData[this.currentQ];
        const userAns = this.answers[this.currentQ];

        if (show && userAns !== null) {
            area.classList.remove('hidden');
            area.classList.remove('bg-emerald-50', 'border-emerald-400', 'text-emerald-800', 'bg-rose-50', 'border-rose-400', 'text-rose-800');
            
            if (userAns === q.a) {
                area.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-900');
                icon.innerHTML = '<i class="fas fa-check-circle text-emerald-500"></i>';
                title.textContent = "¡Correcto!";
            } else {
                area.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-900');
                icon.innerHTML = '<i class="fas fa-times-circle text-rose-500"></i>';
                title.textContent = "Incorrecto";
            }
            text.textContent = q.exp;
        } else {
            area.classList.add('hidden');
        }
    },

    nextQuestion() {
        if (this.currentQ < finalQuizData.length - 1) {
            this.currentQ++;
            this.initQuestionView();
        } else {
            this.showResults();
        }
    },

    prevQuestion() {
        if (this.currentQ > 0) {
            this.currentQ--;
            this.initQuestionView();
        }
    },

    initQuestionView() {
        // Pequeña animación al cambiar
        const container = document.getElementById('quiz-container');
        container.classList.remove('fade-in');
        void container.offsetWidth; // trigger reflow
        container.classList.add('fade-in');
        
        this.loadQuestion();
        this.updateNavButtons();
    },

    updateNavButtons() {
        const prev = document.getElementById('btn-prev');
        const next = document.getElementById('btn-next');
        
        prev.disabled = this.currentQ === 0;
        
        if (this.currentQ === finalQuizData.length - 1) {
            next.innerHTML = 'Finalizar <i class="fas fa-flag-checkered"></i>';
            next.classList.remove('bg-blue-600', 'hover:bg-blue-700');
            next.classList.add('bg-emerald-500', 'hover:bg-emerald-600');
        } else {
            next.innerHTML = 'Siguiente <i class="fas fa-arrow-right"></i>';
            next.classList.add('bg-blue-600', 'hover:bg-blue-700');
            next.classList.remove('bg-emerald-500', 'hover:bg-emerald-600');
        }
    },

    renderProgressBar() {
        const total = finalQuizData.length;
        const answered = this.answers.filter(a => a !== null).length;
        const percent = (answered / total) * 100;
        document.getElementById('progress-bar').style.width = `${percent}%`;
    },

    updateScore() {
        document.getElementById('score-counter').textContent = `Puntos: ${this.score}`;
    },

    showResults() {
        document.getElementById('quiz-container').style.display = 'none';
        const results = document.getElementById('results-screen');
        results.classList.remove('hidden');
        results.style.display = 'block'; // Forzar display
        
        document.getElementById('final-score').textContent = `${Math.round((this.score / finalQuizData.length) * 100)}%`;
        document.getElementById('final-correct').textContent = this.score;
        document.getElementById('final-incorrect').textContent = finalQuizData.length - this.score;
    }
};

// Iniciar app
app.init();
</script>
</body>
</html>
