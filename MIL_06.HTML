                            <SectionHeader chapterNumber="6" title="Vida y Mente: La Filosofía del Organismo" />
                            
                            <TextBlock>
                                <span className="float-left text-6xl text-amber-500 font-serif mr-4 mt-[-10px] leading-[0.8]">S</span>
                                I LA <Concept>autopoiesis</Concept> y la <Concept>cognición</Concept> son lo que distingue la vida de la no-vida, entonces los proyectos de comprender la vida y comprender la mente son continuos. Esta <Concept>continuidad profunda de la vida y la mente</Concept> se sostiene no menos para la filosofía que para la biología y la ciencia de la mente. Como escribió <Entity>Hans Jonas</Entity> en la introducción a su libro de 1966, <BookTitle>El fenómeno de la vida</BookTitle>:
                            </TextBlock>

                            <Quote>
                                Una filosofía de la vida comprende la filosofía del organismo y la filosofía de la mente. Esto es en sí mismo una primera proposición de la filosofía de la vida, de hecho su hipótesis, que debe hacer buena en el curso de su ejecución. Porque la declaración de alcance expresa nada menos que la afirmación de que lo orgánico, incluso en sus formas más bajas, prefigura la mente, y que la mente, incluso en sus alcances más altos, permanece parte de lo orgánico (1966, p. 1).
                            </Quote>

                            <TextBlock>
                                En la ciencia de la mente, la proposición de que la vida prefigura la mente y la mente pertenece a la vida ha sido llamada la <Concept>tesis de la continuidad fuerte de la vida y la mente</Concept> (<Entity>Godfrey-Smith</Entity> 1996; <Entity>Wheeler</Entity> 1997), o como yo prefiero llamarla, la <Concept>continuidad profunda de la vida y la mente</Concept>. Según esta tesis, la vida y la mente comparten un conjunto de propiedades organizativas básicas, y las propiedades organizativas distintivas de la mente son una versión enriquecida de aquellas fundamentales para la vida. La mente es similar a la vida y la vida es similar a la mente. <Entity>Andy Clark</Entity> describe la tesis de esta manera: “la tesis de la continuidad fuerte sería verdadera si, por ejemplo, los conceptos básicos necesarios para entender la organización dinámica de los eventos biológicos resultaran ser también los conceptos básicos necesarios para entender la organización de los eventos cognitivos” (2001, p. 118). Si la teoría de la autopoiesis es correcta, entonces esta tesis es verdadera.
                            </TextBlock>

                            <TextBlock>
                                En este capítulo, exploro la continuidad profunda de la vida y la mente basándome en la teoría de la autopoiesis y en la filosofía del organismo de <Entity>Hans Jonas</Entity>. Argumento que ciertos tipos de explicaciones biológicas tienen una forma y estructura lógica distintiva, a saber, una forma y estructura <Concept>teleológica</Concept>. Esta forma lógica corresponde directamente a la estructura de la vida misma como se explica por la teoría de la autopoiesis. El auto-mantenimiento y la reproducción no son hechos brutos biológicos, sino logros de los seres vivos. Para mantener estos logros, la vida es necesariamente propositiva. La autopoiesis y la cognición mínimas establecen así una lógica inmanente o intrínseca para la vida que explica los orígenes de la teleología en la naturaleza.
                            </TextBlock>

                            <SubSectionHeader title="Mecanismo y Teleología" />

                            <TextBlock>
                                La cuestión de la teleología en biología tiene una historia larga y accidentada. En la filosofía moderna temprana, <Entity>Descartes</Entity> y <Entity>Bacon</Entity> desterraron las causas finales de la física, pero permanecieron como un problema obstinado para la biología (o la “filosofía natural” como se llamaba entonces). En el siglo XVIII, <Entity>Kant</Entity> argumentó que los organismos son “fines naturales” porque son causa y efecto de sí mismos: en un organismo las partes se producen recíprocamente entre sí y existen por y para el todo (la organización circular auto-productora de la autopoiesis). <Entity>Kant</Entity> pensaba que esta organización circular no podía explicarse mecánicamente en términos de la acción de las partes sobre el todo. Por lo tanto, concluyó que la teleología es una noción regulativa necesaria para nuestra comprensión de los organismos, pero no una propiedad constitutiva de la naturaleza misma.
                            </TextBlock>

                            <TextBlock>
                                A menudo se considera que la teoría de la evolución de <Entity>Darwin</Entity> resolvió el problema de la teleología al mostrar cómo la apariencia de diseño y propósito en la naturaleza puede explicarse por el mecanismo ciego de la selección natural. La selección natural actúa sobre la variación aleatoria dentro de una población, preservando aquellos rasgos que confieren una ventaja reproductiva. Con el tiempo, este proceso da como resultado organismos que parecen estar diseñados para sus entornos. En esta visión, la teleología es aparente, no real; es <Concept>teleonomía</Concept>, no verdadera teleología.
                            </TextBlock>

                            <TextBlock>
                                Sin embargo, la teoría de la autopoiesis sugiere una perspectiva diferente. La autopoiesis implica que la teleología es intrínseca a la vida. Un sistema autopoyético es un sistema que se produce a sí mismo. Su propia existencia es su meta o propósito. El sistema actúa para mantenerse en existencia. Este tipo de comportamiento dirigido a metas no es impuesto desde el exterior (como en una máquina diseñada por humanos) ni es simplemente el resultado de la selección natural (aunque la selección natural ciertamente juega un papel en la configuración de los organismos). Es una propiedad constitutiva de la organización viviente misma.
                            </TextBlock>

                            <TextBlock>
                                <Entity>Jonas</Entity> argumenta que el metabolismo es la forma básica de libertad e interioridad en la naturaleza. A través del metabolismo, el organismo se libera de la identidad con su materia constitutiva. Los átomos y moléculas que componen el organismo cambian constantemente, pero la forma u organización del organismo persiste. Esta persistencia dinámica a través del cambio material es lo que <Entity>Jonas</Entity> llama “libertad necesaria”. Es libertad porque el organismo no es idéntico a su materia; es necesaria porque el organismo debe intercambiar constantemente materia y energía con su entorno para mantenerse. Esta “libertad menesterosa” es la raíz de la teleología, el valor y la mente.
                            </TextBlock>

                            <SubSectionHeader title="La Fenomenología de la Vida" />

                            <TextBlock>
                                La perspectiva de <Entity>Jonas</Entity> es fenomenológica en el sentido de que toma nuestra propia experiencia vivida como punto de partida para comprender la vida. Experimentamos nuestro propio cuerpo no solo como un objeto físico (Körper), sino como un cuerpo vivido (Leib), el centro de nuestra acción y percepción. Experimentamos nuestro propio esfuerzo, deseo y propósito desde dentro. <Entity>Jonas</Entity> argumenta que esta experiencia interna es la clave para comprender la naturaleza de la vida en general. No proyectamos antropomórficamente nuestras propias características sobre otros organismos; más bien, reconocemos en otros organismos la misma estructura básica de existencia que experimentamos en nosotros mismos.
                            </TextBlock>

                            <TextBlock>
                                Esta forma de pensar es contraria a la tendencia objetivista en la ciencia moderna, que trata de explicar todo en términos de mecanismos físicos y químicos “muertos”. Pero como señala <Entity>Jonas</Entity>, este objetivismo es en sí mismo una abstracción de nuestra experiencia completa del mundo. La vida es un fenómeno que no puede entenderse completamente desde una perspectiva puramente externa y mecanicista. Requiere una “biología filosófica” que reconozca la realidad de la interioridad, el propósito y el valor en la naturaleza.
                            </TextBlock>

                            <SubSectionHeader title="Autopoiesis y Libertad" />

                            <TextBlock>
                                La teoría de la autopoiesis proporciona un fundamento científico para la filosofía del organismo de <Entity>Jonas</Entity>. Al definir la vida en términos de organización circular y auto-producción, la autopoiesis muestra cómo la individualidad y la autonomía surgen en el mundo físico. Un sistema autopoyético no es una sustancia estática, sino un proceso dinámico de auto-realización. Su identidad no está dada de antemano, sino que debe lograrse continuamente a través de su propia actividad.
                            </TextBlock>

                            <TextBlock>
                                Esta actividad de auto-realización es lo que <Entity>Jonas</Entity> llama libertad. El organismo es libre en el sentido de que es la causa de su propio ser. No está completamente determinado por causas externas, sino que sigue sus propias normas internas de auto-mantenimiento. Por supuesto, esta libertad es siempre relativa y precaria. El organismo depende de su entorno para los materiales y la energía que necesita para sobrevivir. Pero dentro de estas limitaciones, el organismo exhibe una forma genuina de autonomía y autodeterminación.
                            </TextBlock>

                            <SubSectionHeader title="El Problema del Valor" />

                            <TextBlock>
                                Si la vida es intrínsecamente teleológica, entonces el valor también es intrínseco a la naturaleza. Para un organismo, su propia existencia es un valor, un bien que debe ser preservado y promovido. Todo lo que contribuye al mantenimiento del organismo es bueno; todo lo que lo amenaza es malo. El valor no es una proyección subjetiva de los seres humanos, sino una característica objetiva de la realidad biológica. El mundo del organismo no es un mundo de hechos neutrales, sino un mundo de significado y valor. El azúcar es bueno para la bacteria porque contribuye a su autopoiesis; el veneno es malo porque la destruye.
                            </TextBlock>

                            <TextBlock>
                                Esta naturalización del valor tiene profundas implicaciones para la ética y la filosofía ambiental. Sugiere que tenemos obligaciones morales hacia otros seres vivos no solo porque nos son útiles o porque son similares a nosotros, sino porque son fines en sí mismos, centros de valor y propósito. Respetar la vida significa reconocer y respetar la autonomía y la integridad de otros organismos.
                            </TextBlock>

                            <SubSectionHeader title="La vida solo puede ser conocida por la vida" />

                            <TextBlock>
                                En esta última sección, volvamos la mirada hacia nosotros mismos y planteemos la siguiente pregunta: ¿qué nos permite, como científicos y filósofos, conocer o captar el fenómeno de la autopoiesis? ¿Cuáles son las condiciones de posibilidad para nuestro reconocimiento y comprensión de esta forma de existencia? ¿Sería la autopoiesis cognoscible desde un punto de vista objetivo y desencarnado? ¿O más bien podemos conocer esta forma de existencia porque se asemeja a la forma de nuestra propia autoconciencia corporal y subjetividad, que conocemos de primera mano?
                            </TextBlock>

                            <TextBlock>
                                La tesis de <Entity>Jonas</Entity> es que “la vida solo puede ser conocida por la vida” (1966, p. 91). El conocimiento de la vida no es un conocimiento de un objeto por un sujeto separado, sino un conocimiento de lo semejante por lo semejante. Solo porque somos seres vivos, seres que se esfuerzan, sienten y actúan, podemos reconocer estas características en otros seres. Nuestra propia experiencia interna nos proporciona la clave interpretativa para comprender las manifestaciones externas de la vida. Sin esta clave, veríamos organismos solo como mecanismos complejos, no como seres vivos.
                            </TextBlock>

                            <TextBlock>
                                Esto no significa que la biología deba basarse en la introspección o la proyección antropomórfica. Significa que la biología, como ciencia de la vida, presupone una pre-comprensión de la vida que se arraiga en nuestra propia existencia como seres vivos. Esta pre-comprensión es lo que hace posible reconocer un organismo como un organismo, es decir, como un todo unificado y autónomo, en lugar de como un mero agregado de partes químicas. La fenomenología hace explícita esta pre-comprensión y la somete a un análisis crítico.
                            </TextBlock>

                            <TextBlock>
                                En este capítulo y en el anterior nos hemos centrado en el conocimiento científico del orden vital, el fenómeno de la vida. El punto al que hemos llegado ahora, aunque familiar para los fenomenólogos, puede ser menos evidente para los biólogos, o al menos hablan de él con menos frecuencia. Este punto es que la empatía es una precondición de nuestra comprensión del orden vital, en particular del organismo como un ser que hace sentido y habita un entorno. Al usar el término <Concept>empatía</Concept> en este contexto, anticipo el último capítulo de este libro. Allí veremos que la empatía es una experiencia multifacética arraigada en la resonancia espontánea e involuntaria de dos cuerpos vivos entre sí. Es este tipo de empatía corporal lo que invoco ahora, pero ampliado más allá de la esfera humana para fundamentar nuestra comprensión del organismo y nuestro reconocimiento de la purposividad de la vida (<Entity>Husserl</Entity> 1980, pp. 94–98; 1989, pp. 170–180). La empatía en este sentido abarca el acoplamiento de nuestros cuerpos vividos humanos con los cuerpos de otros seres que reconocemos como vivos, ya sean humanos, animales o incluso —particularmente para los biólogos con un “sentimiento por el organismo” (<Entity>Keller</Entity> 1984)— bacterias.
                            </TextBlock>

                        </section>

            );
