                </div>
                <div>
                    <h4 class="font-bold text-gray-100">Tope</h4>
                    <p class="text-gray-300">Es el monto máximo que la Isapre bonificará para una determinada prestación. Cualquier costo por sobre ese tope, deberás pagarlo tú.</p>
                </div>
                 <div>
                    <h4 class="font-bold text-gray-100">PAD (Pago Asociado a Diagnóstico)</h4>
                    <p class="text-gray-300">Es un paquete de prestaciones y atenciones con un precio único y conocido para resolver un diagnóstico o tratamiento específico. El plan cubre un porcentaje de ese valor total.</p>
                </div>
            </div>
        `
    };

    const tabContent = document.getElementById('tab-content');
    const tabs = document.querySelectorAll('.tab');
    const tabSelect = document.getElementById('tabs');
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modal-content');
    const modalTitle = document.getElementById('modal-title');
    const modalBody = document.getElementById('modal-body');

    function createCard(item) {
        // Card structure is slightly different for restricted benefits
        const isRestricted = item.libreEleccion.includes('General');
        const libreEleccionClass = isRestricted ? 'text-orange-400' : 'text-blue-400';

        return `
            <div class="card rounded-xl shadow-lg p-5 transform hover:-translate-y-1 transition-transform duration-300 flex flex-col justify-between">
                <div>
                    <h4 class="font-bold text-gray-100 text-lg">${item.prestacion}</h4>
                    <div class="mt-4 grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <p class="font-semibold ${libreEleccionClass}">Libre Elección</p>
                            <p class="text-gray-200">${item.libreEleccion}</p>
                            <p class="text-gray-400 text-xs">Tope: ${item.topeLE}</p>
                        </div>
                        ${item.preferente !== 'N/A' ? `
                        <div>
                            <p class="font-semibold text-green-400">Oferta Preferente</p>
                            <p class="text-gray-200">${item.preferente}</p>
                            <p class="text-gray-400 text-xs">Tope: ${item.topeP}</p>
                        </div>` : ''}
                    </div>
                </div>
                <div class="mt-5">
                    <button onclick='openModal(${item.id}, "${item.prestacion.replace(/"/g, '&quot;')}", "${item.desc.replace(/"/g, '&quot;')}")' class="w-full text-center text-blue-400 font-semibold text-sm hover:text-blue-300">
                        ¿Qué significa esto?
                    </button>
                </div>
            </div>
        `;
    }

    function renderContent(tabIndex) {
        let content = '';
        if (tabIndex === 0) {
            content = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${data.hospitalarias.map(createCard).join('')}</div>`;
        } else if (tabIndex === 1) {
            content = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${data.ambulatorias.map(createCard).join('')}</div>`;
        } else if (tabIndex === 2) {
            content = data.redPreferente;
        } else if (tabIndex === 3) {
            content = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${data.restringidas.map(createCard).join('')}</div>`;
        } else if (tabIndex === 4) {
            content = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${data.otras.map(createCard).join('')}</div>`;
        } else if (tabIndex === 5) {
            content = data.costos;
        } else if (tabIndex === 6) {
            content = data.glosario;
        }
        tabContent.innerHTML = content;
    }

    function changeTab(tabIndex) {
        tabs.forEach((tab, index) => {
            if (index === tabIndex) {
                tab.classList.add('tab-active');
                tab.classList.remove('text-gray-400', 'hover:text-gray-200', 'hover:border-gray-500', 'border-transparent');
            } else {
                tab.classList.remove('tab-active');
                tab.classList.add('text-gray-400', 'hover:text-gray-200', 'hover:border-gray-500', 'border-transparent');
            }
        });
        tabSelect.selectedIndex = tabIndex;
        renderContent(tabIndex);
    }

    function openModal(id, title, description) {
        modalTitle.innerText = title;
        modalBody.innerHTML = `<p>${description}</p>`;
        modal.classList.add('open');
        setTimeout(() => modalContent.classList.remove('scale-95'), 10);
    }
    
    function closeModal() {
        modalContent.classList.add('scale-95');
        setTimeout(() => modal.classList.remove('open'), 300);
    }

    // Initialize
    function initializeTabs() {
        // Clear previous options
        while (tabSelect.firstChild) {
            tabSelect.removeChild(tabSelect.firstChild);
        }
        tabs.forEach((tab, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.innerText = tab.innerText;
            tabSelect.appendChild(option);
        });
    }
    
    tabSelect.addEventListener('change', (e) => {
        changeTab(parseInt(e.target.value));
    });

    // Initial render
    initializeTabs();
    renderContent(0);

    // Close modal on outside click
    modal.addEventListener('click', function(event) {
        if (event.target === modal) {
            closeModal();
        }
    });

</script>

</body>
</html>
