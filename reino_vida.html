            color: #22d3ee;
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #22d3ee;
            border-radius: 10px;
        }
        
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .pulse-viz {
            animation: pulse-slow 4s infinite ease-in-out;
        }

        img {
            background: #0f172a;
            min-height: 200px;
        }

        function initVitalityMatrix(color, growth) {
            const containerSelector = "#vitality-viz-container";
            const container = d3.select(containerSelector);
            
            if (container.empty() || !container.node()) return;

            d3.select(containerSelector + " svg").remove();
            
            const rect = container.node().getBoundingClientRect();
            const width = rect.width || 400;
            const height = 400;

            const svg = container.append("svg")
                .attr("width", "100%")
                .attr("height", height)
                .attr("class", "pulse-viz");

            const nodes = d3.range(20 + growth * 10).map(() => ({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 3 + 1
            }));

            const simulation = d3.forceSimulation(nodes)
                .force("charge", d3.forceManyBody().strength(15))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(25))
                .on("tick", ticked);

            const links = [];
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    if (Math.random() > 0.8) links.push({source: i, target: j});
                }
            }

            const linkElements = svg.append("g")
                .selectAll("line")
                .data(links)
                .enter().append("line")
                .attr("stroke", color)
                .attr("stroke-opacity", 0.1)
                .attr("stroke-width", 0.5);

            const nodeElements = svg.append("g")
                .selectAll("circle")
                .data(nodes)
                .enter().append("circle")
                .attr("r", d => d.r)
                .attr("fill", color)
                .attr("fill-opacity", 0.3);

            function ticked() {
                linkElements
                    .attr("x1", d => nodes[d.source].x)
                    .attr("y1", d => nodes[d.source].y)
                    .attr("x2", d => nodes[d.target].x)
                    .attr("y2", d => nodes[d.target].y);
                nodeElements
                    .attr("cx", d => d.x)
                    .attr("cy", d => d.y);
            }
        }

        function initRadarChart(plant) {
            const containerSelector = "#radar-chart-container";
            const container = d3.select(containerSelector);
            
            if (container.empty() || !container.node()) return;

            d3.select(containerSelector + " svg").remove();
            
            const rect = container.node().getBoundingClientRect();
            const width = rect.width || 300;
            const height = 300;
            const radius = Math.min(width / 2, height / 2) - 40;

            const svg = container.append("svg")
                .attr("width", width)
                .attr("height", height)
                .append("g")
                .attr("transform", `translate(${width / 2}, ${height / 2})`);

            const data = [
                { axis: "Agua", value: plant.careProfile.water / 5 },
                { axis: "Luz", value: plant.careProfile.light / 5 },
                { axis: "Humedad", value: plant.careProfile.humidity / 5 },
                { axis: "Dificultad", value: plant.careProfile.difficulty / 5 },
                { axis: "Crecimiento", value: plant.careProfile.growth / 5 }
            ];

            const allAxis = data.map(d => d.axis);
            const total = allAxis.length;
            const angleSlice = Math.PI * 2 / total;

            const rScale = d3.scaleLinear().range([0, radius]).domain([0, 1]);

            svg.selectAll(".axis")
                .data(allAxis)
                .enter()
                .append("line")
                .attr("class", "axis")
                .attr("x1", 0)
                .attr("y1", 0)
                .attr("x2", (d, i) => rScale(1.1) * Math.cos(angleSlice * i - Math.PI / 2))
                .attr("y2", (d, i) => rScale(1.1) * Math.sin(angleSlice * i - Math.PI / 2))
                .attr("stroke", "#22d3ee")
                .attr("stroke-width", "1px")
                .attr("opacity", 0.3);

            svg.selectAll(".axisLabel")
                .data(allAxis)
                .enter()
                .append("text")
                .attr("class", "axisLabel")
                .attr("x", (d, i) => rScale(1.25) * Math.cos(angleSlice * i - Math.PI / 2))
                .attr("y", (d, i) => rScale(1.25) * Math.sin(angleSlice * i - Math.PI / 2))
                .attr("dy", ".35em")
                .attr("font-size", "10px")
                .attr("fill", "#22d3ee")
                .attr("text-anchor", "middle")
                .text(d => d);

            const levels = 4;
            for (let level = 1; level <= levels; level++) {
                svg.append("polygon")
                    .attr("points", data.map((d, i) => {
                        const point = rScale(level / levels) * Math.cos(angleSlice * i - Math.PI / 2) + "," + rScale(level / levels) * Math.sin(angleSlice * i - Math.PI / 2);
                        return point;
                    }).join(" "))
                    .attr("stroke", "#22d3ee")
                    .attr("fill", "none")
                    .attr("opacity", 0.2);
            }

            const radarLine = d3.lineRadial()
                .curve(d3.curveLinearClosed)
                .radius(d => rScale(d.value))
                .angle((d, i) => i * angleSlice);

            svg.append("path")
                .datum(data)
                .attr("d", radarLine)
                .attr("fill", "#22d3ee")
                .attr("fill-opacity", 0.3)
                .attr("stroke", "#22d3ee")
                .attr("stroke-width", 2);
        }
