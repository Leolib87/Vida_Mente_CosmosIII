        body {

            background-size: 500px;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(34, 211, 238, 0.12);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: border 0.3s ease, transform 0.3s ease;
        }
        
        .glass-card:hover {
            border: 1px solid rgba(34, 211, 238, 0.25);
        }

        .nav-tab.active {
            color: #22d3ee;
            background: rgba(34, 211, 238, 0.15);
            border: 1px solid rgba(34, 211, 238, 0.4);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.1);
        }

        .text-fluor {
            color: #22d3ee;
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #22d3ee;
            border-radius: 10px;
        }
        
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .pulse-viz {
            animation: pulse-slow 4s infinite ease-in-out;
        }

        .text-justify {
            text-align: justify;
            text-justify: inter-word;
        }

        /* Contenedor responsivo para el radar */
        #radar-chart-container svg {
            display: block;
            margin: auto;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>

        function initVitalityMatrix(color, growth) {
            const containerSelector = "#vitality-viz-container";
            const container = d3.select(containerSelector);
            if (container.empty() || !container.node()) return;
            d3.select(containerSelector + " svg").remove();
            const rect = container.node().getBoundingClientRect();
            const width = rect.width || 400;
            const height = 400;
            const svg = container.append("svg").attr("width", "100%").attr("height", height).attr("class", "pulse-viz");
            const nodes = d3.range(20 + growth * 10).map(() => ({ x: Math.random() * width, y: Math.random() * height, r: Math.random() * 3 + 1 }));
            const simulation = d3.forceSimulation(nodes).force("charge", d3.forceManyBody().strength(15)).force("center", d3.forceCenter(width / 2, height / 2)).force("collision", d3.forceCollide().radius(25)).on("tick", ticked);
            const links = [];
            for (let i = 0; i < nodes.length; i++) { for (let j = i + 1; j < nodes.length; j++) { if (Math.random() > 0.8) links.push({source: i, target: j}); } }
            const linkElements = svg.append("g").selectAll("line").data(links).enter().append("line").attr("stroke", color).attr("stroke-opacity", 0.1).attr("stroke-width", 0.5);
            const nodeElements = svg.append("g").selectAll("circle").data(nodes).enter().append("circle").attr("r", d => d.r).attr("fill", color).attr("fill-opacity", 0.3);
            function ticked() { linkElements.attr("x1", d => nodes[d.source].x).attr("y1", d => nodes[d.source].y).attr("x2", d => nodes[d.target].x).attr("y2", d => nodes[d.target].y); nodeElements.attr("cx", d => d.x).attr("cy", d => d.y); }
        }

        function initRadarChart(plant) {
            const containerSelector = "#radar-chart-container";
            const container = d3.select(containerSelector);
            if (container.empty() || !container.node()) return;
            
            d3.select(containerSelector + " svg").remove();
            
            const width = container.node().offsetWidth;
            const height = container.node().offsetHeight || 300;
            
            // Radio de seguridad para evitar desbordamientos de etiquetas
            const radius = Math.min(width, height) / 2 - 50;

            const svg = container.append("svg")
                .attr("width", width)
                .attr("height", height)
                .append("g")
                .attr("transform", `translate(${width / 2}, ${height / 2})`);

            const data = [ 
                { axis: "Agua", value: plant.careProfile.water / 5 }, 
                { axis: "Luz", value: plant.careProfile.light / 5 }, 
                { axis: "Humedad", value: plant.careProfile.humidity / 5 }, 
                { axis: "Dificultad", value: plant.careProfile.difficulty / 5 }, 
                { axis: "Crecimiento", value: plant.careProfile.growth / 5 } 
            ];

            const allAxis = data.map(d => d.axis);
            const total = allAxis.length;
            const angleSlice = Math.PI * 2 / total;
            const rScale = d3.scaleLinear().range([0, radius]).domain([0, 1]);

            // Dibujar ejes
            svg.selectAll(".axis").data(allAxis).enter().append("line")
                .attr("class", "axis")
                .attr("x1", 0).attr("y1", 0)
                .attr("x2", (d, i) => rScale(1.05) * Math.cos(angleSlice * i - Math.PI / 2))
                .attr("y2", (d, i) => rScale(1.05) * Math.sin(angleSlice * i - Math.PI / 2))
                .attr("stroke", "#22d3ee").attr("stroke-width", "1px").attr("opacity", 0.3);

            // Etiquetas
            svg.selectAll(".axisLabel").data(allAxis).enter().append("text")
                .attr("class", "axisLabel")
                .attr("x", (d, i) => rScale(1.3) * Math.cos(angleSlice * i - Math.PI / 2))
                .attr("y", (d, i) => rScale(1.3) * Math.sin(angleSlice * i - Math.PI / 2))
                .attr("dy", "0.4em")
                .attr("font-size", "10px")
                .attr("font-weight", "800")
                .attr("fill", "#22d3ee")
                .attr("text-anchor", "middle")
                .text(d => d);

            // Niveles de red
            const levels = 4;
            for (let level = 1; level <= levels; level++) { 
                svg.append("polygon").attr("points", data.map((d, i) => { 
                    const point = rScale(level / levels) * Math.cos(angleSlice * i - Math.PI / 2) + "," + rScale(level / levels) * Math.sin(angleSlice * i - Math.PI / 2); 
                    return point; 
                }).join(" ")).attr("stroke", "#22d3ee").attr("fill", "none").attr("opacity", 0.15); 
            }

            // Forma del radar
            const radarLine = d3.lineRadial().curve(d3.curveLinearClosed).radius(d => rScale(d.value)).angle((d, i) => i * angleSlice);
            svg.append("path").datum(data).attr("d", radarLine)
                .attr("fill", "#22d3ee").attr("fill-opacity", 0.3)
                .attr("stroke", "#22d3ee").attr("stroke-width", 2);
        }

        function renderNavigation() {
            const container = document.getElementById('navigationGroups');
            if (!container) return;
            const categories = ['Principiantes', 'Intermedio', 'Avanzado'];
            const currentHash = window.location.hash.replace('#', '') || plants[0].id;
            container.innerHTML = categories.map(cat => {
                const catPlants = plants.filter(p => p.category === cat);
                if (catPlants.length === 0) return '';
                return `<div class="glass-card p-8 rounded-[3rem] flex flex-col gap-4 shadow-2xl transition-all hover:border-cyan-500/30"><div class="flex items-center gap-3 mb-4 border-b border-cyan-500/10 pb-4"><div class="w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_10px_#22d3ee]"></div><h3 class="text-[12px] font-black uppercase tracking-[0.5em] text-cyan-400">${cat}</h3></div><div class="flex flex-wrap md:flex-col gap-2">${catPlants.map(p => `<a href="#${p.id}" class="nav-tab px-5 py-4 rounded-2xl text-[11px] font-bold tracking-tight transition-all duration-300 hover:bg-cyan-500/10 ${currentHash === p.id ? 'active' : 'text-slate-400'}">${p.common}</a>`).join('')}</div></div>`;
            }).join('');
        }

        function handleRoute() {
            const id = window.location.hash.replace('#', '') || plants[0].id;
            const plant = plants.find(p => p.id === id) || plants[0];
            const display = document.getElementById('plantDisplay');
            if (!display) return;
            display.classList.remove('opacity-100');
            display.classList.add('opacity-0');
            setTimeout(() => {
                renderContent(plant);
                renderNavigation();
                display.classList.remove('opacity-0');
                display.classList.add('opacity-100');
                requestAnimationFrame(() => { 
                    setTimeout(() => { 
                        initVitalityMatrix('#22d3ee', plant.careProfile.growth); 
                        initRadarChart(plant); 
                    }, 150); 
                });
            }, 300);
        }

                            <div class="absolute -inset-1 bg-cyan-400/20 rounded-[4rem] blur-xl opacity-40 group-hover:opacity-80 transition duration-1000"></div>
                            <div class="relative glass-card rounded-[4.5rem] overflow-hidden border-white/5">
                                <div class="aspect-square bg-slate-950/60 flex flex-col items-center justify-center border-b border-cyan-500/10 relative overflow-hidden">
                                    <div id="vitality-viz-container" class="absolute inset-0 z-0"></div>
                                    <img src="${plant.image}" alt="${plant.common}" class="w-full h-full object-cover relative z-10 transition-transform duration-700 hover:scale-105" onerror="this.src='https://via.placeholder.com/600/020617/22d3ee?text=BIOME_DATA_MISSING'">
                                    <p class="text-[9px] font-black tracking-[0.5em] uppercase opacity-20 text-cyan-400 absolute bottom-4 left-1/2 -translate-x-1/2 z-20">BIOME_REF: ${plant.id}</p>
                                </div>
                                <div class="p-10 lg:p-12 bg-gradient-to-t from-slate-950/95 to-transparent">
                                    <div class="flex items-center gap-4 mb-5">
                                        <div class="w-3 h-3 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_20px_#22d3ee]"></div>
                                        <span class="text-[12px] font-black uppercase tracking-[0.4em] text-cyan-400 italic">Archivo de Vida</span>
                                    </div>
                                    <p class="text-3xl md:text-5xl font-black text-white italic tracking-tighter leading-none mb-2">${plant.scientific}</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            <div class="glass-card p-10 rounded-[3rem] border-cyan-500/10 group">
                                <p class="text-[11px] font-black text-cyan-600 uppercase mb-5 tracking-[0.4em]">Protocolo Hídrico</p>
                                <div class="flex items-center gap-6">
                                    <span class="text-4xl lg:text-5xl drop-shadow-2xl group-hover:scale-110 transition-transform">💧</span>
                                    <p class="font-bold text-slate-100 leading-tight text-sm lg:text-base">${plant.water}</p>
                                </div>
                            </div>
                            <div class="glass-card p-10 rounded-[3rem] border-amber-500/10 group">
                                <p class="text-[11px] font-black text-amber-500 uppercase mb-5 tracking-[0.4em]">Espectro Solar</p>
                                <div class="flex items-center gap-6">
                                    <span class="text-4xl lg:text-5xl drop-shadow-2xl group-hover:scale-110 transition-transform">☀️</span>
                                    <p class="font-bold text-slate-100 leading-tight text-sm lg:text-base">${plant.light}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Ajuste optimizado del recuadro de Perfil de Cuidado -->
                        <div class="glass-card p-10 rounded-[3rem] border-cyan-500/10 h-auto">
                            <p class="text-[11px] font-black text-cyan-600 uppercase mb-8 tracking-[0.4em]">Perfil de Cuidado</p>
                            <div id="radar-chart-container" class="w-full h-64 lg:h-80 flex items-center justify-center overflow-visible"></div>
                        </div>
                    </div>

                    <!-- Columna Derecha: Información Detallada con Grid Organizado en PC -->
                    <div class="lg:col-span-7 flex flex-col gap-10 order-1 lg:order-2">
                        <div class="space-y-6">
                            <nav class="flex text-[12px] font-black uppercase tracking-[0.6em] text-cyan-500/40 gap-5 items-center">
                                <span>DATOS_SISTEMA</span>
                                <div class="w-2.5 h-2.5 rounded-full bg-cyan-950 shadow-[0_0_8px_#22d3ee]"></div>
                                <span class="text-cyan-400 uppercase">${plant.category}</span>
                            </nav>
                            <div>
                                <h3 class="text-[10px] font-black uppercase tracking-[0.6em] text-cyan-500/60 mb-2">Nombre Común</h3>
                                <h2 class="text-5xl md:text-7xl lg:text-8xl font-black text-white leading-[0.8] tracking-tighter mb-4">${plant.common}</h2>
                                <h3 class="text-[10px] font-black uppercase tracking-[0.6em] text-cyan-500/60 mb-2">Nombre Científico</h3>
                                <p class="text-2xl md:text-4xl text-cyan-400 italic font-light tracking-tight">${plant.scientific}</p>
                            </div>
                            <div class="flex flex-wrap gap-3 lg:gap-5 pt-6">
                                <div class="px-6 py-3 rounded-2xl bg-cyan-500/10 border border-cyan-500/30 text-[11px] lg:text-[12px] font-black text-cyan-300 uppercase tracking-widest">Adaptación: ${plant.diff}</div>
                                <div class="px-6 py-3 rounded-2xl bg-slate-900/80 border border-white/5 text-[11px] lg:text-[12px] font-black text-slate-400 uppercase tracking-widest">Humedad: ${plant.humidity}</div>
                                <div class="px-6 py-3 rounded-2xl bg-slate-900/80 border border-white/5 text-[11px] lg:text-[12px] font-black text-slate-400 uppercase tracking-widest">Crecimiento: ${plant.growthRate}</div>
                                <div class="px-6 py-3 rounded-2xl bg-slate-900/80 border border-white/5 text-[11px] lg:text-[12px] font-black text-slate-400 uppercase tracking-widest">Tamaño: ${plant.size}</div>
                            </div>
                        </div>

                        <!-- Grid de Bloques Informativos Mejorado -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8 items-stretch">
                            <!-- Taxonomía -->
                            <div class="md:col-span-2">
                                <div class="glass-card p-10 lg:p-12 rounded-[4rem] border-white/5 shadow-inner">
                                    <h3 class="text-[12px] font-black uppercase tracking-[0.6em] text-cyan-500 mb-10 flex items-center gap-4">
                                        <span class="w-10 h-[1px] bg-cyan-500"></span> Taxonomía Sistemática
                                    </h3>
                                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 lg:gap-8">
                                        <div class="space-y-2"><p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Reino</p><p class="text-sm lg:text-base font-bold text-white tracking-wide border-b border-cyan-500/20 pb-2">${plant.taxonomy.kingdom}</p></div>
                                        <div class="space-y-2"><p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Orden</p><p class="text-sm lg:text-base font-bold text-white tracking-wide border-b border-cyan-500/20 pb-2">${plant.taxonomy.order}</p></div>
                                        <div class="space-y-2"><p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Familia</p><p class="text-sm lg:text-base font-bold text-white tracking-wide border-b border-cyan-500/20 pb-2">${plant.taxonomy.family}</p></div>
                                        <div class="space-y-2"><p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Género</p><p class="text-sm lg:text-base font-bold text-cyan-200 tracking-wide border-b border-cyan-500/20 pb-2 italic font-light">${plant.taxonomy.genus}</p></div>
                                    </div>
                                </div>
                            </div>

                            <!-- Biología -->
                            <div class="md:col-span-2">
                                <div class="glass-card p-10 lg:p-12 rounded-[4rem] border-white/10 shadow-2xl">
                                    <h3 class="text-[12px] font-black uppercase tracking-[0.6em] text-cyan-500 mb-8 flex items-center gap-4">
                                        <span class="w-8 h-[1px] bg-cyan-500"></span> Biología Molecular y Adaptación
                                    </h3>
                                    <p class="text-base lg:text-lg text-slate-200 leading-relaxed font-light text-justify first-letter:text-5xl first-letter:font-black first-letter:text-cyan-400 first-letter:mr-2">
                                        ${plant.biology}
                                    </p>
                                </div>
                            </div>

                            <!-- Origen -->
                            <div class="flex flex-col">
                                <div class="glass-card p-8 lg:p-10 rounded-[3rem] border-white/5 flex flex-col gap-6">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 bg-slate-950 rounded-full flex items-center justify-center text-3xl grayscale opacity-40 border border-white/5">🌍</div>
                                        <h3 class="text-[11px] font-black uppercase tracking-[0.5em] text-cyan-500">Núcleo de Origen</h3>
                                    </div>
                                    <p class="text-sm lg:text-base text-slate-400 leading-relaxed italic font-light text-justify">${plant.origin}</p>
                                </div>
                            </div>

                            <!-- Propagación -->
                            <div class="flex flex-col">
                                <div class="glass-card p-8 lg:p-10 rounded-[3rem] border-white/10 shadow-2xl">
                                    <h3 class="text-[11px] font-black uppercase tracking-[0.6em] text-cyan-500 mb-6 flex items-center gap-4">
                                        <span class="w-6 h-[1px] bg-cyan-500"></span> Propagación
                                    </h3>
                                    <p class="text-sm lg:text-base text-slate-200 leading-relaxed font-light text-justify">${plant.propagation}</p>
                                </div>
                            </div>

                            <!-- Problemas -->
                            <div class="flex flex-col">
                                <div class="glass-card p-8 lg:p-10 rounded-[3rem] border-white/10 shadow-2xl">
                                    <h3 class="text-[11px] font-black uppercase tracking-[0.6em] text-cyan-500 mb-6 flex items-center gap-4">
                                        <span class="w-6 h-[1px] bg-cyan-500"></span> Problemas
                                    </h3>
                                    <ul class="list-disc list-inside text-sm lg:text-base text-slate-200 leading-relaxed font-light space-y-2 text-justify">
                                        ${plant.commonIssues.map(issue => `<li class="text-justify">${issue}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>

                            <!-- Cuidados -->
                            <div class="flex flex-col">
                                <div class="glass-card p-8 lg:p-10 rounded-[3rem] border-white/10 shadow-2xl">
                                    <h3 class="text-[11px] font-black uppercase tracking-[0.6em] text-cyan-500 mb-6 flex items-center gap-4">
                                        <span class="w-6 h-[1px] bg-cyan-500"></span> Cuidados
                                    </h3>
                                    <ul class="list-disc list-inside text-sm lg:text-base text-slate-200 leading-relaxed font-light space-y-2 text-justify">
                                        ${plant.careTips.map(tip => `<li class="text-justify">${tip}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>

                            <!-- Datos Extras -->
                            <div class="flex flex-col">
                                <div class="glass-card p-8 lg:p-10 rounded-[3rem] border-white/10 shadow-2xl">
                                    <h3 class="text-[11px] font-black uppercase tracking-[0.6em] text-cyan-500 mb-6 flex items-center gap-4">
                                        <span class="w-6 h-[1px] bg-cyan-500"></span> Datos Extras
                                    </h3>
                                    <p class="text-sm lg:text-base text-slate-200 leading-relaxed font-light text-justify">${plant.interestingFacts}</p>
                                </div>
                            </div>

                            <!-- Referencia -->
                            <div class="flex flex-col">
                                <div class="glass-card p-8 lg:p-10 rounded-[3rem] border-cyan-500/20 shadow-2xl">
                                    <h3 class="text-[11px] font-black uppercase tracking-[0.6em] text-cyan-500 mb-6 flex items-center gap-4">
                                        <span class="w-6 h-[1px] bg-cyan-500"></span> Referencia
                                    </h3>
                                    <div class="bg-slate-950/80 p-4 rounded-2xl border border-cyan-500/10">
                                        <a href="${plant.infoUrl}" target="_blank" class="text-cyan-400 font-mono text-[10px] break-all hover:text-cyan-300 transition-colors underline decoration-cyan-500/30">${plant.infoUrl}</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-48 py-24 border-t border-white/5 text-center">
                    <p class="text-slate-800 text-[11px] font-black uppercase tracking-[1.2em] opacity-40 italic">Reino de la Vida • Registro Botánico Eterno</p>
                </div>
            `;
        }

        window.addEventListener('resize', () => {
            if (resizeTimer) { clearTimeout(resizeTimer); }
            resizeTimer = setTimeout(() => {
                const id = window.location.hash.replace('#', '') || plants[0].id;
                const plant = plants.find(p => p.id === id) || plants[0];
                if (document.getElementById('vitality-viz-container')) { initVitalityMatrix('#22d3ee', plant.careProfile.growth); }
                if (document.getElementById('radar-chart-container')) { initRadarChart(plant); }
            }, 250);
        });

        window.addEventListener('hashchange', handleRoute);
        window.onload = handleRoute;
    </script>
</body>
</html>
