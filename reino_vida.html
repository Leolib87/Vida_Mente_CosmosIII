<!DOCTYPE html>

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            background-image: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)), url('https://media.istockphoto.com/id/1459380343/vector/tropical-pattern-with-green-monstera-leaves-and-hibiscus-flowers-summer-vector-background-or.jpg?s=612x612&w=0&k=20&c=NvChBSmpom6Vtybp1aX8mfB4MtbVlH1vO8MgQTlco60=');
            background-repeat: repeat;
            background-size: 500px;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        /* Contenedores más oscuros para contraste máximo */
        .glass-card {
            background: rgba(10, 15, 30, 0.85); /* Oscurecido sustancialmente */
            backdrop-filter: blur(20px);
            border: 1px solid rgba(34, 211, 238, 0.12);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .nav-tab.active {
            color: #22d3ee;
            background: rgba(34, 211, 238, 0.15);
            border: 1px solid rgba(34, 211, 238, 0.4);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.1);
        }

        .text-fluor {
            color: #22d3ee;
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
        }

        #d3-vital-matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #22d3ee;
            border-radius: 10px;
        }
        
        /* Animación sutil de respiración para la matriz */
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .pulse-viz {

    </style>
</head>

        // D3 Vitality Matrix Visualization
        function initVitalityMatrix(color) {
            d3.select("#vitality-viz-container svg").remove();
            
            const container = d3.select("#vitality-viz-container");
            const width = container.node().getBoundingClientRect().width;
            const height = 400;

            const svg = container.append("svg")
                .attr("width", "100%")
                .attr("height", height)
                .attr("class", "pulse-viz");

            const nodes = d3.range(25).map(() => ({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 3 + 1
            }));

            const simulation = d3.forceSimulation(nodes)
                .force("charge", d3.forceManyBody().strength(15))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(30))
                .on("tick", ticked);

            const links = [];
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    if (Math.random() > 0.85) links.push({source: i, target: j});
                }
            }

            const linkElements = svg.append("g")
                .selectAll("line")
                .data(links)
                .enter().append("line")
                .attr("stroke", color)
                .attr("stroke-opacity", 0.15)
                .attr("stroke-width", 0.5);

            const nodeElements = svg.append("g")
                .selectAll("circle")
                .data(nodes)
                .enter().append("circle")
                .attr("r", d => d.r)
                .attr("fill", color)
                .attr("fill-opacity", 0.4);

            function ticked() {
                linkElements
                    .attr("x1", d => nodes[d.source].x)
                    .attr("y1", d => nodes[d.source].y)
                    .attr("x2", d => nodes[d.target].x)
                    .attr("y2", d => nodes[d.target].y);

                nodeElements
                    .attr("cx", d => d.x)
                    .attr("cy", d => d.y);
            }
        }

                return `

                            </h3>

                        <div class="flex flex-wrap md:flex-col gap-2">

            }).join('');
        }

        function handleRoute() {
            const id = window.location.hash.replace('#', '') || plants[0].id;

            const display = document.getElementById('plantDisplay');

            display.classList.add('opacity-0');

                renderContent(plant);
                renderNavigation();
                display.classList.remove('opacity-0');
                display.classList.add('opacity-100');
                initVitalityMatrix('#22d3ee');
            }, 300);
        }
