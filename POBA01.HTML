        const FOOTNOTES = {

        const TABLE_OF_CONTENTS = [

        // --- COMPONENTS ---

        const HighlightedText = ({ text, onFootnoteHover, onFootnoteLeave }) => {
            if (!text || typeof text !== 'string') return text || null;
            const parts = text.split(/(\[\d+\]|[\s\n]+)/g);

            return (
                <span>
                    {parts.map((part, i) => {
                        const footnoteMatch = part.match(/^\[(\d+)\]$/);
                        if (footnoteMatch) {
                            const id = footnoteMatch[1];
                            return (
                                <span 
                                    key={i}
                                    className="footnote-ref px-1 bg-cyan-950/20 rounded border border-cyan-900/50 hover:text-cyan-200 transition-colors"
                                    onMouseEnter={() => onFootnoteHover(id)}
                                    onMouseLeave={onFootnoteLeave}
                                >
                                    [{id}]
                                </span>
                            );
                        }

                        const cleanWord = part.replace(/[.,;:"()]/g, '');
                        const lowerPart = part.toLowerCase();
                        let styleClass = "";
                        
                        if (AUTHORS.some(a => lowerPart.includes(a.split(' ').pop().toLowerCase()) && cleanWord.length > 3)) {
                            styleClass = "text-cyan-400 font-medium";
                        }
                        if (CONCEPTS.some(c => lowerPart.includes(c.toLowerCase()) && cleanWord.length > 3)) {
                            styleClass = "text-amber-500 italic";
                        }

                        return <span key={i} className={styleClass}>{part}</span>;
                    })}
                </span>
            );
        };

                        {/* PARTE I INTRODUCCIÓN */}

                                <span className="text-amber-500 text-xs font-black tracking-[0.8em] uppercase mb-12 block opacity-40">Parte I</span>
                                <h2 className="text-6xl md:text-8xl lg:text-[10rem] font-serif text-slate-100 mb-12 uppercase leading-none tracking-tighter">
                                    Autonomía de lo Vivo
                                </h2>
                                <h3 className="text-slate-500 text-4xl md:text-6xl lg:text-7xl font-serif italic font-light tracking-tight">y Clausura Organizacional</h3>
                            </div>

                            <QuoteBlock author="L. Henderson, La Idoneidad del Entorno (1926)">
                                Mientras las ideas sobre la naturaleza de los seres vivos permanezcan vagas e imprecisas, es claramente imposible, por regla general, distinguir entre una adaptación del organismo al entorno y un caso de idoneidad del entorno para la vida, en el sentido más general. Evidentemente, para responder a tales preguntas debemos poseer ideas y definiciones claras y precisas de los seres vivos. La vida debe, mediante un proceso arbitrario de lógica, transformarse de la cosa variable que es en una variable independiente o un invariante, despojada de muchas de sus cualidades más interesantes, por cierto, pero que ya no invite a la falacia por nuestra incapacidad de percibir claramente las cuestiones implicadas.
                            </QuoteBlock>

                            <QuoteBlock author="J. P. Sartre, Crítica de la Razón Dialéctica (1960)">
                                Se dirá tal vez que la hipótesis metafísica de una dialéctica de la Naturaleza es más interesante cuando se utiliza para comprender el paso de la materia inorgánica a los cuerpos organizados y la evolución de la vida en el globo. Es verdad. Solo que haré observar que esta interpretación formal de la vida y de la evolución no seguirá siendo más que un sueño piadoso mientras los científicos no tengan los medios para utilizar como hipótesis rectora la noción de totalidad y la de totalización. De nada sirve decretar que la evolución de las especies o que la aparición de la vida son momentos de la "dialéctica de la Naturaleza" mientras ignoremos cómo apareció la vida y cómo se transforman las especies. Por el momento, la biología, en el dominio concreto de sus investigaciones, permanece positivista y analítica. Puede ser que un conocimiento más profundo de su objeto le imponga, por sus contradicciones, la obligación de considerar al organismo en su totalidad, es decir, dialécticamente, y de considerar todos los hechos biológicos en su relación de interioridad. Ello es posible, pero no es seguro.
                            </QuoteBlock>
                        </section>

                        {/* CAPÍTULO 1 */}
                        <section id="chapter1" className="mb-80 scroll-mt-40">
                            <div className="mb-32 text-center">
                                <span className="text-cyan-400 text-xs font-black tracking-[0.6em] uppercase mb-8 block">Capítulo 1</span>
                                <h2 className="text-5xl md:text-7xl lg:text-9xl font-serif text-slate-100 tracking-tighter leading-none">Autonomía y Pensamiento Biológico</h2>
                            </div>

                            <SectionHeader>1.1 Evolución y el Individuo</SectionHeader>
                            
                            <SubSectionHeader>1.1.1</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                La descripción, invención y manipulación de unidades generadas mediante distinciones constituye la base de toda investigación científica y racional.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Esto no es menos cierto para las unidades vivas. Lo que les es peculiar, sin embargo, es que en nuestra experiencia común, las unidades vivas afirman su individualidad; es decir, los seres vivos aparecen como unidades autónomas de una diversidad asombrosa dotadas de la capacidad de reproducirse. En estos encuentros, la autonomía aparece de forma tan obvia como una característica esencial de los sistemas vivos que, cada vez que se observa algo que parece poseerla, el enfoque ingenuo es considerarlo vivo. Sin embargo, la autonomía, aunque se revela continuamente en la capacidad de autoafirmación de los sistemas vivos para mantener su identidad mediante la compensación activa de las deformaciones, parece ser hasta ahora la más elusiva de sus propiedades.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                La autonomía y la diversidad, el mantenimiento de la identidad y el origen de la variación en el modo en que se mantiene esta identidad, son los desafíos básicos presentados por la fenomenología de los sistemas vivos a los que los hombres han dirigido su curiosidad sobre la vida durante siglos.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                En la búsqueda de una comprensión de la autonomía, el pensamiento clásico, dominado por Aristóteles, creó el vitalismo al dotar a los sistemas vivos de un componente impulsor intencional no material que alcanzaba su expresión a través de la realización de sus formas. Después de Aristóteles, y como variaciones de sus nociones fundamentales, la historia de la biología registra muchas teorías que intentan de una u otra forma abarcar toda la fenomenología de los sistemas vivos bajo alguna fuerza organizadora peculiar (Hall, 1968). Sin embargo, cuanto más buscaban los biólogos la formulación explícita de una u otra de estas fuerzas organizadoras especiales, más se decepcionaban al encontrar solo lo que podían encontrar en cualquier otra parte del mundo físico: moléculas, potenciales e interacciones materiales ciegas gobernadas por leyes físicas sin propósito. Por ello, bajo la presión de la experiencia inevitable y el empuje definido del pensamiento cartesiano, surgió una perspectiva diferente, y el mecanicismo ganó gradualmente precedencia en el mundo biológico al insistir en que los únicos factores que operaban en la organización de los sistemas vivos eran factores físicos, y que no era necesaria ninguna fuerza organizadora vital no material. De hecho, parece ahora evidente que cualquier fenómeno biológico, una vez definido adecuadamente, puede describirse como surgido de la interacción de procesos físico-químicos cuyas relaciones están especificadas por el contexto de su definición.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                La diversidad ha dejado de ser una fuente de desconcierto en la comprensión de la fenomenología de los sistemas vivos gracias al pensamiento darwiniano y la genética de partículas, que han logrado proporcionar una explicación para ella sin recurrir a ninguna fuerza directora peculiar. Sin embargo, la influencia de estas nociones, a través de su explicación del cambio evolutivo, ha ido más allá de la mera explicación de la diversidad: ha desplazado completamente el énfasis en la evaluación de la fenomenología biológica del individuo a la especie, de la unidad al origen de sus partes, de la organización presente de los sistemas vivos a su determinación ancestral.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Hoy en día, las dos corrientes de pensamiento representadas por las explicaciones físico-química y evolutiva están entrelazadas. El análisis molecular parece permitir la comprensión de la reproducción y la variación; el análisis evolutivo parece dar cuenta de cómo estos procesos podrían haber surgido. Aparentemente, nos encontramos en un punto de la historia de la biología donde las dificultades básicas han sido eliminadas.
                            </Paragraph>

                            <SubSectionHeader>1.1.2</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Los biólogos, sin embargo, se sienten incómodos cuando observan la fenomenología de los sistemas vivos como un todo. Muchos manifiestan esta incomodidad negándose a decir qué es un sistema vivo. Otros intentan abarcar las ideas actuales bajo teorías integrales gobernadas por nociones organizadoras, como los principios de la teoría de la información (ej., Miller, 1966), que requieren de los biólogos la misma comprensión que pretenden proporcionar.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                La pregunta siempre presente es: ¿Qué es lo común a todos los sistemas vivos que nos permite calificarlos como vivos? Si no es una fuerza vital, si no es un principio organizador de algún tipo, entonces ¿qué?
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                En otras palabras, a pesar de su diversidad, todos los sistemas vivos comparten una organización común que reconocemos implícitamente al llamarlos "vivos". No existe una comprensión o formulación clara de tal organización. De hecho, la pregunta misma resulta extraña para la mayoría de los biólogos —con algunas excepciones notables— porque los grandes avances de la biología molecular han llevado a un énfasis excesivo en los componentes aislados y a un desprecio por las cuestiones relativas a lo que hace que el sistema vivo sea una unidad total y autónoma que está viva independientemente de si se reproduce o no. Como resultado, se han confundido procesos que dependen de la historia (evolución, ontogénesis) con procesos independientes de la historia (organizaciones individuales). Pero estos dos tipos de procesos deben mantenerse separados y explicarse en términos relacionados, pero distintos. Un ejemplo reciente muy bueno es la idea de Monod sobre el aparato teleonómico como caracterización de la organización viva (Monod, 1970). Monod señala que la capacidad y tendencia del material genético a reproducirse y preservarse generación tras generación mediante la codificación de especies moleculares en el ADN es señalada por Monod como la clave de la vida. Esto, sin embargo, empuja todas las propiedades pertenecientes a la unidad individual como un todo cooperativo coherente (la célula funcional, por ejemplo) hacia una sola especie molecular, el ADN, que ahora contiene alguna descripción abstracta del proyecto teleogénico de la célula. Irónicamente, al llevar este tipo de mecanicismo a tal extremo, Monod se encuentra filosóficamente cerca de los vitalistas, quienes insistían en una reducción similar de las características de la "vida" a algún componente distinto de las relaciones cooperativas de la unidad celular (Maturana, 1977; Berthelemy, 1971). De hecho, las consideraciones teleonómicas y evolutivas dejan intacta la cuestión de la naturaleza de la organización de la unidad viva.
                            </Paragraph>

                            <SubSectionHeader>1.1.3</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Nuestro esfuerzo consiste en comprender la naturaleza de la organización viva. Sin embargo, en este enfoque partimos del carácter unitario de un sistema vivo. Sostengo que el pensamiento evolutivo, a través de su énfasis en la diversidad, la reproducción y la especie para explicar la dinámica del cambio, ha oscurecido la necesidad de observar la naturaleza autónoma de las unidades vivas para la comprensión de la fenomenología biológica. También creo que el mantenimiento de la identidad y la invarianza de las relaciones definitorias en las unidades vivas están en la base de toda posible transformación ontogénica y evolutiva en los sistemas biológicos, y esto es lo que pretendo explorar. Por lo tanto, nuestro propósito en esta primera parte del libro es comprender la organización de los sistemas vivos en relación con su carácter unitario.
                            </Paragraph>

                            <SectionHeader>1.2 Moléculas y Vida</SectionHeader>

                            <SubSectionHeader>1.2.1</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Nuestro enfoque será mecanicista: no se aducirán fuerzas ni principios que no se encuentren en el universo físico. Sin embargo, nuestro problema es la organización viva y, por lo tanto, nuestro interés no se centrará en las propiedades de los componentes, sino en los procesos y las relaciones entre los procesos realizados a través de los componentes.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Esto debe entenderse claramente. Una explicación es siempre una reformulación de un fenómeno de tal manera que sus elementos aparezcan operativamente conectados en su generación. Además, una explicación es siempre dada por nosotros como observadores, y es fundamental distinguir en ella lo que pertenece al sistema como constitutivo de su fenomenología de lo que pertenece a las necesidades de nuestro dominio de descripción y, por tanto, a nuestras interacciones con él, sus componentes y el contexto en el que se observa. Dado que nuestro dominio descriptivo surge porque contemplamos simultáneamente la unidad y sus interacciones en el dominio de la observación, las nociones que surgen de necesidades cognitivas y expositivas en el dominio de la descripción no pertenecen a las nociones explicativas de una organización constitutiva de la unidad (fenómeno). Volveremos a este importante asunto muy a menudo en este libro.
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Además, una explicación puede adoptar diferentes formas según la naturaleza del fenómeno explicado. Así, para explicar el movimiento de un cuerpo que cae se recurre a las propiedades de la materia y a las leyes que describen la conducta de los cuerpos materiales según estas propiedades (leyes cinéticas y gravitatorias), mientras que para explicar la organización de una planta de control se recurre a las relaciones y leyes que describen la conducta de las relaciones. En el primer caso, los materiales del paradigma causal son los cuerpos y sus propiedades; en el segundo caso, son las relaciones y sus relaciones, independientemente de la naturaleza de los cuerpos que las satisfacen. En este último caso, en nuestras explicaciones de la organización de los sistemas vivos, trataremos con las relaciones que los componentes físicos reales deben satisfacer para constituir tal sistema, no con la identificación de estos componentes. Partimos del supuesto de que existe una organización común a todos los sistemas vivos, sea cual sea la naturaleza de sus componentes. Dado que nuestro tema es esta organización, no las formas particulares en que puede realizarse, no haremos distinciones entre clases o tipos de sistemas vivos.
                            </Paragraph>

                            <SubSectionHeader>1.2.2</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Al adoptar esta filosofía, simplemente estamos adoptando la filosofía básica que anima la cibernética y la teoría de sistemas, con las salvedades a estos nombres que se discutieron en el Prefacio. Esto es, creo, ni más ni menos que la esencia de un mecanicismo moderno. Al decir que los sistemas vivos son "máquinas", estamos señalando varias nociones que deberían hacerse explícitas. En primer lugar, implicamos una visión no animista, que debería ser innecesario discutir más a fondo. Segundo, estamos enfatizando que un sistema vivo se define por su organización y, por tanto, que puede explicarse como se explica cualquier organización; es decir, en términos de relaciones, no de propiedades de los componentes. Finalmente, señalamos desde el principio el dinamismo aparente en los sistemas vivos y que la palabra "máquina" o "sistema" conlleva [4].
                            </Paragraph>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Nos planteamos, entonces, una pregunta fundamental: ¿Cuál es la organización de los sistemas vivos, qué tipo de máquinas son y cómo está determinada su fenomenología, incluyendo la reproducción y la evolución, por su organización unitaria?
                            </Paragraph>

                            <SubSectionHeader>Fuentes</SubSectionHeader>
                            <div className="pl-6 border-l border-slate-700 text-sm md:text-base lg:text-xl text-slate-500 italic w-full">
                                <p className="mb-4">Maturana, H., y F. Varela (1975), Autopoietic Systems: A Characterization of the Living Organization, Biological Computer Lab. Rep. 9.4. Univ. of Illinois, Urbana. Reimpreso en Maturana y Varela (1979).</p>
                                <p>Varela, F., H. Maturana, y R. Uribe (1974), Autopoiesis: The Organization of Living Systems, Its Characterization and a Model, Biosystems 5:187.</p>
                            </div>
                        </section>
                    </main>

                    {/* Footer Minimalista */}
                    <footer className="w-full text-center py-24 border-t border-slate-900 text-slate-700 text-xs">
                        <p className="mb-2 uppercase tracking-[0.6em] font-serif">Principios de Autonomía Biológica</p>
                        <p>© Francisco J. Varela</p>
                    </footer>

                    {/* Ventana flotante de notas (Bottom Center Tooltip) */}

                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 w-[95%] max-w-7xl bg-black/95 border border-cyan-900/40 text-slate-300 p-8 md:p-16 rounded-[4rem] shadow-2xl backdrop-blur-3xl z-50 animate-fade-in ring-1 ring-cyan-500/30">
                            <div className="flex items-start gap-10 lg:gap-20">
                                <span className="text-cyan-400 font-serif text-4xl lg:text-8xl font-bold leading-none select-none">[{activeFootnote}]</span>
                                <p className="text-base md:text-lg lg:text-2xl leading-relaxed text-justify font-light tracking-wide">{FOOTNOTES[activeFootnote]}</p>
                            </div>
                        </div>
                    )}

            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
