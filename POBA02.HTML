                        {/* PARTE I INTRODUCCIÓN */}

                                    Autonomía de lo Vivo
                                </h2>
                                <h3 className="text-slate-500 text-4xl md:text-6xl lg:text-7xl font-serif italic font-light tracking-tight">y Clausura Organizacional</h3>
                            </div>

                            <QuoteBlock author="L. Henderson, La Idoneidad del Entorno (1926)">
                                Mientras las ideas sobre la naturaleza de los seres vivos permanezcan vagas e imprecisas, es claramente imposible, por regla general, distinguir entre una adaptación del organismo al entorno y un caso de idoneidad del entorno para la vida, en el sentido más general. Evidentemente, para responder a tales preguntas debemos poseer ideas y definiciones claras y precisas de los seres vivos. La vida debe, mediante un proceso arbitrario de lógica, transformarse de la cosa variable que es en una variable independiente o un invariante, despojada de muchas de sus cualidades más interesantes, por cierto, pero que ya no invite a la falacia por nuestra incapacidad de percibir claramente las cuestiones implicadas.
                            </QuoteBlock>

                            <QuoteBlock author="J. P. Sartre, Crítica de la Razón Dialéctica (1960)">
                                Se dirá tal vez que la hipótesis metafísica de una dialéctica de la Naturaleza es más interesante cuando se utiliza para comprender el paso de la materia inorgánica a los cuerpos organizados y la evolución de la vida en el globo. Es verdad. Solo que haré observar que esta interpretación formal de la vida y de la evolución no seguirá siendo más que un sueño piadoso mientras los científicos no tengan los medios para utilizar como hipótesis rectora la noción de totalidad y la de totalización. De nada sirve decretar que la evolución de las especies o que la aparición de la vida son momentos de la "dialéctica de la Naturaleza" mientras ignoremos cómo apareció la vida y cómo se transforman las especies. Por el momento, la biología, en el dominio concreto de sus investigaciones, permanece positivista y analítica. Puede ser que un conocimiento más profundo de su objeto le imponga, por sus contradicciones, la obligación de considerar al organismo en su totalidad, es decir, dialécticamente, y de considerar todos los hechos biológicos en su relación de interioridad. Ello es posible, pero no es seguro.
                            </QuoteBlock>

                        {/* CAPÍTULO 2 */}
                        <section id="chapter2" className="mb-80 scroll-mt-40">
                            <div className="mb-32 text-center">
                                <span className="text-cyan-400 text-xs font-black tracking-[0.6em] uppercase mb-8 block">Capítulo 2</span>
                                <h2 className="text-5xl md:text-7xl lg:text-9xl font-serif text-slate-100 tracking-tighter leading-none">
                                    La Autopoiesis como Organización<br/>
                                    <span className="text-slate-500 text-4xl md:text-6xl lg:text-7xl font-serif italic font-light block mt-8">de los Sistemas Vivos</span>
                                </h2>
                            </div>

                            <SectionHeader>2.1 La Dualidad entre Organización y Estructura</SectionHeader>
                            
                            <SubSectionHeader>2.1.1</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Las máquinas y la biología han estado, desde la antigüedad, estrechamente relacionadas. Desde las figuras zoológicas presentes en los simulacros astronómicos, pasando por las imitaciones mecánicas de animales del Renacimiento, los nervios de tubos de aire de Descartes, hasta las discusiones actuales sobre el computador y el cerebro, recorre un hilo continuo. De hecho, el nombre mismo de mecanicismo para una actitud de indagación a lo largo de la historia de la biología revela esto a nivel filosófico (de Solla Price, 1966; Hall, 1968). Con frecuencia, el mecanicismo se menciona en oposición al vitalismo, como una afirmación de la validez del principio de objetividad en biología: no hay propósitos en la naturaleza animal. Su aparente intencionalidad es similar a la intencionalidad de las máquinas. Sin embargo, el hecho de que uno elija las máquinas como un conjunto de objetos comparables a los sistemas vivos merece una mirada más cercana. ¿Qué hay en las máquinas que permite establecer tal conexión?
                            </Paragraph>
                            
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Si uno ha de tener una comprensión de una clase dada de máquinas, es obviamente insuficiente dar una lista de sus partes o definir su propósito como un artefacto humano. La forma de evitar ambas insuficiencias es describir las interrelaciones permitidas de los componentes de la máquina, que definen las posibles transiciones que la máquina puede experimentar. Esto, por un lado, va más allá de la mera enumeración y, por otro, implica la naturaleza del resultado que determina el propósito de la máquina. Notablemente, al observar los componentes, uno ve que no todas sus propiedades tienen igual importancia. Si uno ha de instanciar (construir o implementar) una cierta máquina, entonces, al elegir los componentes, tendrá en cuenta solo aquellas propiedades de los componentes que satisfagan las interrelaciones deseadas que conducen a la secuencia esperada de transiciones que constituye la descripción de la máquina. Esto equivale a decir que los componentes pueden ser cualquier componente siempre que sus interrelaciones posibles satisfagan un conjunto dado de condiciones deseadas. Alternativamente, se puede decir que lo que especifica una máquina es el conjunto de interrelaciones de sus componentes, independientemente de los componentes mismos.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Las relaciones que definen a una máquina como una unidad, y determinan la dinámica de interacciones y transformaciones que puede experimentar como tal unidad, las llamamos la organización de la máquina. Las relaciones reales que se mantienen entre los componentes que integran una máquina concreta en un espacio dado constituyen su estructura [1]. La organización de una máquina (o sistema) no especifica las propiedades de los componentes que realizan la máquina como un sistema concreto; solo especifica las relaciones que estos deben generar para constituir la máquina o sistema como una unidad. Por lo tanto, la organización de una máquina es independiente de las propiedades de sus componentes, que son arbitrarias, y una máquina dada puede ser realizada de muchas maneras diferentes por muchos tipos diferentes de componentes. En otras palabras, aunque una máquina dada puede ser realizada por muchas estructuras diferentes, para que constituya una entidad concreta en un espacio dado, sus componentes reales deben estar definidos en ese espacio y tener propiedades que les permitan generar las relaciones que la definen.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Estamos diciendo, por tanto, que lo que define la organización de una máquina son las relaciones y, por ende, que la organización de una máquina no tiene conexión con la materialidad, es decir, con las propiedades de los componentes que los definen como entidades físicas. En la organización de una máquina, la materialidad está implícita pero no entra per se. Una máquina de Turing, por ejemplo, es una cierta organización; parece haber una brecha desesperada entre la forma en que se define una máquina de Turing y cualquier instancia posible (eléctrica, mecánica, etc.) de ella. Esto ha sido señalado por trabajadores en el campo de la cibernética. Como dice Ashby:
                            </Paragraph>

                            <QuoteBlock author="Ashby, Diseño para un Cerebro (1956)">
                                Las verdades de la cibernética no están condicionadas a que se deriven de sistemas y de alguna otra rama de la ciencia... [Ellas] no dependen de manera esencial de las leyes de la física o de las propiedades de la materia... La materialidad es irrelevante, y también lo es el cumplimiento o no de las leyes ordinarias de la física.
                            </QuoteBlock>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Wiener señalaba esto cuando enfatizaba la primacía de la información, no de la materia o la energía. "Ningún materialismo que no admita esta [distinción] puede sobrevivir en el día de hoy" (1961:132).
                            </Paragraph>

                            <SubSectionHeader>2.1.2</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Podría surgir la objeción de que la noción de organización pertenece a un campo más inclusivo, el de las matemáticas. Esta objeción, sin embargo, no tiene peso, porque el valor explicativo de las nociones en discusión se correlaciona con circunstancias empíricas, artificiales o naturales, que las encarnan. Así, existe la simetría de los objetos naturales y existe la matemática de la simetría. De manera similar, existe la experiencia del magnetismo y existe la matemática del magnetismo. No se superponen, sino que una encarna a la otra. Desde este punto de vista no hay diferencia entre la física y, digamos, la cibernética. Lo que hace peculiar a la física es el hecho de que la materialidad per se está implícita: así, las estructuras descricas encarnan conceptos que se derivan de la materialidad misma, y no tienen sentido sin ella. A pesar de cualquier avance, en física uno está mirando la estructura de la materialidad.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Además, no hay diferencias en el paradigma explicativo utilizado en la formulación de, digamos, la teoría atómica o la teoría de control. En ambos casos estamos tratando con un intento de reformular una fenomenología dada en términos tales que sus componentes estén conectados causalmente. Sin embargo, en un caso las nociones están directamente relacionadas con la materialidad, mientras que en el otro caso la materialidad no entra en absoluto.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Creemos, por tanto, que la distinción clásica entre sintético y analítico debería refinarse. Dentro de lo sintético se deberían distinguir dos niveles: lo materialmente sintético (es decir, donde la materialidad entra per se en consideración), y lo no materialmente sintético (es decir, donde la materialidad está implícita pero es, como tal, irrelevante).
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Bajo esta luz, uno debe mirar de cerca las consecuencias de la afirmación básica para el mecanicismo biológico: los sistemas vivos son máquinas de una o varias clases bien definidas. Esto es decir: El elemento definitorio de las unidades vivas es una cierta organización (el conjunto de interrelaciones que conducen a una forma dada de transiciones) independiente de la estructura, la materialidad que la encarna; no la naturaleza de los componentes, sino sus interrelaciones. Hay tres consecuencias principales de esta afirmación:
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                1. Cualquier explicación de un sistema biológico debe contener al menos dos aspectos complementarios, uno refiriéndose a él como una organización, y el otro refiriéndose a él como una estructura, como una instancia. El primero debe dar cuenta de la configuración específica (dinámica) de los componentes que lo definen; el segundo debe dar cuenta de cómo sus componentes particulares entran en las interrelaciones dadas que lo constituyen.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                2. Cualquier sistema biológico puede ser tratado en términos de las propiedades de sus componentes reales como un sistema físico. No hay limitación alguna para hacerlo, excepto por el número de variables que uno podría tener que considerar. Pero esto es solo un problema de computación. Eventualmente, uno debería ser capaz de tener una descripción física tan precisa como sea necesario de cualquier sistema biológico. Aunque tal análisis es insuficiente, es necesario para señalar la estructura específica de los sistemas biológicos, de modo que sea posible dar sentido a una forma dada de interrelaciones.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                3. En la medida en que el análisis físico de los sistemas biológicos sigue siendo física, lo que es específico de la biología es precisamente el análisis de la clase de máquinas que son los sistemas vivos, y los cambios que estos experimentan en el tiempo. Así, los aspectos específicos de cualquier explicación biológica pertenecen al segundo nivel esbozado anteriormente, y necesariamente no son deducibles de la física. En este sentido, la biología no es reducible a la física.
                            </Paragraph>

                            <SubSectionHeader>2.1.3</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                El uso que el hombre puede dar a una máquina no es una característica de la organización de la máquina, sino del dominio en el que opera la máquina, y pertenece a nuestra descripción de la máquina en un contexto más amplio que la máquina misma. Esta es una noción significativa. Las máquinas hechas por el hombre son todas hechas con algún propósito, práctico o no —algún objetivo (aunque sea solo para divertir)— que está especificado. Sin embargo, no debemos dejarnos llevar a creer que los propósitos, o metas, o funciones, han de ser usados como propiedades constitutivas de la máquina que describimos con ellos; tales nociones pertenecen al dominio de la observación, y no pueden ser usadas para caracterizar ningún tipo particular de organización de máquina.
                            </Paragraph>

                            <SectionHeader>2.2 Máquinas Autopoiéticas</SectionHeader>

                            <SubSectionHeader>2.2.1</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Que los sistemas vivos son máquinas no puede mostrarse señalando sus componentes. Más bien, uno debe mostrar su organización de manera tal que la forma en que surgen todas sus propiedades peculiares se vuelva obvia. Para hacer esto, primero caracterizaremos el tipo de sistemas que son los sistemas vivos, y luego mostraremos cómo las propiedades peculiares de lo vivo pueden surgir como consecuencias de la organización de este tipo de máquinas.
                            </Paragraph>

                            <SubSectionHeader>2.2.2</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Existen sistemas que mantienen algunas de sus variables constantes, o dentro de un rango limitado de valores. Esta es, de hecho, la noción básica de estabilidad o coherencia, que se encuentra en la base misma de nuestra comprensión de los sistemas (ej., Wiener, 1961). Tales máquinas son máquinas homeostáticas, y toda retroalimentación es interna a ellas.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                La idea de autopoiesis capitaliza la idea de homeostasis y la extiende en dos direcciones significativas: primero, haciendo que toda referencia para la homeostasis sea interna al sistema mismo a través de la interconexión mutua de procesos; y en segundo lugar, postulando esta interdependencia como la fuente misma de la identidad del sistema como una unidad concreta que podemos distinguir. Estos son sistemas que, en un sentido laxo, producen su propia identidad: se distinguen de su fondo. De ahí el nombre autopoiético, del griego αὐτός = sí mismo, y ποιειν = producir.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Un sistema autopoiético está organizado (definido como una unidad) como una red de procesos de producción (transformación y destrucción) de componentes que produce los componentes que: (1) a través de sus interacciones y transformaciones regeneran y realizan continuamente la red de procesos (relaciones) que los produjo; y (2) lo constituyen (a la máquina) como una unidad concreta en el espacio en el que existen al especificar el dominio topológico de su realización como tal red.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Se deduce que una máquina autopoiética genera y especifica continuamente su propia organización a través de su operación como un sistema de producción de sus propios componentes, y lo hace en un recambio interminable de componentes bajo condiciones de perturbaciones continuas y compensación de perturbaciones. Por lo tanto, una máquina autopoiética es un sistema homeostático (o más bien un sistema de relaciones estáticas) que tiene su propia organización (red definitoria de relaciones) como el invariante fundamental.
                            </Paragraph>

                            <SubSectionHeader>2.2.3</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                La red autopoiética de procesos define una clase de sistema. En una máquina hecha por el hombre en el espacio físico, digamos un automóvil, hay una organización dada en términos de una concatenación de procesos, pero estos procesos no son en ningún sentido procesos de producción de los componentes que especifican al automóvil como una unidad, ya que los componentes de un automóvil son todos producidos por otros procesos, que son independientes de la organización del automóvil y su operación. Las máquinas de este tipo son sistemas dinámicos no autopoiéticos. En una unidad física natural como un cristal, la organización está especificada por las relaciones espaciales que definen las posiciones relativas de sus componentes, mientras que estos especifican su unidad en el espacio en el que existen. Esto no es así con una máquina autopoiética. Una organización de cristal, entonces, se encuentra en un dominio diferente que la organización autopoiética: un dominio de relaciones entre componentes, no de relaciones entre procesos de producción de componentes. Normalmente reconocemos esto diciendo que los cristales son estáticos.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Si uno puede clasificar como autopoiéticos otros sistemas (como sociales o físicos) depende, por supuesto, de si uno puede dar una conotación precisa a la idea de procesos de producción de componentes y la generación de un límite en algún espacio apropiado. Veo la autopoiesis como una forma posible de autonomía (o clausura organizacional), y este término debería restringirse a sistemas que se caracterizan por una red que es, o se asemeja muy de cerca a, una red química.
                            </Paragraph>

                            <SubSectionHeader>2.2.4</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Las consecuencias de la organización autopoiética son primordiales:
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                1. Las máquinas autopoiéticas son autónomas; es decir, subordinan todos los cambios al mantenimiento de su propia organización, independientemente de cuán profundamente puedan ser transformadas de otro modo en el proceso. Otras máquinas, en adelante llamadas máquinas alopoiéticas, tienen como producto de su funcionamiento algo diferente de sí mismas.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                2. Las máquinas autopoiéticas tienen individualidad; es decir, al mantener su organización como un invariante a través de su producción continua, mantienen activamente una identidad que es independiente y, sin embargo, hace posibles sus interacciones con un observador. Las máquinas alopoiéticas tienen una identidad que depende del observador.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                3. Las máquinas autopoiéticas son unidades porque, y solo porque, de su organización autopoiética específica: sus operaciones especifican sus propios límites en los procesos de autoproducción. Este no es el caso de una máquina alopoiética, cuyos límites están definidos completamente por el observador.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                4. Las máquinas autopoiéticas no tienen entradas ni salidas. Pueden ser perturbadas por eventos independientes y experimentar cambios estructurales internos que compensen estas perturbaciones. Cualesquiera que sean los cambios internos que tengan lugar, están siempre subordinados al mantenimiento de la organización de la máquina. Aunque una máquina autopoiética puede tratarse como una máquina alopoiética, este tratamiento no revela su organización como máquina autopoiética.
                            </Paragraph>

                            <SectionHeader>2.3 Sistemas Vivos</SectionHeader>

                            <SubSectionHeader>2.3.1</SubSectionHeader>
                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                Si los sistemas vivos son máquinas, que son máquinas autopoiéticas físicas es trivialmente obvio; transforman la materia en sí mismos de una manera tal que el producto de su operación es su propia organización. Sin embargo, consideramos que lo inverso también es cierto: Un sistema físico, si es autopoiético, es vivo. En otras palabras, afirmamos que la noción de autopoiesis es necesaria y suficiente para caracterizar la organización de los sistemas vivos.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                1. Las máquinas y los sistemas se ven generalmente como artefactos naturales o hechos por el hombre con propiedades completamente conocidas que los hacen, al menos conceptualmente, perfectamente predecibles. Por el contrario, los sistemas vivos son a menudo vistos a priori como sistemas últimamente impredecibles, con un comportamiento intencional similar al nuestro. Si los sistemas vivos fueran máquinas, podrían ser hechos por el hombre. Parece haber un miedo íntimo a que el asombro por la vida y lo vivo desaparezca si un sistema vivo pudiera ser no solo reproducido, sino diseñado por el hombre. Esto es una tontería; la belleza de la vida no es una consecuencia de su inaccesibilidad a nuestra comprensión.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                2. En la práctica, se acepta que las plantas y los animales son seres vivos, pero se caracterizan como vivos a través de la enumeración de ciertas propiedades. Entre estas, la reproducción y la evolución aparecen como determinantes. Sin embargo, cuando estas propiedades se incorporan en un sistema artificial, aquellos que no aceptan emocionalmente que la naturaleza de la vida puede ser comprendida, aprehenden inmediatamente otras propiedades como relevantes y se abstienen de aceptar cualquier sistema sintético como vivo.
                            </Paragraph>

                            <Paragraph onFootnoteHover={setActiveFootnote} onFootnoteLeave={() => setActiveFootnote(null)}>
                                3. A menudo se asume que la observación y la experimentación son por sí solas suficientes para revelar la naturaleza de los sistemas vivos. Argumentos epistemológicos e históricos justifican la visión contraria: toda experimentación y observación implica una perspectiva teórica, y ninguna experimentación u observación tiene significado o puede ser interpretada fuera del marco teórico en el que tuvo lugar.
                            </Paragraph>

                            <SubSectionHeader>Fuentes</SubSectionHeader>
                            <div className="pl-6 border-l border-slate-700 text-sm md:text-base lg:text-xl text-slate-500 italic w-full">
                                <p className="mb-4">Maturana, H., y F. Varela (1975), Autopoietic Systems: A Characterization of the Living Organization: Biological Computer Lab. Rep. 9.4, Univ. of Illinois, Urbana. Reimpreso en Maturana y Varela (1978).</p>
                                <p>Varela, F., y H. Maturana (1972), Mechanism and biological explanation, Phil. Sci. 39:378.</p>
                            </div>
                        </section>
                    </main>

                    <footer className="w-full text-center py-24 border-t border-slate-900 text-slate-700 text-xs">
                        <p className="mb-2 uppercase tracking-[0.6em] font-serif">Principios de Autonomía Biológica</p>
                        <p>© Francisco J. Varela</p>
                    </footer>

                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 w-[95%] max-w-7xl bg-black/95 border border-cyan-900/40 text-slate-300 p-8 md:p-14 rounded-[3rem] shadow-2xl backdrop-blur-3xl z-50 animate-fade-in ring-1 ring-cyan-500/30">
                            <div className="flex items-start gap-8 lg:gap-14">
                                <span className="text-cyan-400 font-serif text-4xl lg:text-7xl font-bold leading-none select-none">[{activeFootnote}]</span>
                                <p className="text-base md:text-lg lg:text-2xl leading-relaxed text-justify font-light tracking-wide">{FOOTNOTES[activeFootnote]}</p>
                            </div>

                    )}

            );
        }

        root.render(<App />);
